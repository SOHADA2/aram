<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 펫 시스템 목업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#040b15; --surface:#0d1829; --surface2:#111f33;
  --border:rgba(255,255,255,0.08); --text:#e8eaf0; --text-dim:#6b7a99;
  --gold:#c89b3c; --green:#4ade80; --red:#f87171;
  --purple:#a855f7; --purple-dim:rgba(150,100,255,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:20px;min-height:100vh;}

.wrap{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:0;}

/* 상단 골드 바 */
.gold-bar{display:flex;justify-content:flex-end;align-items:center;gap:6px;padding:6px 0 14px;}
.gold-bar span{font-size:13px;color:var(--gold);font-weight:700;}

/* 카테고리 탭 */
.cat-tabs{display:flex;gap:5px;margin-bottom:14px;}
.cat-tab{flex:1;padding:6px 0;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text-dim);font-size:10px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.cat-tab.active{background:rgba(200,155,60,0.15);border-color:rgba(200,155,60,0.5);color:var(--gold);}
.cat-tab.pet.active{background:rgba(150,100,255,0.18);border-color:rgba(150,100,255,0.45);color:#c4a0ff;}

/* ═══ 펫 섹션 ═══ */
.pet-wrap{display:flex;flex-direction:column;gap:14px;}

/* 뽑기 카드 */
.gacha-card{
  background:linear-gradient(135deg,rgba(100,60,180,0.18),rgba(60,30,120,0.1));
  border:1px solid rgba(150,100,255,0.35);border-radius:14px;padding:18px 16px;
}
.gacha-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.gacha-preview{
  width:80px;height:80px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(150,100,255,0.35);overflow:hidden;
  background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;
  position:relative;
}
.gacha-preview img{width:100%;height:100%;object-fit:contain;transition:all 0.3s;}
.gacha-preview .preview-label{
  position:absolute;bottom:3px;left:0;right:0;text-align:center;
  font-size:8px;color:rgba(255,255,255,0.5);
}
.gacha-info{flex:1;}
.gacha-title{font-family:'Black Han Sans',sans-serif;font-size:17px;letter-spacing:0.5px;margin-bottom:3px;}
.gacha-sub{font-size:10px;color:var(--text-dim);line-height:1.5;margin-bottom:10px;}
.gacha-btns{display:flex;gap:7px;}
.gacha-btn{
  flex:1;padding:8px 0;border-radius:8px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;transition:all 0.15s;
}
.gacha-btn.one{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;}
.gacha-btn.ten{background:linear-gradient(135deg,#4c1d95,#6d28d9);color:#d8b4fe;font-size:11px;}
.gacha-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(168,85,247,0.4);}
.gacha-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.gacha-result{
  text-align:center;font-size:12px;min-height:22px;
  border-top:1px solid rgba(150,100,255,0.15);padding-top:10px;margin-top:2px;
}

/* 합성 안내 */
.merge-hint{
  font-size:10px;color:var(--text-dim);text-align:center;
  padding:7px 12px;border:1px solid rgba(150,100,255,0.12);
  border-radius:8px;background:rgba(150,100,255,0.04);line-height:1.8;
}
.merge-hint b{color:#c4a0ff;}

/* 컬렉션 */
.col-section{display:flex;flex-direction:column;gap:10px;}
.col-header{display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:12px;font-weight:700;color:var(--text-dim);}
.col-count{font-size:11px;color:#c4a0ff;font-weight:700;}
.col-tabs{display:flex;gap:5px;}
.col-tab{
  flex:1;padding:5px 0;border-radius:6px;
  border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);
  color:var(--text-dim);font-size:10px;font-weight:700;cursor:pointer;transition:all 0.15s;
}
.col-tab.active{background:rgba(150,100,255,0.2);border-color:rgba(150,100,255,0.5);color:#c4a0ff;}

/* 펫 그리드 */
.pet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* ─── LoL 증강 카드 스타일 ─── */
.pet-card{
  border-radius:10px;border:2.5px solid transparent;
  padding:8px 6px 9px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;cursor:default;transition:transform 0.18s,box-shadow 0.18s;
  /* 기본: 실버 */
  background:linear-gradient(160deg,#0c1520,#070b14) padding-box,
             linear-gradient(160deg,#4a6a84,#9ab8d0,#6a8aa4,#9ab8d0,#4a6a84) border-box;
  box-shadow:0 2px 14px rgba(0,0,0,0.7),0 0 8px rgba(154,184,208,0.1);
}
/* 코너 장식 */
.pet-card::after{
  content:'';position:absolute;inset:5px;pointer-events:none;z-index:1;
  background:
    linear-gradient(currentColor,currentColor) top left/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) top left/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) top right/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) top right/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) bottom left/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) bottom left/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) bottom right/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) bottom right/1.5px 8px no-repeat;
  color:rgba(154,184,208,0.45);
}
.pet-card.t2::after{color:rgba(212,160,32,0.5);}
.pet-card.t3::after{color:rgba(200,150,255,0.5);}

.pet-card.locked{opacity:0.28;}
.pet-card.owned:hover{transform:translateY(-2px);}

/* 실버 */
.pet-card.t1{
  background:linear-gradient(160deg,#0c1520,#070b14) padding-box,
             linear-gradient(160deg,#4a6a84,#9ab8d0,#6a8aa4,#9ab8d0,#4a6a84) border-box;
  box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 10px rgba(154,184,208,0.12);
}
/* 골드 */
.pet-card.t2{
  background:linear-gradient(160deg,#120e06,#080602) padding-box,
             linear-gradient(160deg,#6a4800,#c89020,#f0cc60,#c89020,#6a4800) border-box;
  box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 14px rgba(212,160,32,0.22);
}
/* 프리즘 */
.pet-card.t3{
  background:linear-gradient(160deg,#0e0820,#060410) padding-box,
             linear-gradient(135deg,#ff8888,#ffcc44,#88ff99,#88ccff,#cc88ff,#ff8888) border-box;
  box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 16px rgba(180,120,255,0.2);
  animation:prism-glow 3s ease-in-out infinite;
}
@keyframes prism-glow{
  0%,100%{box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 14px rgba(255,120,120,0.18);}
  33%{box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 18px rgba(120,220,150,0.2);}
  66%{box-shadow:0 2px 14px rgba(0,0,0,0.75),0 0 18px rgba(120,160,255,0.22);}
}

/* 이미지 영역 (카드 프레임이 티어 표현하므로 단순하게) */
.pet-img{
  width:68px;height:68px;border-radius:7px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.45);position:relative;
}
.pet-img img{width:100%;height:100%;object-fit:contain;display:block;}

/* 티어 레이블 */
.tier-label{
  font-size:8px;font-weight:700;letter-spacing:0.8px;line-height:1;margin:1px 0 0;
}
.t1 .tier-label{color:#8ab4cc;}
.t2 .tier-label{color:#d4a020;}
.t3 .tier-label{
  background:linear-gradient(90deg,#ff9999,#ffdd66,#99ffbb,#99ccff,#dd99ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 3px rgba(200,150,255,0.5));
}

.pet-name{font-size:9px;text-align:center;width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);}
.pet-name.owned{color:var(--text);font-weight:600;}
.pet-cnt{font-size:9px;color:rgba(255,255,255,0.4);font-weight:600;}
.merge-btn{
  width:100%;padding:3px 0;border-radius:5px;border:none;
  background:linear-gradient(90deg,rgba(100,60,200,0.55),rgba(150,80,240,0.55));
  color:#e0cfff;font-size:8px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;
}
.merge-btn:hover{background:linear-gradient(90deg,rgba(100,60,200,0.85),rgba(150,80,240,0.85));}

/* 뽑기 결과 팝업 카드 */
.result-card{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0);
  align-items:center;justify-content:center;
  flex-direction:column;
}
.result-card.show{display:flex;animation:bg-fade-in 0.25s forwards;}
@keyframes bg-fade-in{to{background:rgba(0,0,0,0.82);backdrop-filter:blur(5px);}}

/* 파티클 컨테이너 (광선 없이 파티클만) */
.result-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit;}

/* 플래시 */
.result-flash{
  position:fixed;inset:0;background:rgba(200,150,255,0.18);
  pointer-events:none;opacity:0;z-index:998;
}
.result-flash.pop{animation:flash-pop 0.4s ease-out forwards;}
@keyframes flash-pop{0%{opacity:0.9;}100%{opacity:0;}}

/* 파티클 */
.sparkle{
  position:absolute;left:50%;top:50%;width:7px;height:7px;
  border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#fff 0%,#d4a0ff 60%,transparent 100%);
  animation:sparkle-fly 0.8s ease-out forwards;
}
@keyframes sparkle-fly{
  0%  {transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}
}

/* 단일 뽑기 팝업 - 카드 플립 방식 */
.result-inner{
  position:relative;z-index:1;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0;
  animation:ri-enter 0.4s cubic-bezier(0.22,1.4,0.5,1);
}
@keyframes ri-enter{from{transform:scale(0.7) translateY(30px);opacity:0;}to{transform:scale(1);opacity:1;}}

/* 카드 플립 */
.r-flip-wrap{width:140px;height:180px;perspective:700px;margin-bottom:16px;cursor:pointer;}
.r-flip-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
  border-radius:16px;
}
.r-flip-inner.flipped{transform:rotateY(180deg);}
.r-card-back,.r-card-front{
  position:absolute;inset:0;border-radius:16px;
  backface-visibility:hidden;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.r-card-back{
  background:linear-gradient(135deg,#1a0840,#0a0520);
  border:2px solid rgba(150,100,255,0.55);
  font-size:48px;
  animation:card-glow 1.2s ease-in-out infinite;
}
@keyframes card-glow{
  0%,100%{box-shadow:0 0 18px rgba(120,60,220,0.5);}
  50%{box-shadow:0 0 42px rgba(168,85,247,0.85);}
}
/* 뒷면 희귀도 힌트 */
.r-card-back.hint-s2{
  border-color:rgba(255,190,0,0.65);
  animation:hint-gold 1.4s ease-in-out infinite;
}
@keyframes hint-gold{
  0%,100%{box-shadow:0 0 16px rgba(255,160,0,0.35);}
  50%{box-shadow:0 0 40px rgba(255,190,0,0.7),inset 0 0 24px rgba(255,160,0,0.08);}
}
.r-card-back.hint-s3{
  border-color:rgba(255,120,120,0.7);
  animation:hint-rainbow 2s linear infinite;
}
@keyframes hint-rainbow{
  0%  {border-color:rgba(255,120,120,0.7);box-shadow:0 0 28px rgba(255,80,80,0.45);}
  33% {border-color:rgba(120,255,150,0.7);box-shadow:0 0 28px rgba(80,255,120,0.45);}
  66% {border-color:rgba(120,180,255,0.7);box-shadow:0 0 28px rgba(80,150,255,0.45);}
  100%{border-color:rgba(255,120,120,0.7);box-shadow:0 0 28px rgba(255,80,80,0.45);}
}
/* 클릭 힌트 텍스트 */
.r-tap-hint{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:12px;letter-spacing:0.5px;transition:opacity 0.3s;}
.r-tap-hint.hide{opacity:0;}
.r-card-front{
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#1a1040,#0d1829);
  border:2px solid rgba(150,100,255,0.5);
  padding:14px;gap:8px;
}
.r-card-front.s2{border-color:rgba(255,200,0,0.7);box-shadow:0 0 20px rgba(255,180,0,0.35);}
.r-card-front.s3{animation:rainbow-border 2.5s linear infinite;}
@keyframes rainbow-border{
  0%  {border-color:#ff6b6b;box-shadow:0 0 20px rgba(255,80,80,0.4);}
  33% {border-color:#69ff8e;box-shadow:0 0 20px rgba(80,255,120,0.4);}
  66% {border-color:#6bb5ff;box-shadow:0 0 20px rgba(80,150,255,0.4);}
  100%{border-color:#ff6b6b;box-shadow:0 0 20px rgba(255,80,80,0.4);}
}
.r-card-img{width:100px;height:100px;object-fit:contain;}
.r-card-no-img{font-size:36px;opacity:0.35;}
.r-card-star{font-size:13px;letter-spacing:1px;}

/* 카드 하단 텍스트 */
.r-info{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:18px;opacity:0;transition:opacity 0.35s ease;}
.r-info.show{opacity:1;}
.r-name{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#c4a0ff;text-shadow:0 0 14px rgba(180,120,255,0.6);}
.r-sub{font-size:11px;color:var(--text-dim);}
.r-sub.s2{color:#ffd700;}
.r-sub.s3{background:linear-gradient(90deg,#ff8888,#ffcc44,#88ff99,#88ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.r-close{
  width:200px;padding:10px;border-radius:9px;border:none;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
  box-shadow:0 4px 16px rgba(120,60,220,0.4);
  opacity:0;transition:opacity 0.3s ease;
  pointer-events:none;
}
.r-close.show{opacity:1;pointer-events:auto;}
@keyframes fade-up{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* 10연 카드 희귀도 색상 */
.tc-front.s2{border-color:rgba(255,200,0,0.7)!important;box-shadow:0 0 10px rgba(255,180,0,0.3);}
.tc-front.s3{animation:rainbow-border 2.5s linear infinite;}
.tc-star{font-size:9px;letter-spacing:0px;}
/* 10연 뒷면 힌트 */
.tc-inner[data-star="2"] .tc-back{border-color:rgba(255,190,0,0.55);animation:hint-gold-sm 1.4s ease-in-out infinite;}
@keyframes hint-gold-sm{0%,100%{box-shadow:0 0 8px rgba(255,160,0,0.3);}50%{box-shadow:0 0 20px rgba(255,190,0,0.6);}}
.tc-inner[data-star="3"] .tc-back{animation:hint-rainbow-sm 2s linear infinite;}
@keyframes hint-rainbow-sm{
  0%  {border-color:rgba(255,120,120,0.65);box-shadow:0 0 12px rgba(255,80,80,0.4);}
  33% {border-color:rgba(120,255,150,0.65);box-shadow:0 0 12px rgba(80,255,120,0.4);}
  66% {border-color:rgba(120,180,255,0.65);box-shadow:0 0 12px rgba(80,150,255,0.4);}
  100%{border-color:rgba(255,120,120,0.65);box-shadow:0 0 12px rgba(255,80,80,0.4);}
}
/* 10연 클릭 안내 */
.tc:not(.done){cursor:pointer;}
.tc.done{cursor:default;}
/* 10연 버튼 행 */
.ten-btn-row{display:flex;gap:10px;align-items:center;}
.ten-open-all{
  padding:9px 22px;border-radius:9px;border:1px solid rgba(150,100,255,0.5);
  background:rgba(150,100,255,0.12);
  color:#c4a0ff;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
}

/* 이미지 없을 때 폴백 */
.pet-img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.pet-img-wrap.no-img{font-size:28px;opacity:0.4;}

/* ×10 뽑기 팝업 */
.ten-popup{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(6px);
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
.ten-popup.show{display:flex;}
.ten-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:#c4a0ff;letter-spacing:1px;}
.ten-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 12px;}
.tc{width:68px;perspective:500px;}
.tc-inner{
  width:68px;height:90px;position:relative;transform-style:preserve-3d;
  transition:transform 0.55s cubic-bezier(0.22,1,0.5,1);
  border-radius:11px;
}
.tc-inner.flipped{transform:rotateY(180deg);}
.tc-front,.tc-back{
  position:absolute;inset:0;border-radius:11px;backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  overflow:hidden;
}
.tc-back{
  background:linear-gradient(135deg,#1a0a3a,#0d1040);
  border:1px solid rgba(150,100,255,0.4);
  font-size:22px;
}
.tc-front{
  background:linear-gradient(160deg,#151030,#0d1829);
  border:1px solid rgba(150,100,255,0.5);
  transform:rotateY(180deg);
  padding:5px 4px;
}
.tc-front img{width:50px;height:50px;object-fit:contain;}
.tc-front .tc-name{
  font-size:8px;color:var(--text);font-weight:700;text-align:center;
  line-height:1.25;width:62px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;word-break:keep-all;
}
.tc-front .tc-no-img{font-size:20px;opacity:0.35;}

/* 카드 개별 플립 팝 */
@keyframes tc-wrap-pop{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
.tc.popping{animation:tc-wrap-pop 0.35s ease;}

/* 화면 흔들림 */
@keyframes popup-shake{
  0%,100%{transform:translate(0,0);}
  15%{transform:translate(-5px,-3px);}
  30%{transform:translate(5px,3px);}
  45%{transform:translate(-4px,4px);}
  60%{transform:translate(4px,-4px);}
  75%{transform:translate(-2px,2px);}
  90%{transform:translate(2px,-2px);}
}
.ten-popup.shake{animation:popup-shake 0.45s ease;}
/* 희귀 플래시 */
@keyframes rare-flash{0%{opacity:0.85;}100%{opacity:0;}}
.rare-flash-overlay{
  position:fixed;inset:0;z-index:1001;pointer-events:none;opacity:0;
}
.rare-flash-overlay.pop{animation:rare-flash 0.5s ease-out forwards;}
.ten-btn{
  padding:10px 36px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;box-shadow:0 4px 16px rgba(120,60,220,0.4);
  display:none;
}
.ten-btn.show{display:block;}
.ten-skip{font-size:11px;color:var(--text-dim);cursor:pointer;text-decoration:underline;opacity:0.6;}
</style>
</head>
<body>
<div class="wrap">

  <div class="gold-bar">🪙 <span id="gold-display">280</span>G</div>

  <div class="cat-tabs">
    <div class="cat-tab">소비 아이템</div>
    <div class="cat-tab">패스권</div>
    <div class="cat-tab">장비 아이템</div>
    <div class="cat-tab pet active">🐾 펫</div>
  </div>

  <!-- 펫 메인 -->
  <div class="pet-wrap">

    <!-- 뽑기 카드 -->
    <div class="gacha-card">
      <div class="gacha-top">
        <div class="gacha-preview" id="gacha-preview">
          <img id="preview-img" src="aram/assets/pets/Yasuo/silver/default.png" alt="">
          <div class="preview-label" id="preview-label">야스오</div>
        </div>
        <div class="gacha-info">
          <div class="gacha-title">🐾 펫 뽑기</div>
          <div class="gacha-sub">랜덤 챔피언 실버 펫 획득<br>총 17종 · 중복 시 재료로 활용</div>
          <div class="gacha-btns">
            <button class="gacha-btn one" id="btn1" onclick="doPull(1)">× 1 &nbsp; 🪙10G</button>
            <button class="gacha-btn ten" id="btn10" onclick="doPull(10)">× 10 &nbsp; 🪙90G</button>
          </div>
        </div>
      </div>
      <div class="gacha-result" id="gacha-result">— 뽑기를 눌러보세요! —</div>
    </div>

    <!-- 합성 안내 -->
    <div class="merge-hint">
      같은 실버 <b>× 3 → 골드 합성</b> &nbsp;|&nbsp; 같은 골드 <b>× 3 → 프리즘 합성</b>
    </div>

    <!-- 컬렉션 -->
    <div class="col-section">
      <div class="col-header">
        <span class="col-title">컬렉션 도감</span>
        <span class="col-count" id="col-count">0 / 17</span>
      </div>
      <div class="col-tabs">
        <button class="col-tab active" onclick="switchStar(1,this)">🥈 실버</button>
        <button class="col-tab" onclick="switchStar(2,this)">🥇 골드</button>
        <button class="col-tab" onclick="switchStar(3,this)">💎 프리즘</button>
      </div>
      <div class="pet-grid" id="pet-grid"></div>
    </div>

  </div>
</div>

<!-- 플래시 레이어 -->
<div class="result-flash" id="result-flash"></div>
<div class="rare-flash-overlay" id="rare-flash"></div>

<!-- ×10 뽑기 팝업 -->
<div class="ten-popup" id="ten-popup">
  <div class="ten-title">🐾 10연 뽑기 결과</div>
  <div class="ten-grid" id="ten-grid"></div>
  <div class="ten-btn-row">
    <button class="ten-open-all" onclick="openAllTen()">한번에 열기</button>
    <button class="ten-btn" id="ten-btn" onclick="closeTenPopup()">확인</button>
  </div>
</div>

<!-- 뽑기 결과 팝업 -->
<div class="result-card" id="result-popup">
  <div class="result-particles" id="result-particles"></div>
  <div class="result-inner" onclick="event.stopPropagation()">
    <div class="r-flip-wrap" id="r-flip-wrap" onclick="flipSingleCard()">
      <div class="r-flip-inner" id="r-flip-inner">
        <div class="r-card-back" id="r-card-back">✦</div>
        <div class="r-card-front" id="r-card-front">
          <img class="r-card-img" id="r-img" src="" alt="" onerror="this.style.display='none';document.getElementById('r-no-img').style.display='block';">
          <span class="r-card-no-img" id="r-no-img" style="display:none">🐾</span>
          <div class="r-card-star" id="r-star"></div>
        </div>
      </div>
    </div>
    <div class="r-tap-hint" id="r-tap-hint">탭하여 공개</div>
    <div class="r-info" id="r-info">
      <div class="r-name" id="r-name">챔피언</div>
      <div class="r-sub" id="r-sub">1성 펫 획득!</div>
    </div>
    <button class="r-close" id="r-close" onclick="closeResult()">확인</button>
  </div>
</div>

<script>
const CHAMPS = [
  {slug:'Akshan',   kr:'아크샨'},   {slug:'Amumu',     kr:'아무무'},
  {slug:'Brand',    kr:'브랜드'},   {slug:'DrMundo',   kr:'문도 박사'},
  {slug:'Fizz',     kr:'피즈'},     {slug:'Gangplank', kr:'갱플랭크'},
  {slug:'Jhin',     kr:'진'},       {slug:'Khazix',    kr:'카직스'},
  {slug:'Lulu',     kr:'룰루'},     {slug:'Malphite',  kr:'말파이트'},
  {slug:'Malzahar', kr:'말자하'},   {slug:'Mel',       kr:'멜'},
  {slug:'Morgana',  kr:'모르가나'}, {slug:'Naafiri',   kr:'나피리'},
  {slug:'Poppy',    kr:'뽀삐'},     {slug:'Rammus',    kr:'람머스'},
  {slug:'Yasuo',    kr:'야스오'},
];
const TIER_PATH = ['','silver','gold','prism'];
const TIER_KR   = ['','실버','골드','프리즘'];
const IMG = (s, star=1) => `aram/assets/pets/${s}/${TIER_PATH[star]}/default.png`;

let gold = 9999;
let inv  = Object.fromEntries(CHAMPS.map(c=>[c.slug,{s1:5,s2:5,s3:5}]));
let ever = Object.fromEntries(CHAMPS.map(c=>[c.slug,{e1:true,e2:true,e3:true}]));
let star = 1;
// 미리보기용 타이머
let previewIdx = 0, previewTimer = null;

function gp(slug){ return {s1:0,s2:0,s3:0,...(inv[slug]||{})}; }
function ge(slug){ return {e1:false,e2:false,e3:false,...(ever[slug]||{})}; }

function startPreviewCycle(){
  previewTimer = setInterval(()=>{
    previewIdx = (previewIdx+1)%CHAMPS.length;
    const c = CHAMPS[previewIdx];
    const img = document.getElementById('preview-img');
    const lbl = document.getElementById('preview-label');
    img.style.opacity='0';
    setTimeout(()=>{ img.src=IMG(c.slug); img.style.opacity='1'; lbl.textContent=c.kr; },180);
  },1200);
}
startPreviewCycle();

function doPull(times){
  const cost = times===1 ? 10 : 90;
  if(gold<cost){ setResult(`🪙 골드 부족! (보유 ${gold}G)`,'#f87171'); return; }
  gold -= cost;
  document.getElementById('gold-display').textContent = gold;
  updateBtns();

  const results=[];
  for(let i=0;i<times;i++){
    const c = CHAMPS[Math.floor(Math.random()*CHAMPS.length)];
    const s = rollStar();
    const p = gp(c.slug);
    const sKey=`s${s}`, eKey=`e${s}`;
    inv[c.slug]={...p,[sKey]:p[sKey]+1};
    const e=ge(c.slug);
    ever[c.slug]={...e,[eKey]:true};
    results.push({...c, star:s});
  }

  if(times===1){
    const c=results[0];
    clearInterval(previewTimer);
    const img=document.getElementById('preview-img');
    const lbl=document.getElementById('preview-label');
    img.style.opacity='0';
    setTimeout(()=>{img.src=IMG(c.slug,c.star);img.style.opacity='1';lbl.textContent=c.kr;},200);
    setTimeout(startPreviewCycle,3000);
    showResultPopup(c, c.star);
  } else {
    showTenResultPopup(results);
  }
  render();
}

// 확률: 1성 93% / 2성 6% / 3성 1%
function rollStar(){
  const r=Math.random();
  if(r<0.01) return 3;
  if(r<0.07) return 2;
  return 1;
}
const STAR_LABEL={1:'SILVER',2:'GOLD',3:'PRISM'};
const STAR_SUB={1:'실버 펫을 획득했어요!',2:'✨ 골드 펫 획득! 희귀해요!',3:'🌈 프리즘 펫 획득!! 초희귀!!'};

let _pendingSingle=null;
function showResultPopup(c, starLevel){
  _pendingSingle={c, starLevel};
  // 트랜지션 없이 즉시 초기화
  const flip=document.getElementById('r-flip-inner');
  flip.style.transition='none';
  flip.classList.remove('flipped');
  void flip.offsetWidth; // reflow
  flip.style.transition='';

  document.getElementById('r-card-back').className='r-card-back';
  document.getElementById('r-card-front').className='r-card-front';
  document.getElementById('r-no-img').style.display='none';
  document.getElementById('r-tap-hint').style.opacity='1';
  document.getElementById('r-info').style.opacity='0';
  const btn=document.getElementById('r-close');
  btn.style.opacity='0'; btn.style.pointerEvents='none';

  // 내용 세팅
  const img=document.getElementById('r-img');
  img.style.display=''; img.src=IMG(c.slug,starLevel);
  img.onerror=()=>{ if(starLevel>1){img.src=IMG(c.slug,1);img.onerror=()=>{img.style.display='none';document.getElementById('r-no-img').style.display='block';}}else{img.style.display='none';document.getElementById('r-no-img').style.display='block';}};
  document.getElementById('r-star').textContent=STAR_LABEL[starLevel];
  document.getElementById('r-name').textContent=c.kr;
  const sub=document.getElementById('r-sub');
  sub.textContent=STAR_SUB[starLevel];
  sub.className='r-sub'+(starLevel===2?' s2':starLevel===3?' s3':'');
  // 뒷면 희귀도 힌트
  if(starLevel===2) document.getElementById('r-card-back').classList.add('hint-s2');
  else if(starLevel===3) document.getElementById('r-card-back').classList.add('hint-s3');
  // 팝업 표시
  document.getElementById('result-popup').classList.add('show');
  const flash=document.getElementById('result-flash');
  flash.classList.remove('pop'); void flash.offsetWidth; flash.classList.add('pop');
}
function flipSingleCard(){
  if(!_pendingSingle) return;
  const flip=document.getElementById('r-flip-inner');
  if(flip.classList.contains('flipped')) return;
  const {starLevel}=_pendingSingle;
  _pendingSingle=null;
  flip.classList.add('flipped');
  if(starLevel===2) document.getElementById('r-card-front').classList.add('s2');
  else if(starLevel===3) document.getElementById('r-card-front').classList.add('s3');
  document.getElementById('r-tap-hint').style.opacity='0';
  // 파티클
  const cont=document.getElementById('result-particles');
  cont.querySelectorAll('.sparkle').forEach(p=>p.remove());
  const cnt=starLevel===3?20:starLevel===2?14:10;
  for(let i=0;i<cnt;i++){
    const el=document.createElement('div'); el.className='sparkle';
    const angle=(i/cnt)*360+Math.random()*18, dist=70+Math.random()*(starLevel*28);
    el.style.cssText=`--dx:${Math.cos(angle*Math.PI/180)*dist}px;--dy:${Math.sin(angle*Math.PI/180)*dist}px;animation-delay:${Math.random()*0.2}s;left:50%;top:40%;`;
    cont.appendChild(el); setTimeout(()=>el.remove(),1100);
  }
  setTimeout(()=>{ document.getElementById('r-info').style.opacity='1'; },500);
  setTimeout(()=>{ const b=document.getElementById('r-close'); b.style.opacity='1'; b.style.pointerEvents='auto'; },780);
}
function closeResult(){ document.getElementById('result-popup').classList.remove('show'); _pendingSingle=null; }

let _tenFlipped=0, _tenTotal=0;
function showTenResultPopup(results){
  _tenFlipped=0; _tenTotal=results.length;
  const grid=document.getElementById('ten-grid');
  const btn=document.getElementById('ten-btn');
  btn.classList.remove('show');
  // 한번에 열기 버튼 초기화 (인라인 style 제거)
  const openBtn=document.querySelector('.ten-open-all');
  if(openBtn) openBtn.style.display='';
  grid.innerHTML='';
  results.forEach((c,i)=>{
    const s=c.star||1;
    const rareCls=s===2?'s2':s===3?'s3':'';
    const div=document.createElement('div'); div.className='tc'; div.id=`tc-wrap${i}`;
    div.innerHTML=`<div class="tc-inner" id="tc${i}" data-star="${s}" onclick="flipTenCard(${i})">
      <div class="tc-back">✦</div>
      <div class="tc-front ${rareCls}">
        <img src="${IMG(c.slug,s)}" alt=""
          onerror="this.src='${IMG(c.slug,1)}';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='block';};">
        <span class="tc-no-img" style="display:none">🐾</span>
        <div class="tc-star">${STAR_LABEL[s]}</div>
        <div class="tc-name">${c.kr}</div>
      </div>
    </div>`;
    grid.appendChild(div);
  });
  document.getElementById('ten-popup').classList.add('show');
}
function triggerRareEffect(star){
  const popup=document.getElementById('ten-popup');
  popup.classList.remove('shake'); void popup.offsetWidth; popup.classList.add('shake');
  setTimeout(()=>popup.classList.remove('shake'),500);
  const rf=document.getElementById('rare-flash');
  rf.style.background=star===3?'rgba(255,180,60,0.3)':'rgba(255,210,0,0.22)';
  rf.classList.remove('pop'); void rf.offsetWidth; rf.classList.add('pop');
}

function flipTenCard(i){
  const inner=document.getElementById('tc'+i);
  if(!inner||inner.classList.contains('flipped')) return;
  inner.classList.add('flipped');
  // 카드 래퍼 팝 효과
  const wrap=inner.closest('.tc');
  if(wrap){ wrap.classList.remove('popping'); void wrap.offsetWidth; wrap.classList.add('popping'); }
  // 희귀 이펙트
  const star=parseInt(inner.dataset.star||'1');
  if(star>=2) setTimeout(()=>triggerRareEffect(star), 280);
  _tenFlipped++;
  if(_tenFlipped>=_tenTotal){
    setTimeout(()=>{
      document.getElementById('ten-btn').classList.add('show');
      const openBtn=document.querySelector('.ten-open-all');
      if(openBtn) openBtn.style.display='none';
    },400);
  }
}
function openAllTen(){
  let delay=0;
  for(let i=0;i<_tenTotal;i++){
    const inner=document.getElementById('tc'+i);
    if(inner&&!inner.classList.contains('flipped')){
      setTimeout(()=>flipTenCard(i), delay);
      delay+=160;
    }
  }
}
function closeTenPopup(){ document.getElementById('ten-popup').classList.remove('show'); }

function setResult(msg,color){
  const el=document.getElementById('gacha-result');
  el.textContent=msg; el.style.color=color;
}

function doMerge(slug,fromStar){
  const p=gp(slug);
  const sKey=`s${fromStar}`,nKey=`s${fromStar+1}`;
  if(p[sKey]<3){ setResult('재료 부족! (같은 펫 3개 필요)','#f87171'); return; }
  inv[slug]={...p,[sKey]:p[sKey]-3,[nKey]:p[nKey]+1};
  const e=ge(slug);
  ever[slug]={...e,[`e${fromStar+1}`]:true};
  const c=CHAMPS.find(c=>c.slug===slug);
  const tierNames=['','실버','골드','프리즘'];
  setResult(`✨ ${c.kr} ${tierNames[fromStar+1]} 합성 성공!`,'#ffd700');
  render();
}

function switchStar(s,btn){
  star=s;
  document.querySelectorAll('.col-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateBtns(){
  document.getElementById('btn1').disabled = gold<10;
  document.getElementById('btn10').disabled = gold<90;
}

function render(){
  const sKey=`s${star}`, eKey=`e${star}`;
  let owned=0;
  const html=CHAMPS.map(({slug,kr})=>{
    const p=gp(slug), e=ge(slug);
    const cnt=p[sKey]||0;
    const hasEver=e[eKey]||cnt>0;
    if(hasEver) owned++;
    const canMerge=star<3&&cnt>=3;
    const imgFilter=hasEver?'':'filter:brightness(0.08) saturate(0)';
    return `<div class="pet-card t${star} ${hasEver?'owned':'locked'}">
      <div class="pet-img">
        <img src="${IMG(slug,star)}" style="${imgFilter}" loading="lazy" alt="" onerror="this.src='${IMG(slug,1)}'">
      </div>
      <div class="tier-label">${hasEver?TIER_KR[star]:'???'}</div>
      <div class="pet-name ${hasEver?'owned':''}">${hasEver?kr:'???'}</div>
      ${hasEver&&cnt>0?`<div class="pet-cnt">× ${cnt}</div>`:''}
      ${canMerge?`<button class="merge-btn" onclick="doMerge('${slug}',${star})">합성 ▲</button>`:''}
    </div>`;
  }).join('');
  document.getElementById('pet-grid').innerHTML=html;
  document.getElementById('col-count').textContent=`${owned} / ${CHAMPS.length}`;
  updateBtns();
}

render();
</script>
</body>
</html>
