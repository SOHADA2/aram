<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펫 시스템 목업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&family=Gmarket+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── 메인 사이트 동일 변수 ── */
:root{
  --bg:#060d18;--surface:#0d1829;--surface2:#112040;--border:#1a3558;
  --gold:#c8a84b;--gold-light:#e8d080;--blue:#4fc3f7;--blue-dark:#0277bd;
  --text:#dce8f5;--text-dim:#6e90b8;
  --green:#00c77a;--red:#f87171;
  --rk-card:#0d1829;--rk-border:rgba(255,255,255,.06);--rk-border-strong:rgba(255,255,255,.1);
  --rk-text:#e6ebf2;--rk-gold:#e8d080;--rk-gold-deep:#c8a84b;
  --purple-light:#b48aff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(60,130,220,0.18) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 10% 30%,rgba(40,100,200,0.10) 0%,transparent 60%),
    linear-gradient(180deg,#040b15 0%,#060d1c 30%,#080f20 60%,#050c18 100%);
}

/* ── 레이아웃 ── */
#main{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 80px;}

header{text-align:center;padding:24px 20px 14px;border-bottom:1px solid var(--border);margin-bottom:12px;}
header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(18px,5vw,24px);letter-spacing:3px;background:linear-gradient(135deg,var(--blue) 0%,var(--gold-light) 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
header p{color:var(--text-dim);font-size:11px;letter-spacing:1px;margin-top:3px;}

.my-info-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;margin:0 14px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;}
.my-info-name{font-weight:700;font-size:13px;}
.my-info-gold{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold-light);}

.tab-content{padding:0 14px;}

/* ── sp-panel / sp-header / sp-cat-tab (사이트 동일) ── */
.sp-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.sp-header{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:1px;color:var(--gold);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(200,155,60,0.2);display:flex;align-items:center;justify-content:space-between;}
.sp-cat-tabs{display:flex;gap:6px;margin-bottom:12px;}
.sp-cat-tab{flex:1;padding:5px 0;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.sp-cat-tab.active{background:rgba(200,155,60,0.15);border-color:rgba(200,155,60,0.5);color:var(--gold);}
.sp-cat-tab:hover:not(.active){border-color:rgba(255,255,255,0.2);color:var(--text);}
.sp-cat-tab.tier-silver{color:rgba(160,195,220,0.55);border-color:rgba(160,195,220,0.18);}
.sp-cat-tab.tier-silver.active{background:rgba(120,170,210,0.14);border-color:rgba(160,210,235,0.55);color:rgba(195,220,240,1);}
.sp-cat-tab.tier-gold{color:rgba(210,165,50,0.55);border-color:rgba(210,165,50,0.2);}
.sp-cat-tab.tier-gold.active{background:rgba(200,155,50,0.16);border-color:rgba(220,175,60,0.65);color:var(--gold);}
.sp-cat-tab.tier-prism{color:rgba(170,105,255,0.55);border-color:rgba(170,105,255,0.2);}
.sp-cat-tab.tier-prism.active{background:rgba(155,90,255,0.14);border-color:rgba(195,120,255,0.65);color:rgba(215,150,255,1);animation:prism-tab-pulse 2s ease-in-out infinite;}
@keyframes prism-tab-pulse{0%,100%{box-shadow:0 0 5px rgba(170,105,255,0.25);}50%{box-shadow:0 0 12px rgba(200,120,255,0.5);}}

/* ── sli 아이템 행 (사이트 동일) ── */
.sli{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;transition:border-color 0.15s;}
.sli:last-child{margin-bottom:0;}
.sli:hover{border-color:rgba(200,155,60,0.35);}
.sli-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:8px;background:rgba(255,255,255,0.04);flex-shrink:0;overflow:hidden;position:relative;}
.sli-icon img{width:100%;height:100%;object-fit:contain;filter:brightness(0) opacity(0.45);}
.sli-icon-x10{position:absolute;bottom:4px;right:4px;font-size:8px;font-weight:900;color:rgba(255,255,255,0.5);letter-spacing:-0.3px;line-height:1;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.9);}
.sli-info{flex:1;min-width:0;}
.sli-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.sli-tip-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:15px;height:15px;border-radius:50%;border:1px solid rgba(255,255,255,0.25);
  font-size:9px;font-weight:700;color:var(--text-dim);cursor:default;flex-shrink:0;line-height:1;}
.sli-tip{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 7px);
  width:180px;background:rgba(10,15,30,0.97);border:1px solid rgba(255,255,255,0.12);
  border-radius:7px;padding:8px 10px;font-size:10px;font-weight:400;color:var(--text-dim);
  line-height:1.6;white-space:normal;text-align:left;z-index:100;
  box-shadow:0 4px 16px rgba(0,0,0,0.6);pointer-events:none;}
.sli-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(10,15,30,0.97);}
.sli-tip-wrap:hover .sli-tip{display:block;}
.sli-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sli-price{padding:5px 10px;border-radius:6px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.sli-price:disabled{opacity:0.4;cursor:not-allowed;}
.sli-price:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 3px 8px rgba(200,155,60,0.35);}

.gacha-result{font-size:11px;min-height:18px;color:var(--text-dim);padding:8px 0 2px;text-align:center;}

/* ── 컬렉션 도감 ── */
.col-count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.col-count{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--purple-light);background:rgba(140,80,255,0.1);border:1px solid rgba(140,80,255,0.25);border-radius:10px;padding:2px 8px;}

/* ── 포켓몬 카드 스타일 ── */
.pet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pet-card{
  position:relative;aspect-ratio:5/7;border-radius:13px;overflow:hidden;
  cursor:default;display:flex;flex-direction:column;
  transition:transform 0.18s ease,box-shadow 0.18s ease;
  background:#050b14;
}
.pet-card.owned{cursor:pointer;}
.pet-card.owned:hover{transform:translateY(-5px) scale(1.05);z-index:2;}
.pet-card.locked{cursor:default;}

/* 카드 배경 아트 (로딩 포트레이트) */
.pc-art{position:absolute;inset:0;border-radius:inherit;background-size:cover;background-position:50% 8%;filter:blur(4px) brightness(0.2) saturate(1.4);}
.pet-card.locked .pc-art{filter:blur(4px) brightness(0.04) saturate(0);}

/* 비네트 */
.pc-vignette{
  position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(to bottom,
    rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.05) 28%,
    rgba(0,0,0,0.05) 50%,rgba(0,0,0,0.68) 68%,
    rgba(0,0,0,0.94) 100%);
}

/* 티어별 테두리 */
.pet-card.t1{box-shadow:0 0 0 1.5px rgba(155,200,225,0.28),0 4px 18px rgba(0,0,0,0.65);}
.pet-card.t1.owned:hover{box-shadow:0 0 0 2px rgba(160,210,235,0.65),0 10px 32px rgba(0,0,0,0.5);}
.pet-card.t2{box-shadow:0 0 0 2px rgba(210,165,50,0.8),0 0 16px rgba(200,150,40,0.32),0 4px 16px rgba(0,0,0,0.55);}
.pet-card.t2.owned:hover{box-shadow:0 0 0 2.5px rgba(225,180,60,1),0 0 32px rgba(200,155,50,0.55),0 10px 28px rgba(0,0,0,0.4);}
.pet-card.t3{animation:pet-prism 4s ease-in-out infinite;}
@keyframes pet-prism{
  0%  {box-shadow:0 0 0 2px rgba(200,110,255,0.88),0 0 16px rgba(160,70,240,0.55);}
  33% {box-shadow:0 0 0 2px rgba(230,90,210,0.88), 0 0 18px rgba(200,50,190,0.55);}
  66% {box-shadow:0 0 0 2px rgba(165,100,255,0.88),0 0 16px rgba(130,70,255,0.55);}
  100%{box-shadow:0 0 0 2px rgba(200,110,255,0.88),0 0 16px rgba(160,70,240,0.55);}
}

/* 상단 스트립 */
.pc-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:8px 10px 4px;}
.pc-tier-label{font-family:'Gmarket Sans',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.8px;text-shadow:0 1px 5px rgba(0,0,0,0.9);}
.pet-card.t1 .pc-tier-label{color:rgba(188,215,232,0.88);}
.pet-card.t2 .pc-tier-label{color:rgba(232,188,60,0.96);}
.pet-card.t3 .pc-tier-label{color:rgba(212,155,255,0.95);}
.pc-num{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:rgba(255,255,255,0.2);text-shadow:none;}

/* 펫 이미지 영역 */
.pc-pet-wrap{position:relative;z-index:2;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px 10px;overflow:hidden;}
.pc-pet-img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.9));}
.pet-card.locked .pc-pet-img{filter:brightness(0) opacity(0.18);}

/* 하단 정보 패널 */
.pc-bottom{position:relative;z-index:2;padding:5px 10px 11px;display:flex;flex-direction:column;gap:2px;}
.pc-name{font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 7px rgba(0,0,0,0.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.pet-card.locked .pc-name{color:rgba(255,255,255,0.16);}
.pc-role{font-size:8.5px;color:rgba(255,255,255,0.4);letter-spacing:0.8px;text-shadow:0 1px 3px rgba(0,0,0,0.85);}
.pc-stars{font-size:11px;letter-spacing:2.5px;line-height:1;margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.pet-card.t1 .pc-stars{color:rgba(188,215,232,0.88);}
.pet-card.t2 .pc-stars{color:rgba(232,182,52,0.96);}
.pet-card.t3 .pc-stars{color:rgba(212,148,255,1);text-shadow:0 0 7px rgba(180,100,255,0.65),0 1px 4px rgba(0,0,0,0.9);}

/* 잠금 아이콘 */
.pc-lock{position:absolute;z-index:3;top:50%;left:50%;transform:translate(-50%,-58%);font-size:22px;opacity:0.18;pointer-events:none;}

/* NEW 배지 */
.pet-new-badge{
  position:absolute;bottom:7px;right:7px;z-index:10;
  font-size:7px;font-weight:900;letter-spacing:0.8px;
  color:#fff;font-family:'Gmarket Sans',sans-serif;
  background:linear-gradient(135deg,#d4156a,#ff4f7b);
  border-radius:4px;padding:1.5px 5px;line-height:1.5;
  animation:new-badge-pulse 1.3s ease-in-out infinite;
}
@keyframes new-badge-pulse{
  0%,100%{box-shadow:0 0 5px rgba(212,21,106,0.55);opacity:1;}
  50%{box-shadow:0 0 14px rgba(255,79,123,0.9),0 0 5px rgba(255,180,200,0.4);opacity:0.82;}
}
/* NEW 카드 shimmer 스윕 */
.pet-card.is-new::after{
  content:'';position:absolute;inset:0;border-radius:inherit;z-index:4;pointer-events:none;
  background:linear-gradient(108deg,transparent 35%,rgba(255,255,255,0.07) 50%,transparent 65%);
  background-size:250% 100%;
  animation:card-new-sweep 2.4s ease-in-out infinite;
}
@keyframes card-new-sweep{
  0%{background-position:250% 0;}100%{background-position:-250% 0;}
}

/* 합성 버튼 */
.merge-btn{width:100%;margin-top:4px;padding:3px 0;border-radius:5px;border:1px solid rgba(180,138,255,0.35);background:rgba(70,35,170,0.18);color:var(--purple-light);font-size:8px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;backdrop-filter:blur(6px);}
.merge-btn:hover{background:rgba(100,60,200,0.38);}

/* 타입 배지 + 효과 (카드 하단) */
.pc-type-row{display:flex;align-items:center;gap:4px;margin-top:2px;flex-wrap:wrap;}
.pc-type-chip{font-size:7px;font-weight:700;letter-spacing:0.4px;padding:1px 5px;border-radius:3px;line-height:1.6;flex-shrink:0;}
.pc-type-chip.atk{color:#ffaa77;background:rgba(255,100,50,0.15);border:1px solid rgba(255,100,50,0.3);}
.pc-type-chip.def{color:#77beff;background:rgba(60,130,255,0.15);border:1px solid rgba(60,130,255,0.3);}
.pc-type-chip.sup{color:#88ffcc;background:rgba(60,220,120,0.15);border:1px solid rgba(60,220,120,0.3);}
.pc-eff-txt{font-size:6.5px;color:rgba(255,255,255,0.32);letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 카운트 배지 */
.pet-cnt-badge{position:absolute;top:5px;right:5px;z-index:10;font-size:7px;font-weight:700;color:#0a0e1a;background:linear-gradient(135deg,#a07828,var(--gold));border-radius:4px;padding:1.5px 5px;line-height:1.4;}
.pet-cnt-badge.t3{background:linear-gradient(135deg,#5010a0,var(--purple-light));color:#fff;}


/* ══════════════════════════
   합성 애니메이션 (v2)
   ══════════════════════════ */
.mgo{display:none;position:fixed;inset:0;z-index:1200;align-items:center;justify-content:center;}
.mgo.show{display:flex;}
.mgo-bg{position:absolute;inset:0;background:rgba(2,5,14,0.96);backdrop-filter:blur(14px);}
.mgo-rays{position:absolute;width:200vmax;height:200vmax;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity 0.5s;animation:mgo-rays-spin 10s linear infinite;}
.mgo-rays.show{opacity:1;}
@keyframes mgo-rays-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.mgo-stage{position:relative;z-index:10;width:320px;height:320px;}
.mgo-card{
  position:absolute;top:50%;left:50%;width:82px;height:108px;margin:-54px -41px;
  border-radius:12px;background:var(--surface);border:2px solid rgba(255,255,255,0.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;overflow:hidden;opacity:0;
  transform:translate(var(--cx,0px),var(--cy,0px)) rotate(var(--cr,0deg));
  will-change:transform,opacity,filter,box-shadow;
}
.mgo-card img{width:58px;height:58px;object-fit:contain;}
.mgo-card-tier{font-size:8px;font-weight:700;font-family:'Gmarket Sans',sans-serif;letter-spacing:1px;}
.mgo-card.charge{animation:mgo-shake 0.07s ease-in-out infinite alternate;}
@keyframes mgo-shake{
  from{transform:translate(var(--cx),var(--cy)) rotate(calc(var(--cr) - 0.5deg)) translateX(-1.5px);}
  to{transform:translate(var(--cx),var(--cy)) rotate(calc(var(--cr) + 0.5deg)) translateX(1.5px);}
}
.mgo-ring{position:absolute;top:50%;left:50%;width:120px;height:120px;margin:-60px -60px;border-radius:50%;border:2.5px solid var(--mgo-color,rgba(200,155,60,0.85));opacity:0;pointer-events:none;}
.mgo-ring.pop{animation:mgo-ring-wave 0.85s cubic-bezier(0.15,0.8,0.4,1) forwards;}
#mgo-ring2.pop{animation-delay:0.13s;}
#mgo-ring3.pop{animation-delay:0.26s;}
@keyframes mgo-ring-wave{0%{transform:scale(0);opacity:1;}100%{transform:scale(6.5);opacity:0;}}
.mgo-particles{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.mgo-spark{position:absolute;border-radius:50%;pointer-events:none;animation:mgo-spark-anim var(--dur,0.85s) ease-out var(--delay,0s) both;}
@keyframes mgo-spark-anim{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}}
.mgo-flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:1201;}
.mgo-flash.pop{animation:mgo-flash-burst 0.55s ease-out forwards;}
@keyframes mgo-flash-burst{0%{opacity:0.92;}20%{opacity:0.65;}100%{opacity:0;}}
.mgo-result{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;pointer-events:none;z-index:20;}
.mgo-result.show{pointer-events:auto;animation:mgo-result-enter 0.6s cubic-bezier(0.22,1.4,0.35,1) forwards;}
@keyframes mgo-result-enter{from{transform:translate(-50%,-50%) scale(0.1);opacity:0;filter:brightness(6);}55%{filter:brightness(1.4);}to{transform:translate(-50%,-50%) scale(1);opacity:1;filter:brightness(1);}}
.mgo-result-wrap{position:relative;width:126px;height:164px;}
.mgo-result-glow{position:absolute;inset:-18px;border-radius:24px;pointer-events:none;background:radial-gradient(ellipse at center,var(--mgo-glow,rgba(200,155,60,0.55)) 0%,transparent 65%);animation:mgo-glow-pulse 2.2s ease-in-out infinite;}
@keyframes mgo-glow-pulse{0%,100%{opacity:0.8;transform:scale(1);}50%{opacity:1;transform:scale(1.1);}}
.mgo-result-card{position:absolute;inset:0;border-radius:14px;background:var(--surface2);border:2px solid var(--mgo-color,rgba(200,155,60,0.8));box-shadow:0 0 28px var(--mgo-glow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;animation:mgo-float 3.2s ease-in-out infinite;}
@keyframes mgo-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.mgo-result-card.prism{animation:mgo-float 3.2s ease-in-out infinite,rainbow-border 2.5s linear infinite;}
.mgo-result-card img{width:84px;height:84px;object-fit:contain;}
.mgo-result-tier{font-family:'Gmarket Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;}
.mgo-champ-name{font-family:'Black Han Sans',sans-serif;font-size:26px;letter-spacing:1px;color:var(--rk-text);text-shadow:0 0 28px var(--mgo-color);}
.mgo-tier-badge{font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 16px;border-radius:20px;border:1px solid var(--mgo-color,rgba(200,155,60,0.7));color:var(--mgo-color);background:rgba(0,0,0,0.3);}
.mgo-btn{padding:12px 38px;border-radius:8px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(200,155,60,0.35);transition:transform 0.15s;}
.mgo-btn:hover{transform:translateY(-1px);}
.mgo-btn.prism{background:linear-gradient(135deg,#5010a0,var(--purple-light));color:#fff;box-shadow:0 4px 20px rgba(180,138,255,0.4);}

/* ── 하단 네비 (사이트 동일) ── */
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;z-index:100;display:flex;align-items:center;background:var(--surface);border-top:1px solid var(--border);padding:6px 8px 8px;gap:4px;}
.nav-tab{flex:1;padding:9px 2px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:clamp(10px,2.8vw,12px);text-align:center;line-height:1.3;}
.nav-tab.active{background:rgba(26,48,88,0.9);color:var(--gold);border:1px solid rgba(200,168,75,0.3);}

/* ══════════════════════════════════
   드라마틱 단일 뽑기 리빌 오버레이
   ══════════════════════════════════ */
.rv-overlay{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;overflow:hidden;}
.rv-overlay.show{display:flex;}
.rv-bg{position:absolute;inset:0;background:rgba(4,8,20,0.92);backdrop-filter:blur(8px);opacity:0;transition:opacity 0.3s ease;}
.rv-overlay.show .rv-bg{opacity:1;}
.rv-burst{position:absolute;width:120px;height:120px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,var(--rc-burst,rgba(154,184,208,0.9)) 0%,var(--rc-dim,rgba(100,155,195,0.4)) 40%,transparent 70%);opacity:0;pointer-events:none;}
.rv-overlay.burst .rv-burst{animation:burst-expand 0.7s cubic-bezier(0.15,0.85,0.4,1) forwards;}
@keyframes burst-expand{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}55%{opacity:0.75;}100%{transform:translate(-50%,-50%) scale(22);opacity:0;}}
.rv-rays{position:absolute;width:200vmax;height:200vmax;top:50%;left:50%;transform:translate(-50%,-50%);background:repeating-conic-gradient(from 0deg at 50% 50%,var(--rc-ray,rgba(154,184,208,0.07)) 0deg 7deg,transparent 7deg 22deg);opacity:0;pointer-events:none;transition:opacity 0.6s ease;}
.rv-overlay.burst .rv-rays{opacity:1;animation:rays-spin 18s linear infinite;}
@keyframes rays-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.rv-overlay.prism .rv-rays{background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(255,120,120,0.09) 0deg 4deg,rgba(255,200,80,0.09) 4deg 8deg,rgba(100,255,160,0.09) 8deg 12deg,rgba(80,180,255,0.09) 12deg 16deg,rgba(200,120,255,0.09) 16deg 20deg,transparent 20deg 36deg);}
.rv-glow{position:absolute;width:360px;height:360px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--rc-dim,rgba(100,155,195,0.25)) 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity 0.5s ease 0.3s;}
.rv-overlay.burst .rv-glow{opacity:1;animation:glow-pulse 2.2s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7;}50%{transform:translate(-50%,-50%) scale(1.12);opacity:1;}}
.rv-flash{position:absolute;inset:0;pointer-events:none;background:var(--rc-burst,rgba(154,184,208,0.5));opacity:0;}
.rv-overlay.flashing .rv-flash{animation:rv-flash-anim 0.35s ease-out forwards;}
@keyframes rv-flash-anim{0%{opacity:0.7;}100%{opacity:0;}}
.rv-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.rv-spark{position:absolute;border-radius:50%;pointer-events:none;animation:spark-fly 0.9s ease-out forwards;}
@keyframes spark-fly{0%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}}
.rv-stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0;opacity:0;pointer-events:none;}
.rv-stage.show{opacity:1;pointer-events:auto;animation:stage-in 0.55s cubic-bezier(0.22,1.4,0.4,1) forwards;}
@keyframes stage-in{from{transform:scale(0.5) translateY(40px);opacity:0;filter:brightness(4);}60%{filter:brightness(1.2);}to{transform:scale(1) translateY(0);opacity:1;filter:brightness(1);}}
.rv-flip-wrap{width:160px;height:210px;perspective:900px;margin-bottom:20px;cursor:pointer;position:relative;}
.rv-flip-wrap::before{content:'';position:absolute;inset:-8px;border-radius:20px;border:1px solid var(--rc,rgba(154,184,208,0.3));animation:ring-pulse 1.8s ease-in-out infinite;opacity:0;transition:opacity 0.4s;}
.rv-stage.show .rv-flip-wrap::before{opacity:1;}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.04);opacity:0.9;}}
.rv-stage.flipped .rv-flip-wrap::before{opacity:0!important;animation:none;}
.rv-flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);border-radius:16px;}
.rv-flip-inner.flipped{transform:rotateY(180deg);}
.rv-back,.rv-front{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;overflow:hidden;display:flex;flex-direction:column;}
.rv-back{align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--rc,rgba(100,155,195,0.5));box-shadow:0 0 20px var(--rc-dim,rgba(100,155,195,0.2));animation:back-glow 1.6s ease-in-out infinite;}
@keyframes back-glow{0%,100%{box-shadow:0 0 18px var(--rc-dim,rgba(100,155,195,0.2));}50%{box-shadow:0 0 42px var(--rc,rgba(154,184,208,0.5));}}
.rv-back-pattern{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0px,transparent 18px,rgba(255,255,255,0.012) 18px,rgba(255,255,255,0.012) 19px);}
.rv-back-sub{font-size:10px;color:var(--rc,#9ab8d0);letter-spacing:2px;margin-top:10px;font-family:'Gmarket Sans',sans-serif;font-weight:300;opacity:0.7;}
/* 효과 오버레이 — 3D 컨텍스트 밖, filter 안전 */
.rv-back-overlay{position:absolute;inset:0;border-radius:16px;overflow:hidden;pointer-events:none;opacity:0;transition:opacity 0.35s ease;}
.rv-back-overlay.show{opacity:1;}
.rv-back-splash{position:absolute;inset:0;border-radius:inherit;background-size:cover;background-position:50% 20%;filter:blur(20px) brightness(0.32) saturate(1.8);opacity:0;transition:opacity 1s ease;}
.rv-back-splash.on{opacity:1;}
.rv-back-vignette{position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse 60% 70% at 50% 45%,transparent 0%,rgba(5,11,20,0.65) 100%);pointer-events:none;}
.rv-back-sil-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.rv-back-sil{width:90px;height:90px;object-fit:contain;filter:brightness(0) opacity(0.55);display:block;}
.rv-front{transform:rotateY(180deg);align-items:stretch;background:rgba(5,11,20,0.98);border:2px solid rgba(154,184,208,0.3);}
.rv-splash{position:absolute;inset:0;z-index:0;border-radius:inherit;background-size:cover;background-position:50% 15%;filter:brightness(0.28) saturate(1.3);}
.rv-front-glow{position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(80,130,180,0.10) 0%,transparent 70%);}
.rv-img-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;padding:16px 12px 10px;}
.rv-front-img{width:100%;height:100%;object-fit:contain;}
.rv-front-no-img{font-size:40px;opacity:0.3;position:absolute;}
.rv-img-area::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,rgba(0,0,0,0.18));pointer-events:none;}
.rv-front-info{padding:10px 12px 18px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;
  background:linear-gradient(transparent,rgba(0,0,0,0.55) 50%,rgba(0,0,0,0.75) 100%);}
.rv-front-stars{font-size:16px;text-align:center;letter-spacing:3px;line-height:1;
  color:rgba(190,215,230,0.9);text-shadow:0 1px 6px rgba(0,0,0,0.95);}
@keyframes rainbow-border{0%{border-color:#ff6b6b;box-shadow:0 0 22px rgba(255,80,80,0.35);}33%{border-color:#69ff8e;box-shadow:0 0 22px rgba(80,255,120,0.35);}66%{border-color:#6bb5ff;box-shadow:0 0 22px rgba(80,150,255,0.35);}100%{border-color:#ff6b6b;}}
.rv-front.gold-face{background:rgba(14,10,3,0.98)!important;border-color:rgba(220,170,50,0.8)!important;box-shadow:0 0 24px rgba(200,155,60,0.35)!important;}
.rv-front.gold-face .rv-splash{filter:brightness(0.32) saturate(1.1) sepia(0.25);}
.rv-front.gold-face .rv-front-glow{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(220,170,50,0.12) 0%,transparent 70%);}
.rv-front.gold-face .rv-front-stars{color:rgba(230,180,50,0.95);text-shadow:0 1px 6px rgba(0,0,0,0.95);}
.rv-front.prism-face{background:rgba(10,5,22,0.98)!important;animation:pet-prism 4s ease-in-out infinite!important;}
.rv-front.prism-face .rv-splash{filter:brightness(0.24) saturate(1.8) hue-rotate(15deg);}
.rv-front.prism-face .rv-front-glow{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(180,100,255,0.12) 0%,transparent 70%);}
.rv-front.prism-face .rv-front-stars{color:rgba(210,145,255,1);text-shadow:0 0 8px rgba(180,100,255,0.7),0 1px 6px rgba(0,0,0,0.95);}
.rv-hint{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;margin-bottom:18px;animation:hint-blink 1.8s ease-in-out infinite;transition:opacity 0.3s;}
@keyframes hint-blink{0%,100%{opacity:0.35;}50%{opacity:0.8;}}
.rv-info{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:24px;opacity:0;transition:opacity 0.4s;}
.rv-info.show{opacity:1;}
.rv-champ-name{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--rk-text);letter-spacing:1px;text-shadow:0 0 20px var(--rc,rgba(154,184,208,0.6));}
.rv-tier-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 12px;border-radius:20px;border:1px solid var(--rc,rgba(154,184,208,0.5));color:var(--rc,#9ab8d0);background:rgba(0,0,0,0.3);}
.rv-flavor{font-size:11px;color:var(--text-dim);margin-top:2px;}
.rv-close-btn{width:200px;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:0.5px;box-shadow:0 4px 20px rgba(200,155,60,0.3);opacity:0;pointer-events:none;transition:opacity 0.35s,transform 0.15s;}
.rv-close-btn.show{opacity:1;pointer-events:auto;}
.rv-close-btn:hover{transform:translateY(-1px);}
.rv-close-btn.prism-btn{background:linear-gradient(135deg,#5010a0,var(--purple-light));color:#fff;box-shadow:0 4px 20px rgba(160,80,255,0.4);}
@keyframes info-up{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ══════════════════════════
   10연 뽑기 팝업
   ══════════════════════════ */
.ten-popup{display:none;position:fixed;inset:0;z-index:999;background:rgba(4,9,20,0.94);backdrop-filter:blur(7px);flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.ten-popup.show{display:flex;}
.ten-title{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);}
.ten-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:0 12px;}
.tc{width:84px;perspective:600px;position:relative;}
.tc-inner{width:84px;height:110px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.22,1,0.5,1);border-radius:12px;opacity:0;transform:translateY(20px);}
.tc-inner.entered{opacity:1;transform:translateY(0);}
.tc-inner.entered.flipped{transform:translateY(0) rotateY(180deg);}
.tc-front,.tc-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;overflow:hidden;}
.tc-back{background:var(--surface);border:1.5px solid var(--border);font-size:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tc-back-pattern{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0px,transparent 10px,rgba(255,255,255,0.012) 10px,rgba(255,255,255,0.012) 11px);}
/* 10연 카드 뒷면 오버레이 — 3D 컨텍스트 밖, filter 안전 */
.tc-back-overlay{position:absolute;inset:0;width:84px;height:110px;border-radius:12px;overflow:hidden;pointer-events:none;opacity:0;transition:opacity 0.3s ease;}
.tc-back-overlay.show{opacity:1;}
.tc-inner.flipped~.tc-back-overlay{opacity:0!important;transition:opacity 0.15s ease;}
.tc-ov-splash{position:absolute;inset:0;border-radius:inherit;background-size:cover;background-position:50% 20%;filter:blur(14px) brightness(0.3) saturate(1.8);opacity:0;transition:opacity 0.9s ease;}
.tc-ov-splash.on{opacity:1;}
.tc-ov-vignette{position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse 55% 65% at 50% 45%,transparent 0%,rgba(5,11,20,0.62) 100%);pointer-events:none;}
.tc-ov-sil-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.tc-ov-sil{width:52px;height:52px;object-fit:contain;filter:brightness(0) opacity(0.5);display:block;}
.tc-front{background:rgba(5,11,20,0.98);transform:rotateY(180deg);display:flex;flex-direction:column;align-items:stretch;
  box-shadow:0 0 0 1px rgba(180,210,230,0.18),0 2px 8px rgba(0,0,0,0.5);}
.tc-splash{position:absolute;inset:0;z-index:0;border-radius:inherit;
  background-size:cover;background-position:50% 12%;
  filter:brightness(0.28) saturate(1.3);}
.tc-front.gold-face .tc-splash{filter:brightness(0.32) saturate(1.1) sepia(0.25);}
.tc-front.prism-face .tc-splash{filter:brightness(0.24) saturate(1.8) hue-rotate(15deg);}
.tc-glow-layer{position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(80,130,180,0.08) 0%,transparent 70%);}
.tc-img-area{height:56px;flex:none;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;padding:6px 5px 4px;}
.tc-img-area img{width:100%;height:100%;object-fit:contain;display:block;}
.tc-img-area::after{content:'';position:absolute;bottom:0;left:0;right:0;height:18px;
  background:linear-gradient(transparent,rgba(0,0,0,0.18));pointer-events:none;}
.tc-info{padding:4px 5px 6px;display:flex;flex-direction:column;gap:2px;
  position:relative;z-index:2;
  background:linear-gradient(transparent,rgba(0,0,0,0.55) 60%,rgba(0,0,0,0.72) 100%);}
.tc-name{font-size:9px;font-weight:700;color:var(--rk-text);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.tc-stars{font-size:10px;text-align:center;letter-spacing:1.5px;line-height:1;
  color:rgba(190,215,230,0.85);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.tc-inner[data-star="2"] .tc-back{border-color:rgba(200,155,60,0.5);animation:hint-gold-sm 1.4s ease-in-out infinite;}
@keyframes hint-gold-sm{0%,100%{box-shadow:0 0 6px rgba(200,155,60,0.15);}50%{box-shadow:0 0 16px rgba(200,155,60,0.4);}}
.tc-inner[data-star="3"] .tc-back{animation:hint-prism-sm 2s linear infinite;}
@keyframes hint-prism-sm{0%{border-color:rgba(200,110,255,0.6);}50%{border-color:rgba(230,90,210,0.6);}100%{border-color:rgba(200,110,255,0.6);}}
.tc-front.gold-face{background:rgba(14,10,3,0.98)!important;
  box-shadow:0 0 0 2px rgba(220,170,50,0.85),0 0 10px 1px rgba(200,155,60,0.45)!important;}
.tc-front.gold-face .tc-glow-layer{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(220,170,50,0.12) 0%,transparent 70%);}
.tc-front.gold-face .tc-stars{color:rgba(230,180,50,0.95);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.tc-front.prism-face{background:rgba(10,5,22,0.98)!important;animation:pet-prism 4s ease-in-out infinite!important;}
.tc-front.prism-face .tc-glow-layer{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(180,100,255,0.12) 0%,transparent 70%);}
.tc-front.prism-face .tc-stars{color:rgba(210,145,255,1);text-shadow:0 0 6px rgba(180,100,255,0.6),0 1px 4px rgba(0,0,0,0.9);}
.tc-inner.flipped{cursor:pointer;}
/* ── 카드 줌 오버레이 ── */
.card-zoom-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(4,9,20,0.93);backdrop-filter:blur(16px);align-items:center;justify-content:center;flex-direction:column;gap:16px;cursor:pointer;overflow-y:auto;padding:20px 0;}
.card-zoom-overlay.show{display:flex;}
.cz-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:default;}
/* 줌 카드 자체 */
.cz-card-host .pet-card{width:190px;border-radius:16px;cursor:default!important;animation:cz-enter 0.32s cubic-bezier(0.34,1.5,0.64,1) both;}
.cz-card-host .pc-pet-wrap{flex:none;height:54%;padding:4px 16px 0;}
.cz-card-host .pc-bottom{flex:1;padding:7px 12px 14px;gap:3px;justify-content:flex-end;background:linear-gradient(transparent,rgba(0,0,0,0.72) 30%);}
.cz-card-host .pc-name{font-size:16px;}
.cz-card-host .pc-role{display:none;}
.cz-card-host .pc-stars{display:none;}
.cz-card-host .pc-tier-label{font-size:9.5px;}
.cz-card-host .pc-num{font-size:8.5px;}
.cz-card-host .pet-cnt-badge{font-size:9px;padding:2px 6px;top:7px;right:7px;border-radius:5px;}
@keyframes cz-enter{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
/* 상세 정보 패널 */
.cz-detail{
  width:190px;background:rgba(10,18,34,0.97);
  border:1px solid rgba(255,255,255,0.08);border-radius:13px;
  padding:14px 15px;display:flex;flex-direction:column;gap:9px;
  animation:cz-enter 0.38s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
}
.czd-header{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.czd-role-chip{font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:0.8px;white-space:nowrap;}
.czd-stars{font-size:17px;letter-spacing:3px;line-height:1;}
.czd-desc{font-size:10px;color:rgba(170,195,220,0.55);line-height:1.65;border-left:2px solid rgba(255,255,255,0.08);padding-left:9px;}
.czd-divider{height:1px;background:rgba(255,255,255,0.06);}
.czd-stats{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;}
.czd-stat{display:flex;flex-direction:column;gap:1px;padding:8px 10px;}
.czd-stat:first-child{border-right:1px solid rgba(255,255,255,0.07);}
.czd-stat-label{font-size:8px;color:var(--text-dim);letter-spacing:0.5px;}
.czd-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;}
.czd-merge-hint{font-size:10px;color:var(--text-dim);text-align:center;padding:3px 0;}
.czd-merge-btn-big{width:100%;padding:9px;border-radius:8px;border:1px solid rgba(180,138,255,0.45);background:rgba(70,35,170,0.22);color:var(--purple-light);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;}
.czd-merge-btn-big:hover{background:rgba(100,60,200,0.45);transform:translateY(-1px);}
.czd-max-badge{text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;padding:4px;color:rgba(212,155,255,0.7);}
/* 카드 줌 — 타입 + 효과 행 */
.czd-type-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.czd-type-chip{font-size:9px;font-weight:700;letter-spacing:0.5px;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.czd-type-chip.atk{color:#ffaa77;background:rgba(255,100,50,0.15);border:1px solid rgba(255,100,50,0.3);}
.czd-type-chip.def{color:#77beff;background:rgba(60,130,255,0.15);border:1px solid rgba(60,130,255,0.3);}
.czd-type-chip.sup{color:#88ffcc;background:rgba(60,220,120,0.15);border:1px solid rgba(60,220,120,0.3);}
.czd-eff-txt{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.2px;text-align:right;}
.cz-hint{font-size:11px;color:rgba(255,255,255,0.22);letter-spacing:1px;pointer-events:none;}
.tc:not(.done){cursor:pointer;}

/* ══════════════════════
   도감 (Pokédex 스타일)
   ══════════════════════ */
/* ══════════════════════
   도감 — 단체 씬 스타일
   ══════════════════════ */
.dex-count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dex-count{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);background:rgba(200,155,60,0.1);border:1px solid rgba(200,155,60,0.25);border-radius:10px;padding:2px 8px;}

/* 씬 전체 컨테이너 */
.dex-scene{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:
    radial-gradient(ellipse 90% 40% at 50% 100%, rgba(255,255,255,0.025) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(3,8,18,0.0) 0%, rgba(2,6,14,0.75) 100%);
  border:1px solid rgba(255,255,255,0.05);
  padding:10px 6px 0;
  display:flex;
  flex-wrap:wrap;
  align-items:flex-end;
}
/* 바닥면 반사 */
.dex-scene::after{
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:38px;
  background:linear-gradient(transparent, rgba(2,6,14,0.92));
  pointer-events:none;
}

/* 개별 캐릭터 */
.dex-figure{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:calc(100%/9);
  position:relative;
  z-index:1;
  transition:transform 0.18s ease, filter 0.18s ease;
}
/* 짝수 번째는 살짝 뒤로 물려 입체감 */
.dex-figure:nth-child(even){transform:scaleY(0.92) translateY(3px);transform-origin:bottom center;}
.dex-figure.owned:hover{transform:scaleY(1.08) translateY(-5px)!important;z-index:3;}
.dex-figure.owned:nth-child(even):hover{transform:scaleY(1.08) translateY(-5px)!important;}

/* 이미지 영역 */
.dex-fig-img-wrap{
  width:100%;
  height:60px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  overflow:visible;
}
.dex-fig-img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  object-position:bottom center;
  display:block;
}
/* 획득: 티어별 글로우 */
.dex-figure.owned.t1 .dex-fig-img{filter:drop-shadow(0 3px 6px rgba(0,0,0,0.9)) drop-shadow(0 0 6px rgba(155,200,225,0.18));}
.dex-figure.owned.t2 .dex-fig-img{filter:drop-shadow(0 3px 8px rgba(0,0,0,0.9)) drop-shadow(0 0 10px rgba(200,155,50,0.35));}
.dex-figure.owned.t3 .dex-fig-img{filter:drop-shadow(0 3px 8px rgba(0,0,0,0.9)) drop-shadow(0 0 12px rgba(180,90,255,0.45));}
/* 미획득: 실루엣 (약간 보이게) */
.dex-figure.locked .dex-fig-img{filter:brightness(0) opacity(0.38);}

/* 이름 */
.dex-fig-name{
  font-size:7.5px;font-weight:700;
  text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  width:100%;
  padding:2px 1px 5px;
  position:relative;z-index:1;
  line-height:1;
}
.dex-figure.owned .dex-fig-name{color:rgba(255,255,255,0.5);}
.dex-figure.locked  .dex-fig-name{color:rgba(255,255,255,0.1);}

/* 섹션 구분자 */
.dex-section{margin-bottom:16px;}
.dex-section:last-child{margin-bottom:0;}
.dex-sec-head{
  display:flex;align-items:center;gap:7px;
  padding:0 2px 8px;
  margin-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.dex-sec-star{font-size:11px;line-height:1;}
.dex-sec-title{font-family:'Gmarket Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;}
.dex-sec-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;margin-left:auto;}
.dex-sec-head.t1 .dex-sec-star,.dex-sec-head.t1 .dex-sec-title{color:rgba(188,215,232,0.8);}
.dex-sec-head.t1 .dex-sec-count{color:rgba(188,215,232,0.5);}
.dex-sec-head.t2 .dex-sec-star,.dex-sec-head.t2 .dex-sec-title{color:rgba(232,182,52,0.9);}
.dex-sec-head.t2 .dex-sec-count{color:rgba(210,165,50,0.6);}
.dex-sec-head.t3 .dex-sec-star,.dex-sec-head.t3 .dex-sec-title{color:rgba(210,145,255,0.95);}
.dex-sec-head.t3 .dex-sec-count{color:rgba(180,138,255,0.6);}

/* 시너지 구분선 */
.dex-cat-sep{
  display:flex;align-items:center;gap:8px;
  margin:18px 0 12px;
  font-family:'Gmarket Sans',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;color:rgba(255,255,255,0.22);
}
.dex-cat-sep::before,.dex-cat-sep::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);
}
/* 시너지 섹션 헤더 색상 */
.dex-sec-head.syn-attack .dex-sec-star,
.dex-sec-head.syn-attack .dex-sec-title{color:rgba(255,105,105,0.9);}
.dex-sec-head.syn-attack .dex-sec-count{color:rgba(255,100,100,0.5);}
.dex-sec-head.syn-attack{border-color:rgba(255,80,80,0.1);}
.dex-sec-head.syn-defense .dex-sec-star,
.dex-sec-head.syn-defense .dex-sec-title{color:rgba(80,175,255,0.9);}
.dex-sec-head.syn-defense .dex-sec-count{color:rgba(70,160,255,0.5);}
.dex-sec-head.syn-defense{border-color:rgba(60,140,255,0.1);}
.dex-sec-head.syn-support .dex-sec-star,
.dex-sec-head.syn-support .dex-sec-title{color:rgba(80,220,165,0.9);}
.dex-sec-head.syn-support .dex-sec-count{color:rgba(60,200,145,0.5);}
.dex-sec-head.syn-support{border-color:rgba(40,200,140,0.1);}
/* 시너지 씬 */
.dex-syn-scene{justify-content:flex-start;}
.dex-syn-scene .dex-figure{width:calc(100%/9);}

/* 커스텀 드롭다운 */
.dex-syn-dd{position:relative;margin-left:auto;}
.dex-syn-dd-btn{
  display:flex;align-items:center;gap:5px;
  padding:3px 8px 3px 9px;
  border-radius:5px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:var(--text-dim);
  font-size:9px;font-weight:700;
  font-family:'Gmarket Sans',sans-serif;
  letter-spacing:0.8px;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
  white-space:nowrap;
}
.dex-syn-dd-btn:hover{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.07);}
.dd-arrow{font-size:7px;opacity:0.5;transition:transform 0.18s;line-height:1;}
.dex-syn-dd.open .dd-arrow{transform:rotate(180deg);}
.dex-syn-dd-menu{
  display:none;
  position:absolute;right:0;top:calc(100% + 5px);z-index:300;
  min-width:90px;
  background:rgba(8,14,28,0.98);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:8px;overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,0.75);
}
.dex-syn-dd.open .dex-syn-dd-menu{display:block;animation:dd-drop 0.14s ease;}
@keyframes dd-drop{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.dex-syn-dd-item{
  padding:8px 13px;
  font-size:9px;font-weight:700;
  font-family:'Gmarket Sans',sans-serif;
  letter-spacing:1px;color:var(--text-dim);
  cursor:pointer;transition:background 0.1s;
}
.dex-syn-dd-item:hover{background:rgba(255,255,255,0.06);}
.dex-syn-dd-item.sel.t1{color:rgba(188,215,232,0.95);}
.dex-syn-dd-item.sel.t2{color:rgba(232,182,52,1);}
.dex-syn-dd-item.sel.t3{color:rgba(210,145,255,1);}
/* 버튼 시너지 색상 */
.syn-attack .dex-syn-dd-btn{border-color:rgba(255,80,80,0.28);color:rgba(255,105,105,0.9);}
.syn-defense .dex-syn-dd-btn{border-color:rgba(60,140,255,0.28);color:rgba(80,175,255,0.9);}
.syn-support .dex-syn-dd-btn{border-color:rgba(40,200,140,0.28);color:rgba(80,220,165,0.9);}

/* 시너지 효과 설명 */
.dex-syn-effect{
  display:flex;align-items:flex-start;gap:9px;
  margin-top:6px;padding:9px 11px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.02);
  transition:border-color 0.3s,background 0.3s;
}
.dex-syn-effect.active{
  border-color:rgba(200,155,50,0.3);
  background:rgba(200,155,50,0.06);
}
.dex-syn-eff-icon{font-size:14px;flex-shrink:0;line-height:1.4;}
.dex-syn-eff-body{flex:1;display:flex;flex-direction:column;gap:3px;}
.dex-syn-eff-label{font-size:8.5px;font-weight:700;font-family:'Gmarket Sans',sans-serif;letter-spacing:0.5px;color:rgba(255,255,255,0.25);}
.dex-syn-effect.active .dex-syn-eff-label{color:var(--gold);}
.dex-syn-eff-desc{font-size:9px;color:rgba(255,255,255,0.28);line-height:1.55;}
.dex-syn-effect.active .dex-syn-eff-desc{color:rgba(220,235,255,0.65);}
.dex-syn-eff-need{font-size:8px;color:rgba(255,255,255,0.18);margin-top:1px;}
.dex-syn-eff-badge{
  align-self:center;flex-shrink:0;
  font-size:8px;font-weight:700;letter-spacing:0.8px;
  padding:2px 8px;border-radius:10px;
  color:var(--gold-light);
  border:1px solid rgba(200,155,50,0.45);
  background:rgba(200,155,50,0.1);
  animation:eff-badge-glow 2s ease-in-out infinite;
}
@keyframes eff-badge-glow{0%,100%{box-shadow:none;}50%{box-shadow:0 0 9px rgba(200,155,50,0.45);}}
@keyframes tc-pop{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
.tc.popping{animation:tc-pop 0.35s ease;}
@keyframes popup-shake{0%,100%{transform:translate(0,0);}15%{transform:translate(-5px,-3px);}30%{transform:translate(5px,3px);}45%{transform:translate(-4px,4px);}60%{transform:translate(4px,-4px);}75%{transform:translate(-2px,2px);}90%{transform:translate(2px,-2px);}};
.ten-popup.shake{animation:popup-shake 0.45s ease;}
@keyframes rare-flash{0%{opacity:0.8;}100%{opacity:0;}}
.rare-flash-overlay{position:fixed;inset:0;z-index:1001;pointer-events:none;opacity:0;}
.rare-flash-overlay.pop{animation:rare-flash 0.5s ease-out forwards;}
.ten-btn-row{display:flex;gap:10px;align-items:center;}
.ten-open-all{padding:9px 22px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.15s;}
.ten-open-all:hover{background:rgba(255,255,255,0.1);color:var(--text);}
.ten-confirm{padding:9px 32px;border-radius:8px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 4px 16px rgba(200,155,60,0.3);display:none;}
.ten-confirm.show{display:block;}
</style>
</head>

<script>
const CHAMPS = [

const _sfx = (()=>{
  let _ac=null;
  const ac=()=>{ if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended') _ac.resume(); return _ac; };
  const tone=(f,type='sine',t=0,dur=0.3,vol=0.13,att=0.01)=>{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;
    o.frequency.setValueAtTime(f,a.currentTime+t);
    g.gain.setValueAtTime(0,a.currentTime+t);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+t+att);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    o.start(a.currentTime+t);o.stop(a.currentTime+t+dur+0.05);
  };
  const sweep=(f0,f1,type='sine',t=0,dur=0.3,vol=0.15)=>{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;
    o.frequency.setValueAtTime(f0,a.currentTime+t);
    o.frequency.exponentialRampToValueAtTime(f1,a.currentTime+t+dur);
    g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    o.start(a.currentTime+t);o.stop(a.currentTime+t+dur+0.05);
  };
  const nz=(t=0,dur=0.2,vol=0.12,lp=4000,hp=200)=>{
    const a=ac();
    const buf=a.createBuffer(1,Math.ceil(a.sampleRate*dur),a.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=a.createBufferSource();src.buffer=buf;
    const f1=a.createBiquadFilter();f1.type='lowpass';f1.frequency.value=lp;
    const f2=a.createBiquadFilter();f2.type='highpass';f2.frequency.value=hp;
    const g=a.createGain();
    g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    src.connect(f1);f1.connect(f2);f2.connect(g);g.connect(a.destination);
    src.start(a.currentTime+t);
  };
  return {
    // 단일 뽑기 오버레이 열림
    pullOpen(){ nz(0,0.4,0.1,5000,1500); tone(200,'sine',0,0.45,0.05,0.05); },
    // 카드 뒤집기
    flip(){ tone(1000,'triangle',0,0.08,0.1,0.003); tone(700,'sine',0.04,0.07,0.07,0.003); },
    // 티어별 공개 사운드
    reveal(star){
      if(star===3){
        [523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',i*0.07,0.5,0.14,0.01));
        nz(0.3,0.35,0.08,9000,2000);
        tone(2093,'sine',0.36,0.7,0.1,0.02);
      }else if(star===2){
        [523,659,784].forEach((f,i)=>tone(f,'sine',i*0.05,0.5,0.13,0.01));
        nz(0,0.18,0.06,5000,1000);
      }else{
        tone(523,'sine',0,0.28,0.1,0.01);
        tone(659,'sine',0.1,0.22,0.08,0.01);
      }
    },
    // 희귀 카드 (10연)
    rareCard(star){
      if(star===3){ nz(0,0.1,0.12,6000,2000); tone(880,'sine',0,0.3,0.14,0.01); }
      else if(star===2){ nz(0,0.07,0.08,4000,1500); tone(660,'sine',0,0.22,0.11,0.01); }
    },
    // 합성 - 카드 등장
    mergeAppear(){ tone(440,'sine',0,0.22,0.06,0.02); nz(0,0.12,0.04,3000,500); },
    // 합성 - 차지 (에너지 빌드업)
    mergeCharge(){ sweep(80,220,'sawtooth',0,0.75,0.07); sweep(160,440,'square',0,0.75,0.025); nz(0,0.75,0.03,1800,40); },
    // 합성 - 날아들기 whoosh
    mergeFly(){
      const a=ac();
      const buf=a.createBuffer(1,Math.ceil(a.sampleRate*0.32),a.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=a.createBufferSource();src.buffer=buf;
      const f=a.createBiquadFilter();f.type='bandpass';
      f.frequency.setValueAtTime(3500,a.currentTime);
      f.frequency.exponentialRampToValueAtTime(250,a.currentTime+0.32);
      f.Q.value=1.5;
      const g=a.createGain();
      g.gain.setValueAtTime(0.001,a.currentTime);g.gain.linearRampToValueAtTime(0.32,a.currentTime+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.32);
      src.connect(f);f.connect(g);g.connect(a.destination);src.start();
    },
    // 합성 - 충격
    mergeImpact(toStar){
      sweep(160,30,'sine',0,0.45,0.42); nz(0,0.12,0.35,900,20); nz(0,0.07,0.2,14000,4000);
      if(toStar>=2) tone(toStar===3?220:180,'sine',0.06,0.5,0.07,0.02);
    },
    // 합성 - 결과 등장
    mergeReveal(toStar){ this.reveal(toStar); },
  };
})();

function switchTab(tab, btn){
  // 카드 탭에서 나갈 때 NEW 표시 제거
  if(currentTab === 'card' && tab !== 'card') newCards.clear();
  currentTab = tab;
  // 최상단 뽑기/카드/도감 탭 버튼만 active 토글
  ['pull','card','dex'].forEach(t=>{
    const b = document.querySelector(`.sp-cat-tab[onclick*="switchTab('${t}'"]`);
    if(b) b.classList.remove('active');
  });
  btn.classList.add('active');
  ['pull','card','dex'].forEach(t=>{
    const el = document.getElementById('tab-'+t);
    if(el) el.style.display = t===tab ? '' : 'none';
  });
  if(tab==='card') render();
  if(tab==='dex')  renderDex();
}

function _dexFigure(slug, kr, star, hasEver){
  const imgSrc = IMG(slug, star);
  const fallback = star > 1 ? `this.onerror=null;this.src='${IMG(slug,1)}';` : `this.style.opacity='0';`;
  return `<div class="dex-figure ${hasEver?'owned':'locked'} t${star}">
    <div class="dex-fig-img-wrap">
      <img class="dex-fig-img" src="${imgSrc}" alt="${kr}" onerror="${fallback}">
    </div>
    <span class="dex-fig-name">${hasEver?kr:'???'}</span>
  </div>`;
}

function renderDex(){
  const TIER_STAR = {1:'★',2:'★★',3:'★★★'};
  const TIER_NAME = {1:'SILVER',2:'GOLD',3:'PRISM'};
  let totalObtained = 0;

  // ── 티어별 섹션 (실버/골드/프리즘) ──
  const tierHtml = [1,2,3].map(s=>{
    const eKey = `e${s}`;
    let cnt = 0;
    const figures = CHAMPS.map(({slug,kr})=>{
      const hasEver = ge(slug)[eKey] || (gp(slug)[`s${s}`]||0) > 0;
      if(hasEver){ cnt++; totalObtained++; }
      return _dexFigure(slug, kr, s, hasEver);
    }).join('');
    return `<div class="dex-section">
      <div class="dex-sec-head t${s}">
        <span class="dex-sec-star">${TIER_STAR[s]}</span>
        <span class="dex-sec-title">${TIER_NAME[s]}</span>
        <span class="dex-sec-count">${cnt} / ${CHAMPS.length}</span>
      </div>
      <div class="dex-scene">${figures}</div>
    </div>`;
  }).join('');

  // ── 시너지 섹션 (공격/방어/지원) ──
  const TIER_LABEL_MAP = {1:'SILVER',2:'GOLD',3:'PRISM'};
  const synHtml = SYNERGY_GROUPS.map(grp=>{
    const s = dexSynTiers[grp.sid];
    const eKey = `e${s}`;
    const members = CHAMPS.filter(c=>grp.roles.includes(c.role));
    let cnt = 0;
    const figures = members.map(({slug,kr})=>{
      const hasEver = ge(slug)[eKey] || (gp(slug)[`s${s}`]||0) > 0;
      if(hasEver) cnt++;
      return _dexFigure(slug, kr, s, hasEver);
    }).join('');
    // 효과 활성화: 어느 티어든 전원 보유 시
    const allOwned = members.every(({slug})=>{ const e=ge(slug),p=gp(slug); return e.e1||e.e2||e.e3||p.s1>0||p.s2>0||p.s3>0; });
    const remaining = members.filter(({slug})=>{ const e=ge(slug),p=gp(slug); return !(e.e1||e.e2||e.e3||p.s1>0||p.s2>0||p.s3>0); }).length;
    const effHtml = `<div class="dex-syn-effect${allOwned?' active':''}">
      <span class="dex-syn-eff-icon">${grp.effIcon}</span>
      <div class="dex-syn-eff-body">
        <span class="dex-syn-eff-label">${allOwned?'✦ 시너지 활성화':'시너지 효과'}</span>
        <span class="dex-syn-eff-desc" id="syn-eff-${grp.sid}">${grp.synTiers[s-1]?.txt||grp.synTiers[grp.synTiers.length-1].txt}</span>
        ${!allOwned?`<span class="dex-syn-eff-need">${remaining}종 더 수집하면 활성화</span>`:''}
      </div>
      ${allOwned?`<span class="dex-syn-eff-badge">ACTIVE</span>`:''}
    </div>`;
    // 드롭다운
    const items = [[1,'SILVER'],[2,'GOLD'],[3,'PRISM']].map(([v,l])=>
      `<div class="dex-syn-dd-item t${v}${s===v?' sel':''}" onclick="selectSynDD(this,'${grp.sid}',${v})">${l}</div>`).join('');
    const dd = `<div class="dex-syn-dd" id="syn-dd-${grp.sid}">
      <button class="dex-syn-dd-btn" onclick="toggleSynDD('${grp.sid}')">
        <span id="syn-dd-label-${grp.sid}">${TIER_LABEL_MAP[s]}</span>
        <span class="dd-arrow">▾</span>
      </button>
      <div class="dex-syn-dd-menu">${items}</div>
    </div>`;
    return `<div class="dex-section">
      <div class="dex-sec-head ${grp.id}">
        <span class="dex-sec-star">${grp.icon}</span>
        <span class="dex-sec-title">${grp.label}</span>
        <span class="dex-sec-count" id="syn-cnt-${grp.sid}">${cnt} / ${members.length}</span>
        ${dd}
      </div>
      <div class="dex-scene dex-syn-scene" id="syn-scene-${grp.sid}">${figures}</div>
      ${effHtml}
    </div>`;
  }).join('');

  document.getElementById('dex-all').innerHTML =
    tierHtml +
    `<div class="dex-cat-sep">◈ 시너지</div>` +
    synHtml;
  document.getElementById('dex-count').textContent = `${totalObtained} / ${CHAMPS.length * 3}`;
}

function toggleSynDD(sid){
  const dd = document.getElementById(`syn-dd-${sid}`);
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.dex-syn-dd.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) dd.classList.add('open');
}
function selectSynDD(item, sid, star){
  document.getElementById(`syn-dd-${sid}`).classList.remove('open');
  document.getElementById(`syn-dd-label-${sid}`).textContent = item.textContent;
  item.closest('.dex-syn-dd-menu').querySelectorAll('.dex-syn-dd-item').forEach(i=>i.classList.remove('sel'));
  item.classList.add('sel');
  switchSynTier(sid, star);
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.dex-syn-dd'))
    document.querySelectorAll('.dex-syn-dd.open').forEach(d=>d.classList.remove('open'));
});
function switchSynTier(sid, star){
  dexSynTiers[sid] = star;
  const grp = SYNERGY_GROUPS.find(g=>g.sid===sid);
  if(!grp) return;
  const eKey = `e${star}`;
  const members = CHAMPS.filter(c=>grp.roles.includes(c.role));
  let cnt = 0;
  const figures = members.map(({slug,kr})=>{
    const hasEver = ge(slug)[eKey] || (gp(slug)[`s${star}`]||0) > 0;
    if(hasEver) cnt++;
    return _dexFigure(slug, kr, star, hasEver);
  }).join('');
  document.getElementById(`syn-scene-${sid}`).innerHTML = figures;
  document.getElementById(`syn-cnt-${sid}`).textContent = `${cnt} / ${members.length}`;
  const effEl = document.getElementById(`syn-eff-${sid}`);
  if(effEl) effEl.textContent = grp.synTiers[star-1]?.txt||grp.synTiers[grp.synTiers.length-1].txt;
}

function doPull(times){
  const cost = times===1 ? 50 : 450;
  if(gold<cost){ setResult(`🪙 골드 부족! (보유 ${gold}G)`); return; }
  gold -= cost;
  document.getElementById('gold-display').textContent = gold;
  updateBtns();
  const results = [];
  for(let i=0;i<times;i++){
    const c = CHAMPS[Math.floor(Math.random()*CHAMPS.length)];
    const s = rollStar();
    const p = gp(c.slug);
    inv[c.slug] = {...p, [`s${s}`]: p[`s${s}`]+1};
    ever[c.slug] = {...ge(c.slug), [`e${s}`]: true};
    newCards.add(`${c.slug}_${s}`);
    results.push({...c, star:s});
  }
  if(times===1){
    const c = results[0];
    clearInterval(previewTimer);
    const img = document.getElementById('preview-img');
    const img10 = document.getElementById('preview-img-10');
    if(img){ img.style.opacity='0'; }
    if(img10){ img10.style.opacity='0'; }
    setTimeout(()=>{
      if(img){ img.onerror=null; img.src=IMG(c.slug,c.star); img.style.opacity='1'; }
      if(img10){ img10.onerror=null; img10.src=IMG(c.slug,c.star); img10.style.opacity='1'; }
    }, 200);
    setTimeout(startPreviewCycle, 3500);
    showReveal(c, c.star);
  } else {
    showTenResultPopup(results);
  }
  updateColHeader();
  // 카드 탭이 열린 상태면 즉시 NEW 배지 반영
  if(currentTab==='card') render();
}

function updateColHeader(){

  document.getElementById('col-count-header').textContent = `${total} / ${CHAMPS.length}`;
  if(currentTab==='dex') renderDex();
}

const _petExists = {};
CHAMPS.forEach(c => {
  const img = new Image();
  img.onload  = () => { _petExists[c.slug] = true; };
  img.onerror = () => { _petExists[c.slug] = false; };
  img.src = IMG(c.slug);
});

function _startSilCycle(){
  const sil = document.getElementById('rv-back-sil');
  if(!sil || !CHAMPS.length) return;
  // 있는 이미지만 순환, 아직 모르면 일단 전체 포함
  const pool = () => CHAMPS.filter(c => _petExists[c.slug] !== false);
  let list = pool(), i = Math.floor(Math.random() * Math.max(list.length,1));
  const show = () => {
    list = pool();
    if(!list.length) return;
    i = (i+1) % list.length;
    sil.onerror = null;
    sil.src = IMG(list[i].slug);
  };
  show();
  _silTimer = setInterval(show, 90);
}
function _stopSilCycle(){
  clearInterval(_silTimer); _silTimer = null;
}
function _startTenSilCycle(){
  _tenSilIdx = Math.floor(Math.random() * CHAMPS.length);
  _tenSilTimer = setInterval(()=>{
    const pool = CHAMPS.filter(c => _petExists[c.slug] !== false);
    if(!pool.length) return;
    _tenSilIdx = (_tenSilIdx + 1) % pool.length;
    const src = IMG(pool[_tenSilIdx].slug);
    document.querySelectorAll('.tc-ov-sil').forEach(img=>{ img.onerror=null; img.src=src; });

}

function doMerge(slug, fromStar){
  const p=gp(slug); const sKey=`s${fromStar}`, nKey=`s${fromStar+1}`;
  if(p[sKey]<3){ setResult('재료 부족! (같은 펫 3개 필요)'); return; }
  inv[slug]={...p,[sKey]:p[sKey]-3,[nKey]:p[nKey]+1};
  ever[slug]={...ge(slug),[`e${fromStar+1}`]:true};
  const c=CHAMPS.find(c=>c.slug===slug);
  render(); updateColHeader();
  showMergeAnim(slug, fromStar, fromStar+1, c.kr);
}

    return `<div class="pet-card t${star} ${isOwned?'owned':'locked'}${isNew?' is-new':''}" ${isOwned?`onclick="if(!event.target.closest('button'))showCardZoom('${slug}',${star},${cnt})"`:''}">

        <div class="pc-role">${isOwned?roleText:''}</div>
        ${isOwned?`<div class="pc-type-row"><span class="pc-type-chip ${typeClass}">${typeLabel}</span><span class="pc-eff-txt">${effTxt}</span></div>`:''}
        <div class="pc-stars">${isOwned?STAR_CHARS[star]:''}</div>
        ${mergeBtn}
      </div>
    </div>`;
  }).join('');
  document.getElementById('pet-grid').innerHTML=html;
  document.getElementById('col-count').textContent=`${owned} / ${CHAMPS.length}`;
  updateColHeader();
  updateBtns();
}

function setResult(msg){ document.getElementById('gacha-result').textContent=msg; }
function updateBtns(){
  document.getElementById('btn1').disabled  = gold<50;
  document.getElementById('btn10').disabled = gold<450;
}

updateColHeader();

function showCardZoom(slug, star, cnt){
  const STAR_CHARS={1:'★',2:'★★',3:'★★★'};
  const c=CHAMPS.find(c=>c.slug===slug);
  const kr=c?.kr||slug;
  const roleText=ROLE_KR[c?.role]||'';
  const desc=c?.desc||'';
  const idx=CHAMPS.findIndex(c=>c.slug===slug);
  const numStr='#'+String(idx+1).padStart(3,'0');
  const typeLabel = GACHA_PET_TYPE(c?.role);
  const typeClass = typeLabel==='공격형'?'atk':typeLabel==='방어형'?'def':'sup';
  // 인벤토리에서 정확한 보유 수 재계산
  const ownedCnt = gp(slug)[`s${star}`] || 0;
  const cntBadge=ownedCnt>1?`<div class="pet-cnt-badge ${star===3?'t3':''}">×${ownedCnt}</div>`:'';

  // 티어별 컬러
  const tierCol = {
    1:{chip:'rgba(188,215,232,0.9)', chipBg:'rgba(120,170,210,0.14)', chipBd:'rgba(188,215,232,0.3)', stars:'rgba(188,215,232,0.9)', val:'rgba(195,220,240,1)'},
    2:{chip:'rgba(232,185,60,0.95)', chipBg:'rgba(200,150,40,0.14)',  chipBd:'rgba(232,185,60,0.35)',  stars:'rgba(232,182,52,0.96)', val:'rgba(232,185,60,1)'},
    3:{chip:'rgba(212,155,255,0.95)',chipBg:'rgba(140,80,255,0.14)',  chipBd:'rgba(212,155,255,0.35)', stars:'rgba(212,148,255,1)',   val:'rgba(215,155,255,1)'},
  }[star];

  // 합성 정보
  const canMerge = star < 3 && ownedCnt >= 3;
  const mergeLeft = 3 - Math.min(ownedCnt, 3);
  let mergeSection = '';
  if(star < 3){
    if(canMerge){
      mergeSection = `<button class="czd-merge-btn-big" onclick="doMerge('${slug}',${star});closeCardZoom()">✦ ${TIER_LABELS[star+1]}으로 합성</button>`;
    } else {
      mergeSection = `<div class="czd-merge-hint">합성까지 <b style="color:var(--text)">${mergeLeft}개</b> 더 필요</div>`;
    }
  } else {
    mergeSection = `<div class="czd-max-badge">✦ 최고 등급</div>`;
  }

  // 카드 렌더
  document.getElementById('cz-card-host').innerHTML=`<div class="pet-card t${star} owned">
    <div class="pc-art" style="background-image:url('${LOADING(slug)}')"></div>
    <div class="pc-vignette"></div>
    ${cntBadge}
    <div class="pc-top">
      <span class="pc-tier-label">${TIER_LABELS[star]}</span>
      <span class="pc-num">${numStr}</span>
    </div>
    <div class="pc-pet-wrap">
      <img class="pc-pet-img" src="${IMG(slug,star)}" alt=""
        onerror="this.onerror=null;this.src='${IMG(slug,1)}';this.onerror=()=>this.style.display='none'">
    </div>
    <div class="pc-bottom">
      <div class="pc-name">${kr}</div>
    </div>
  </div>`;

  // 상세 패널 렌더
  document.getElementById('cz-detail').innerHTML=`
    <div class="czd-header">
      <span class="czd-role-chip" style="color:${tierCol.chip};background:${tierCol.chipBg};border:1px solid ${tierCol.chipBd}">● ${roleText}</span>
      <span class="czd-stars" style="color:${tierCol.stars}">${STAR_CHARS[star]}</span>
    </div>
    <div class="czd-type-row">
      <span class="czd-type-chip ${typeClass}">${typeLabel}</span>
      <span class="czd-eff-txt">${GACHA_EFFECT_TXT[typeLabel][star]}</span>
    </div>
    <div class="czd-desc">${desc}</div>
    <div class="czd-divider"></div>
    <div class="czd-stats">
      <div class="czd-stat">
        <span class="czd-stat-label">보유</span>
        <span class="czd-stat-val" style="color:${tierCol.val}">×${ownedCnt}</span>
      </div>
      <div class="czd-stat">
        <span class="czd-stat-label">등급</span>
        <span class="czd-stat-val" style="color:${tierCol.val};font-size:12px;">${TIER_LABELS[star]}</span>
      </div>
    </div>
    ${mergeSection}
  `;

  document.getElementById('card-zoom-overlay').classList.add('show');
}
function closeCardZoom(){ document.getElementById('card-zoom-overlay').classList.remove('show'); }

function onTenCardClick(i){
  const inner=document.getElementById('tc'+i); if(!inner) return;
  if(inner.classList.contains('flipped')){
    showCardZoom(inner.dataset.slug, parseInt(inner.dataset.star), 0);
  } else {
    flipTenCard(i);
  }
}
</script>

<!-- 카드 줌 오버레이 -->
<div class="card-zoom-overlay" id="card-zoom-overlay" onclick="closeCardZoom()">
  <div class="cz-wrap" onclick="event.stopPropagation()">
    <div class="cz-card-host" id="cz-card-host"></div>
    <div class="cz-detail" id="cz-detail"></div>
  </div>
  <div class="cz-hint">탭 밖 영역을 눌러 닫기</div>
</div>
</body>
