<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 펫 시스템 목업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&family=Gmarket+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060d18;--surface:#0d1829;--surface2:#112040;--border:#1a3558;
  --gold:#c8a84b;--gold-light:#e8d080;--blue:#4fc3f7;
  --text:#dce8f5;--text-dim:#6e90b8;
  --purple-light:#b48aff;
  --rk-card:#0d1829;--rk-border:rgba(255,255,255,.06);--rk-border-strong:rgba(255,255,255,.1);
  --rk-text:#e6ebf2;--rk-text-dim:rgba(230,235,242,.55);
  --rk-gold:#e8d080;--rk-gold-deep:#c8a84b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1px 1px at 15% 12%,rgba(200,230,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 42%  8%,rgba(180,220,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 15%,rgba(200,230,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 85%  5%,rgba(160,210,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 22%,rgba(200,230,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 28%,rgba(180,220,255,0.4) 0%,transparent 100%),
    radial-gradient(ellipse 80% 50% at 50%   0%,rgba(60,130,220,0.18) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 10%  30%,rgba(40,100,200,0.10) 0%,transparent 60%),
    radial-gradient(ellipse 70% 30% at 50% 100%,rgba(30, 80,160,0.15) 0%,transparent 60%),
    linear-gradient(180deg,#040b15 0%,#060d1c 30%,#080f20 60%,#050c18 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 120% 60% at 50% 50%,transparent 40%,rgba(10,40,100,0.25) 100%);
  mix-blend-mode:multiply;
}

.wrapper{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:24px 16px 80px;}

/* ── 헤더 ── */
.mock-header{text-align:center;padding:32px 0 24px;}
.mock-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(13,24,41,0.9),rgba(17,32,64,0.9));
  border:1px solid rgba(200,168,75,0.5);border-radius:4px;
  padding:5px 16px;margin-bottom:12px;
  font-size:10px;letter-spacing:4px;color:var(--gold);
}
.mock-badge::before,.mock-badge::after{content:'🐾';font-size:10px;}
.mock-title{
  font-family:'Black Han Sans',sans-serif;font-size:clamp(20px,4vw,34px);letter-spacing:3px;
  background:linear-gradient(135deg,#a0c8f0 0%,#e8d080 40%,#b48aff 80%,#a0d4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(80,160,240,0.3));margin-bottom:4px;
}
.mock-sub{color:var(--text-dim);font-size:12px;letter-spacing:1px;}

/* ── 골드 바 ── */
.gold-bar{
  display:flex;justify-content:flex-end;align-items:center;gap:6px;
  padding:8px 16px;margin-bottom:16px;
  background:rgba(13,24,41,0.7);border:1px solid var(--rk-border);border-radius:8px;
}
.gold-bar-label{font-size:11px;color:var(--text-dim);}
.gold-bar-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--gold-light);}

/* ── 카드 공통 ── */
.card{
  background:var(--rk-card);border:1px solid var(--rk-border);
  border-radius:10px;padding:18px 20px;margin-bottom:14px;
  position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,0.35),transparent);
}
.card-title{
  font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:.03em;
  color:var(--rk-text);margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.card-title::before{content:'';width:3px;height:16px;background:var(--rk-gold-deep);border-radius:2px;flex-shrink:0;}

/* ── 뽑기 카드 ── */
.gacha-inner{display:flex;gap:16px;align-items:flex-start;}
.gacha-preview-box{
  width:88px;height:88px;flex-shrink:0;border-radius:10px;
  border:1px solid rgba(150,100,255,0.3);overflow:hidden;
  background:linear-gradient(135deg,rgba(20,10,50,0.8),rgba(10,5,30,0.9));
  display:flex;align-items:center;justify-content:center;position:relative;
}
.gacha-preview-box img{width:100%;height:100%;object-fit:contain;transition:opacity 0.2s;}
.gacha-preview-label{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.5);text-align:center;
  font-size:9px;color:rgba(255,255,255,0.55);padding:3px 0;
}
.gacha-info{flex:1;min-width:0;}
.gacha-title-txt{font-family:'Black Han Sans',sans-serif;font-size:16px;letter-spacing:0.5px;margin-bottom:3px;}
.gacha-sub{font-size:11px;color:var(--text-dim);line-height:1.7;margin-bottom:12px;}
.gacha-btns{display:flex;gap:8px;}
.gacha-btn{
  flex:1;padding:10px 0;border-radius:8px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;transition:all 0.15s;
}
.gacha-btn.one{background:linear-gradient(135deg,#5a24d4,#9b5aff);color:#fff;box-shadow:0 3px 14px rgba(140,80,255,0.35);}
.gacha-btn.one:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(140,80,255,0.5);}
.gacha-btn.ten{background:linear-gradient(135deg,rgba(80,40,160,0.35),rgba(120,60,220,0.25));border:1px solid rgba(140,80,255,0.4);color:#c4a0ff;}
.gacha-btn.ten:hover{background:linear-gradient(135deg,rgba(80,40,160,0.55),rgba(120,60,220,0.45));transform:translateY(-1px);}
.gacha-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.gacha-result{font-size:11px;min-height:20px;color:var(--text-dim);padding-top:10px;margin-top:10px;border-top:1px solid var(--rk-border);text-align:center;}

/* ── 합성 안내 ── */
.merge-hint{
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
  font-size:11px;color:var(--text-dim);padding:9px 14px;
  background:rgba(140,80,255,0.04);border:1px solid rgba(140,80,255,0.14);
  border-radius:8px;margin-bottom:14px;
}
.merge-hint b{color:var(--purple-light);}
.merge-hint .arr{color:rgba(140,80,255,0.45);font-size:12px;}

/* ── 컬렉션 ── */
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.col-count{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--purple-light);background:rgba(140,80,255,0.1);border:1px solid rgba(140,80,255,0.25);border-radius:10px;padding:2px 10px;}
.col-tabs{display:flex;gap:5px;margin-bottom:14px;}
.col-tab{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--rk-border);background:rgba(255,255,255,0.03);color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.col-tab:not(.active):hover{border-color:var(--rk-border-strong);color:var(--text);}
.col-tab.t1.active{background:rgba(154,184,208,0.1);border-color:rgba(154,184,208,0.4);color:#9ab8d0;}
.col-tab.t2.active{background:rgba(200,160,32,0.1);border-color:rgba(200,160,32,0.4);color:#d4a020;}
.col-tab.t3.active{background:rgba(180,138,255,0.1);border-color:rgba(180,138,255,0.35);color:var(--purple-light);}

/* ── 펫 그리드 ── */
.pet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(min-width:520px){.pet-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:720px){.pet-grid{grid-template-columns:repeat(6,1fr);}}

/* ── LoL 증강 카드 ── */
.pet-card{
  border-radius:10px;border:2px solid transparent;padding:9px 7px 10px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;cursor:default;transition:transform 0.18s,box-shadow 0.18s;
}
.pet-card::after{
  content:'';position:absolute;inset:5px;pointer-events:none;z-index:1;
  background:
    linear-gradient(currentColor,currentColor) top left/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) top left/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) top right/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) top right/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) bottom left/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) bottom left/1.5px 8px no-repeat,
    linear-gradient(currentColor,currentColor) bottom right/8px 1.5px no-repeat,
    linear-gradient(currentColor,currentColor) bottom right/1.5px 8px no-repeat;
}
.pet-card.t1{background:linear-gradient(160deg,#0c1520,#070b14) padding-box,linear-gradient(160deg,#4a6a84,#9ab8d0,#6a8aa4,#9ab8d0,#4a6a84) border-box;box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 8px rgba(154,184,208,0.08);}
.pet-card.t1::after{color:rgba(154,184,208,0.4);}
.pet-card.t2{background:linear-gradient(160deg,#120e06,#080602) padding-box,linear-gradient(160deg,#6a4800,#c89020,#f0cc60,#c89020,#6a4800) border-box;box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 12px rgba(212,160,32,0.18);}
.pet-card.t2::after{color:rgba(212,160,32,0.45);}
.pet-card.t3{background:linear-gradient(160deg,#0e0820,#060410) padding-box,linear-gradient(135deg,#ff8888,#ffcc44,#88ff99,#88ccff,#cc88ff,#ff8888) border-box;box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 16px rgba(180,120,255,0.15);animation:prism-glow 3s ease-in-out infinite;}
.pet-card.t3::after{color:rgba(200,150,255,0.45);}
@keyframes prism-glow{
  0%,100%{box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 12px rgba(255,120,120,0.14);}
  33%{box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 16px rgba(120,220,150,0.16);}
  66%{box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 16px rgba(120,160,255,0.18);}
}
.pet-card.locked{opacity:0.22;}
.pet-card.owned:hover{transform:translateY(-2px);}
.pet-img{width:68px;height:68px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);}
.pet-img img{width:100%;height:100%;object-fit:contain;display:block;}
.tier-label{font-size:8px;font-weight:700;letter-spacing:1px;line-height:1;margin-top:1px;}
.t1 .tier-label{color:#8ab4cc;}
.t2 .tier-label{color:#d4a020;}
.t3 .tier-label{background:linear-gradient(90deg,#ff9999,#ffdd66,#99ffbb,#99ccff,#dd99ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 3px rgba(200,150,255,0.5));}
.pet-name{font-size:9px;text-align:center;width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);}
.pet-name.owned{color:var(--rk-text);font-weight:600;}
.pet-cnt{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.38);font-weight:600;}
.merge-btn{width:100%;padding:3px 0;border-radius:5px;border:1px solid rgba(140,80,255,0.35);background:linear-gradient(90deg,rgba(100,60,200,0.5),rgba(150,80,240,0.5));color:#e0cfff;font-size:8px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.merge-btn:hover{background:linear-gradient(90deg,rgba(100,60,200,0.8),rgba(150,80,240,0.8));}


/* ══════════════════════════════════════════
   드라마틱 뽑기 리빌 오버레이
   ══════════════════════════════════════════ */

/* 희귀도 CSS 변수 (JS로 설정) */
/* --rc: 메인 컬러 / --rc-dim: 어두운 글로우 / --rc-ray: 빛줄기 색 / --rc-burst: 버스트 색 */

.rv-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  align-items:center;justify-content:center;
  overflow:hidden;
}
.rv-overlay.show{display:flex;}

/* 어두운 배경 */
.rv-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, rgba(4,8,20,0.85) 0%, rgba(2,4,10,0.97) 100%);
  opacity:0;transition:opacity 0.3s ease;
}
.rv-overlay.show .rv-bg{opacity:1;}

/* 버스트 원 */
.rv-burst{
  position:absolute;
  width:120px;height:120px;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:radial-gradient(circle,var(--rc-burst,rgba(154,184,208,0.9)) 0%,var(--rc-dim,rgba(100,155,195,0.4)) 40%,transparent 70%);
  opacity:0;pointer-events:none;
}
.rv-overlay.burst .rv-burst{
  animation:burst-expand 0.7s cubic-bezier(0.15,0.85,0.4,1) forwards;
}
@keyframes burst-expand{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  55%{opacity:0.75;}
  100%{transform:translate(-50%,-50%) scale(22);opacity:0;}
}

/* 빛줄기 (conic-gradient) */
.rv-rays{
  position:absolute;
  width:200vmax;height:200vmax;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:repeating-conic-gradient(
    from 0deg at 50% 50%,
    var(--rc-ray,rgba(154,184,208,0.07)) 0deg 7deg,
    transparent 7deg 22deg
  );
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
.rv-overlay.burst .rv-rays{
  opacity:1;
  animation:rays-spin 18s linear infinite;
}
@keyframes rays-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

/* 프리즘 전용 무지개 빛줄기 */
.rv-overlay.prism .rv-rays{
  background:repeating-conic-gradient(
    from 0deg at 50% 50%,
    rgba(255,120,120,0.09) 0deg 4deg,
    rgba(255,200,80,0.09) 4deg 8deg,
    rgba(100,255,160,0.09) 8deg 12deg,
    rgba(80,180,255,0.09) 12deg 16deg,
    rgba(200,120,255,0.09) 16deg 20deg,
    transparent 20deg 36deg
  );
}

/* 중심 글로우 */
.rv-glow{
  position:absolute;
  width:360px;height:360px;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--rc-dim,rgba(100,155,195,0.25)) 0%,transparent 70%);
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease 0.3s;
}
.rv-overlay.burst .rv-glow{
  opacity:1;
  animation:glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7;}
  50%{transform:translate(-50%,-50%) scale(1.12);opacity:1;}
}
.rv-overlay.prism .rv-glow{
  animation:glow-pulse 2.2s ease-in-out infinite,prism-hue 4s linear infinite;
}
@keyframes prism-hue{to{filter:hue-rotate(360deg);}}

/* 플래시 */
.rv-flash{
  position:absolute;inset:0;pointer-events:none;
  background:var(--rc-burst,rgba(154,184,208,0.5));
  opacity:0;
}
.rv-overlay.flashing .rv-flash{animation:rv-flash-anim 0.35s ease-out forwards;}
@keyframes rv-flash-anim{0%{opacity:0.7;}100%{opacity:0;}}

/* 파티클 */
.rv-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.rv-spark{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:spark-fly 0.9s ease-out forwards;
}
@keyframes spark-fly{
  0%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}
}

/* 스테이지 (카드 + 텍스트) */
.rv-stage{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:0;
  opacity:0;pointer-events:none;
}
.rv-stage.show{
  opacity:1;pointer-events:auto;
  animation:stage-in 0.55s cubic-bezier(0.22,1.4,0.4,1) forwards;
}
@keyframes stage-in{
  from{transform:scale(0.5) translateY(40px);opacity:0;filter:brightness(4);}
  60%{filter:brightness(1.2);}
  to{transform:scale(1) translateY(0);opacity:1;filter:brightness(1);}
}

/* 뒤집기 카드 */
.rv-flip-wrap{
  width:170px;height:220px;perspective:900px;
  margin-bottom:20px;cursor:pointer;
  position:relative;
}
/* 클릭 유도 링 */
.rv-flip-wrap::before{
  content:'';position:absolute;inset:-8px;border-radius:22px;
  border:1px solid var(--rc,rgba(154,184,208,0.3));
  animation:ring-pulse 1.8s ease-in-out infinite;
  opacity:0;transition:opacity 0.4s;
}
.rv-stage.show .rv-flip-wrap::before{opacity:1;}
@keyframes ring-pulse{
  0%,100%{transform:scale(1);opacity:0.4;}
  50%{transform:scale(1.04);opacity:0.9;}
}
.rv-stage.flipped .rv-flip-wrap::before{opacity:0!important;animation:none;}

.rv-flip-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
  border-radius:18px;
}
.rv-flip-inner.flipped{transform:rotateY(180deg);}

.rv-back,.rv-front{
  position:absolute;inset:0;border-radius:18px;
  backface-visibility:hidden;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* 카드 뒷면 */
.rv-back{
  background:linear-gradient(160deg,#0d1829,#070b14);
  border:2px solid var(--rc,rgba(100,155,195,0.5));
  box-shadow:0 0 20px var(--rc-dim,rgba(100,155,195,0.2));
  animation:back-glow 1.6s ease-in-out infinite;
}
@keyframes back-glow{
  0%,100%{box-shadow:0 0 18px var(--rc-dim,rgba(100,155,195,0.2));}
  50%{box-shadow:0 0 42px var(--rc,rgba(154,184,208,0.5));}
}
.rv-back-pattern{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    45deg,
    transparent 0px,
    transparent 18px,
    rgba(255,255,255,0.015) 18px,
    rgba(255,255,255,0.015) 19px
  );
}
.rv-back-glyph{
  font-size:52px;position:relative;z-index:1;
  filter:drop-shadow(0 0 12px var(--rc,rgba(154,184,208,0.6)));
  animation:glyph-float 3s ease-in-out infinite;
}
@keyframes glyph-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.rv-back-sub{
  font-size:10px;color:var(--rc,#9ab8d0);letter-spacing:2px;margin-top:10px;
  font-family:'Gmarket Sans',sans-serif;font-weight:300;opacity:0.7;
}

/* 카드 앞면 */
.rv-front{
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#111830,#0a0f1e);
  border:2px solid rgba(150,100,255,0.5);
  padding:16px;gap:10px;
}
.rv-front.gold-face{border-color:rgba(255,200,0,0.7);box-shadow:0 0 24px rgba(255,180,0,0.35);}
.rv-front.prism-face{animation:rainbow-border 2.5s linear infinite;}
@keyframes rainbow-border{
  0%{border-color:#ff6b6b;box-shadow:0 0 22px rgba(255,80,80,0.4);}
  33%{border-color:#69ff8e;box-shadow:0 0 22px rgba(80,255,120,0.4);}
  66%{border-color:#6bb5ff;box-shadow:0 0 22px rgba(80,150,255,0.4);}
  100%{border-color:#ff6b6b;box-shadow:0 0 22px rgba(255,80,80,0.4);}
}
.rv-front-img{width:120px;height:120px;object-fit:contain;}
.rv-front-no-img{font-size:44px;opacity:0.3;}
.rv-front-tier{
  font-family:'Gmarket Sans',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;
}

   10연 뽑기 팝업

/* 10연 뒷면 희귀 힌트 */

@keyframes hint-prism-sm{
  0%{border-color:rgba(255,120,120,0.6);box-shadow:0 0 10px rgba(255,80,80,0.3);}
  33%{border-color:rgba(120,255,150,0.6);box-shadow:0 0 10px rgba(80,255,120,0.3);}
  66%{border-color:rgba(120,180,255,0.6);box-shadow:0 0 10px rgba(80,150,255,0.3);}
  100%{border-color:rgba(255,120,120,0.6);box-shadow:0 0 10px rgba(255,80,80,0.3);}
}
.tc-front.gold-face{border-color:rgba(255,200,0,0.65)!important;box-shadow:0 0 8px rgba(255,180,0,0.25);}

@keyframes tc-pop{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}

<!-- ★ 드라마틱 단일 뽑기 리빌 오버레이 ★ -->
<div class="rv-overlay" id="rv-overlay">
  <div class="rv-bg"></div>

<script>
const CHAMPS = [
  {slug:'Akshan',   kr:'아크샨'},   {slug:'Amumu',     kr:'아무무'},
  {slug:'Brand',    kr:'브랜드'},   {slug:'DrMundo',   kr:'문도 박사'},
  {slug:'Fizz',     kr:'피즈'},     {slug:'Gangplank', kr:'갱플랭크'},
  {slug:'Jhin',     kr:'진'},       {slug:'Khazix',    kr:'카직스'},
  {slug:'Lulu',     kr:'룰루'},     {slug:'Malphite',  kr:'말파이트'},
  {slug:'Malzahar', kr:'말자하'},   {slug:'Mel',       kr:'멜'},
  {slug:'Morgana',  kr:'모르가나'}, {slug:'Naafiri',   kr:'나피리'},
  {slug:'Poppy',    kr:'뽀삐'},     {slug:'Rammus',    kr:'람머스'},
  {slug:'Vayne',    kr:'베인'},     {slug:'Yasuo',     kr:'야스오'},
];
const TIER_PATH = ['','silver','gold','prism'];
const TIER_KR   = ['','실버','골드','프리즘'];
const IMG = (s, star=1) => `aram/assets/pets/${s}/${TIER_PATH[star]}/default.png`;
const STAR_LABEL = {1:'SILVER', 2:'GOLD', 3:'PRISM'};
const STAR_FLAVOR = {
  1: '실버 펫을 획득했어요!',
  2: '✨ 희귀한 골드 펫!',
  3: '🌈 초희귀 프리즘 펫!!'
};
const RARITY = {
  1: { main:'rgba(154,184,208,0.8)', dim:'rgba(80,130,180,0.2)', ray:'rgba(154,184,208,0.07)', burst:'rgba(180,220,255,0.85)', btnClass:'' },
  2: { main:'rgba(210,160,30,0.9)',  dim:'rgba(200,140,20,0.25)', ray:'rgba(200,160,32,0.09)', burst:'rgba(255,230,80,0.85)',  btnClass:'gold-btn' },
  3: { main:'rgba(180,138,255,0.9)', dim:'rgba(150,90,255,0.25)', ray:'rgba(180,138,255,0.09)', burst:'rgba(200,160,255,0.85)', btnClass:'prism-btn' },
};

// 목업: 전부 보유
let gold = 9999;
let inv  = Object.fromEntries(CHAMPS.map(c=>[c.slug,{s1:5,s2:5,s3:5}]));
let ever = Object.fromEntries(CHAMPS.map(c=>[c.slug,{e1:true,e2:true,e3:true}]));
let star = 1;
let previewIdx = 0, previewTimer = null;

function gp(s){ return {s1:0,s2:0,s3:0,...(inv[s]||{})}; }
function ge(s){ return {e1:false,e2:false,e3:false,...(ever[s]||{})}; }

function startPreviewCycle(){
  previewTimer = setInterval(()=>{
    previewIdx = (previewIdx+1) % CHAMPS.length;
    const c = CHAMPS[previewIdx];
    const img = document.getElementById('preview-img');
    const lbl = document.getElementById('preview-label');
    img.style.opacity='0';
    setTimeout(()=>{ img.src=IMG(c.slug); img.style.opacity='1'; lbl.textContent=c.kr; }, 180);
  }, 1200);
}
startPreviewCycle();

function rollStar(){
  const r=Math.random();
  if(r<0.01) return 3;
  if(r<0.07) return 2;
  return 1;
}

function doPull(times){
  const cost = times===1 ? 10 : 90;
  if(gold<cost){ setResult(`🪙 골드 부족! (보유 ${gold}G)`,'#ef5350'); return; }
  gold -= cost;
  document.getElementById('gold-display').textContent = gold;
  updateBtns();
  const results = [];
  for(let i=0;i<times;i++){
    const c = CHAMPS[Math.floor(Math.random()*CHAMPS.length)];
    const s = rollStar();
    const p = gp(c.slug);
    inv[c.slug] = {...p, [`s${s}`]: p[`s${s}`]+1};
    const e = ge(c.slug);
    ever[c.slug] = {...e, [`e${s}`]: true};
    results.push({...c, star:s});
  }
  if(times===1){
    const c = results[0];
    clearInterval(previewTimer);
    const img = document.getElementById('preview-img');
    img.style.opacity='0';
    setTimeout(()=>{ img.src=IMG(c.slug,c.star); img.style.opacity='1'; document.getElementById('preview-label').textContent=c.kr; }, 200);
    setTimeout(startPreviewCycle, 3500);
    showReveal(c, c.star);
  } else {
    showTenResultPopup(results);
  }
  render();
}

// ══════════════════════════
// 단일 뽑기 드라마틱 리빌
// ══════════════════════════
let _rvPending = null;

function showReveal(c, starLevel){
  _rvPending = {c, starLevel};
  const ov = document.getElementById('rv-overlay');
  const rc = RARITY[starLevel];

  // CSS 변수 설정
  ov.style.setProperty('--rc',       rc.main);
  ov.style.setProperty('--rc-dim',   rc.dim);
  ov.style.setProperty('--rc-ray',   rc.ray);
  ov.style.setProperty('--rc-burst', rc.burst);

  // 클래스 초기화
  ov.className = 'rv-overlay';
  if(starLevel===3) ov.classList.add('prism');
  if(starLevel===2) ov.classList.add('gold');

  // 플립 카드 초기화
  const flip = document.getElementById('rv-flip');
  flip.style.transition='none';
  flip.classList.remove('flipped');
  void flip.offsetWidth;
  flip.style.transition='';

  // 뒷면/앞면 클래스 초기화
  document.getElementById('rv-back').className  = 'rv-back';
  document.getElementById('rv-front').className = 'rv-front';
  document.getElementById('rv-no-img').style.display='none';

  // 앞면 이미지 설정
  const img = document.getElementById('rv-img');
  img.style.display=''; img.src=IMG(c.slug, starLevel);
  img.onerror=()=>{
    if(starLevel>1){ img.src=IMG(c.slug,1); img.onerror=()=>{ img.style.display='none'; document.getElementById('rv-no-img').style.display='block'; }; }
    else{ img.style.display='none'; document.getElementById('rv-no-img').style.display='block'; }
  };

  // 앞면 티어 레이블
  const tierEl = document.getElementById('rv-front-tier');
  tierEl.textContent = STAR_LABEL[starLevel];
  tierEl.className   = `rv-front-tier s${starLevel}`;

  // 챔피언 정보
  document.getElementById('rv-champ-name').textContent = c.kr;
  const badge = document.getElementById('rv-tier-badge');
  badge.textContent = TIER_KR[starLevel] + ' 펫';
  badge.style.borderColor = rc.main;
  badge.style.color       = rc.main;
  document.getElementById('rv-flavor').textContent = STAR_FLAVOR[starLevel];

  // UI 리셋
  document.getElementById('rv-hint').style.opacity='1';
  const info = document.getElementById('rv-info');
  info.classList.remove('show');
  info.style.animation='';
  const btn = document.getElementById('rv-close-btn');
  btn.className = 'rv-close-btn ' + rc.btnClass;
  btn.style.opacity='0'; btn.style.pointerEvents='none';
  document.getElementById('rv-stage').classList.remove('show','flipped');

  // 파티클 초기화
  document.getElementById('rv-particles').innerHTML='';

  // ① 오버레이 표시
  ov.classList.add('show');

  // ② 버스트 트리거 (50ms)
  setTimeout(()=> ov.classList.add('burst'), 50);

  // ③ 카드 등장 (450ms)
  setTimeout(()=> document.getElementById('rv-stage').classList.add('show'), 450);
}

function flipRevealCard(){
  if(!_rvPending) return;
  const flip = document.getElementById('rv-flip');
  if(flip.classList.contains('flipped')) return;

  const {c, starLevel} = _rvPending;
  _rvPending = null;

  flip.classList.add('flipped');
  document.getElementById('rv-stage').classList.add('flipped');

  // 앞면 희귀도 스타일
  const front = document.getElementById('rv-front');
  if(starLevel===2) front.classList.add('gold-face');
  else if(starLevel===3) front.classList.add('prism-face');

  // 힌트 숨김
  document.getElementById('rv-hint').style.opacity='0';

  // 플래시
  const ov = document.getElementById('rv-overlay');
  ov.classList.remove('flashing');
  void ov.offsetWidth;
  ov.classList.add('flashing');
  setTimeout(()=> ov.classList.remove('flashing'), 400);

  // 파티클 폭발
  spawnParticles(starLevel, RARITY[starLevel].main);

  // 챔피언 정보 슬라이드업
  setTimeout(()=>{
    const info = document.getElementById('rv-info');
    info.classList.add('show');
    info.style.animation='info-up 0.45s cubic-bezier(0.22,1,0.4,1) both';
  }, 520);

  // 확인 버튼
  setTimeout(()=>{
    const btn = document.getElementById('rv-close-btn');
    btn.style.opacity='1'; btn.style.pointerEvents='auto';
  }, 820);
}

function spawnParticles(starLevel, color){
  const cont = document.getElementById('rv-particles');
  cont.innerHTML='';
  const cnt = starLevel===3?28 : starLevel===2?18 : 12;
  const colors = starLevel===3
    ? ['#ff9999','#ffdd66','#99ffbb','#99ccff','#dd99ff','#ffffff']
    : starLevel===2
    ? ['#ffe066','#ffc832','#fff0a0','#ffffff']
    : ['#9ab8d0','#c0ddf0','#ffffff','#70a8c8'];

  for(let i=0;i<cnt;i++){
    const el = document.createElement('div');
    el.className = 'rv-spark';
    const angle = (i/cnt)*360 + Math.random()*20;
    const dist  = 80 + Math.random()*(starLevel*36);
    const size  = 4 + Math.random()*6;
    const col   = colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText = `
      width:${size}px;height:${size}px;
      background:radial-gradient(circle,#fff 0%,${col} 60%,transparent 100%);
      left:50%;top:42%;
      --dx:${Math.cos(angle*Math.PI/180)*dist}px;
      --dy:${Math.sin(angle*Math.PI/180)*dist}px;
      animation-delay:${Math.random()*0.15}s;
      animation-duration:${0.7+Math.random()*0.4}s;
    `;
    cont.appendChild(el);
    setTimeout(()=> el.remove(), 1400);
  }
}

function closeReveal(){
  const ov = document.getElementById('rv-overlay');
  ov.className = 'rv-overlay';
}

// ══════════════════════════
// 10연 팝업
// ══════════════════════════
let _tenFlipped=0, _tenTotal=0;

function showTenResultPopup(results){
  _tenFlipped=0; _tenTotal=results.length;
  const grid = document.getElementById('ten-grid');
  const btn  = document.getElementById('ten-btn');
  btn.classList.remove('show');
  const openBtn = document.querySelector('.ten-open-all');
  if(openBtn) openBtn.style.display='';
  grid.innerHTML='';

  results.forEach((c,i)=>{
    const s = c.star||1;
    const rareCls = s===2?'gold-face':s===3?'prism-face':'';
    const div = document.createElement('div');
    div.className='tc'; div.id=`tc-wrap${i}`;
    div.innerHTML=`<div class="tc-inner" id="tc${i}" data-star="${s}" onclick="flipTenCard(${i})">
      <div class="tc-back">
        <div class="tc-back-pattern"></div>
        <span>✦</span>
      </div>
      <div class="tc-front ${rareCls}">
        <img src="${IMG(c.slug,s)}" alt=""
          onerror="this.src='${IMG(c.slug,1)}';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='block';};">
        <span class="tc-no-img" style="display:none">🐾</span>
        <div class="tc-tier s${s}">${STAR_LABEL[s]}</div>
        <div class="tc-name">${c.kr}</div>
      </div>
    </div>`;
    grid.appendChild(div);
  });

  document.getElementById('ten-popup').classList.add('show');

  // 카드 순차 등장 애니메이션
  results.forEach((_,i)=>{
    setTimeout(()=>{
      const inner = document.getElementById('tc'+i);
      if(inner){
        inner.style.transition = `opacity 0.3s ease, transform 0.3s ease`;
        inner.classList.add('entered');
      }
    }, i*60);
  });
}

function flipTenCard(i){
  const inner = document.getElementById('tc'+i);
  if(!inner || inner.classList.contains('flipped')) return;
  inner.classList.add('flipped');
  const wrap = inner.closest('.tc');
  if(wrap){ wrap.classList.remove('popping'); void wrap.offsetWidth; wrap.classList.add('popping'); }
  const s = parseInt(inner.dataset.star||'1');
  if(s>=2) setTimeout(()=> triggerRareEffect(s), 280);
  _tenFlipped++;
  if(_tenFlipped>=_tenTotal){
    setTimeout(()=>{
      document.getElementById('ten-btn').classList.add('show');
      const ob = document.querySelector('.ten-open-all');
      if(ob) ob.style.display='none';
    }, 400);
  }
}

function openAllTen(){
  let delay=0;
  for(let i=0;i<_tenTotal;i++){
    const inner = document.getElementById('tc'+i);
    if(inner && !inner.classList.contains('flipped')){
      setTimeout(()=> flipTenCard(i), delay);
      delay+=160;
    }
  }
}

function triggerRareEffect(s){
  const popup = document.getElementById('ten-popup');
  popup.classList.remove('shake'); void popup.offsetWidth; popup.classList.add('shake');
  setTimeout(()=> popup.classList.remove('shake'), 500);
  const rf = document.getElementById('rare-flash');
  rf.style.background = s===3 ? 'rgba(180,138,255,0.22)' : 'rgba(255,210,0,0.18)';
  rf.classList.remove('pop'); void rf.offsetWidth; rf.classList.add('pop');
}

function closeTenPopup(){ document.getElementById('ten-popup').classList.remove('show'); }

// ══════════════════════════
// 공통 유틸
// ══════════════════════════
function setResult(msg, color='var(--text-dim)'){
  const el = document.getElementById('gacha-result');
  el.textContent=msg; el.style.color=color;
}
function updateBtns(){
  document.getElementById('btn1').disabled  = gold<10;
  document.getElementById('btn10').disabled = gold<90;
}

function doMerge(slug, fromStar){
  const p = gp(slug);
  const sKey=`s${fromStar}`, nKey=`s${fromStar+1}`;
  if(p[sKey]<3){ setResult('재료 부족! (같은 펫 3개 필요)','#ef5350'); return; }
  inv[slug] = {...p, [sKey]:p[sKey]-3, [nKey]:p[nKey]+1};
  const e = ge(slug);
  ever[slug] = {...e, [`e${fromStar+1}`]:true};
  const c = CHAMPS.find(c=>c.slug===slug);
  const tierNames=['','실버','골드','프리즘'];
  setResult(`✨ ${c.kr} ${tierNames[fromStar+1]} 합성 성공!`, '#e8d080');
  render();
}

function switchStar(s, btn){
  star=s;
  document.querySelectorAll('.col-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const sKey=`s${star}`, eKey=`e${star}`;
  let owned=0;
  const html = CHAMPS.map(({slug,kr})=>{
    const p=gp(slug), e=ge(slug);
    const cnt=p[sKey]||0;
    const hasEver=e[eKey]||cnt>0;
    if(hasEver) owned++;
    const canMerge=star<3&&cnt>=3;
    const imgStyle=hasEver?'':'filter:brightness(0.08) saturate(0)';
    return `<div class="pet-card t${star} ${hasEver?'owned':'locked'}">
      <div class="pet-img">
        <img src="${IMG(slug,star)}" style="${imgStyle}" loading="lazy" alt="" onerror="this.src='${IMG(slug,1)}'">
      </div>
      <div class="tier-label">${hasEver?TIER_KR[star]:'???'}</div>
      <div class="pet-name ${hasEver?'owned':''}">${hasEver?kr:'???'}</div>
      ${hasEver&&cnt>0?`<div class="pet-cnt">× ${cnt}</div>`:''}
      ${canMerge?`<button class="merge-btn" onclick="doMerge('${slug}',${star})">합성 ▲</button>`:''}
    </div>`;
  }).join('');
  document.getElementById('pet-grid').innerHTML=html;
  document.getElementById('col-count').textContent=`${owned} / ${CHAMPS.length}`;
  updateBtns();
}

render();
</script>
</body>
</html>
