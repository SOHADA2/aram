<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펫 시스템 목업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&family=Gmarket+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── 메인 사이트 동일 변수 ── */
:root{
  --bg:#060d18;--surface:#0d1829;--surface2:#112040;--border:#1a3558;
  --gold:#c8a84b;--gold-light:#e8d080;--blue:#4fc3f7;--blue-dark:#0277bd;
  --text:#dce8f5;--text-dim:#6e90b8;
  --green:#00c77a;--red:#f87171;
  --rk-card:#0d1829;--rk-border:rgba(255,255,255,.06);--rk-border-strong:rgba(255,255,255,.1);
  --rk-text:#e6ebf2;--rk-gold:#e8d080;--rk-gold-deep:#c8a84b;
  --purple-light:#b48aff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(60,130,220,0.18) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 10% 30%,rgba(40,100,200,0.10) 0%,transparent 60%),
    linear-gradient(180deg,#040b15 0%,#060d1c 30%,#080f20 60%,#050c18 100%);
}

/* ── 레이아웃 ── */
#main{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 80px;}

header{text-align:center;padding:24px 20px 14px;border-bottom:1px solid var(--border);margin-bottom:12px;}
header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(18px,5vw,24px);letter-spacing:3px;background:linear-gradient(135deg,var(--blue) 0%,var(--gold-light) 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
header p{color:var(--text-dim);font-size:11px;letter-spacing:1px;margin-top:3px;}

.my-info-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;margin:0 14px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;}
.my-info-name{font-weight:700;font-size:13px;}
.my-info-gold{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold-light);}

.tab-content{padding:0 14px;}

/* ── sp-panel / sp-header / sp-cat-tab (사이트 동일) ── */
.sp-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.sp-header{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:1px;color:var(--gold);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(200,155,60,0.2);display:flex;align-items:center;justify-content:space-between;}
.sp-cat-tabs{display:flex;gap:6px;margin-bottom:12px;}
.sp-cat-tab{flex:1;padding:5px 0;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.sp-cat-tab.active{background:rgba(200,155,60,0.15);border-color:rgba(200,155,60,0.5);color:var(--gold);}
.sp-cat-tab:hover:not(.active){border-color:rgba(255,255,255,0.2);color:var(--text);}

/* ── sli 아이템 행 (사이트 동일) ── */
.sli{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;transition:border-color 0.15s;}
.sli:last-child{margin-bottom:0;}
.sli:hover{border-color:rgba(200,155,60,0.35);}
.sli-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:8px;background:rgba(255,255,255,0.04);flex-shrink:0;overflow:hidden;}
.sli-icon img{width:100%;height:100%;object-fit:contain;filter:brightness(0) opacity(0.45);}
.sli-info{flex:1;min-width:0;}
.sli-name{font-size:12px;font-weight:700;margin-bottom:3px;}
.sli-desc{font-size:10px;color:var(--text-dim);line-height:1.5;}
.sli-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sli-price{padding:5px 10px;border-radius:6px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.sli-price:disabled{opacity:0.4;cursor:not-allowed;}
.sli-price:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 3px 8px rgba(200,155,60,0.35);}

.gacha-result{font-size:11px;min-height:18px;color:var(--text-dim);padding:8px 0 2px;text-align:center;}

/* ── 컬렉션 도감 ── */
.col-count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.col-count{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--purple-light);background:rgba(140,80,255,0.1);border:1px solid rgba(140,80,255,0.25);border-radius:10px;padding:2px 8px;}

/* 펫 카드 — 세로형 증강 카드 스타일 */
.pet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(min-width:380px){.pet-grid{grid-template-columns:repeat(5,1fr);}}
.pet-card{
  position:relative;display:flex;flex-direction:column;
  border-radius:8px;overflow:hidden;cursor:default;
  transition:transform 0.15s,box-shadow 0.15s;
  background:var(--pc-bg,rgba(5,11,20,0.98));
}
.pet-card.owned{cursor:pointer;}
.pet-card.owned:hover{transform:translateY(-2px) scale(1.03);}
.pet-card.locked{opacity:0.18;filter:saturate(0);}

/* 티어별 색상 */
.pet-card.t1{
  --pc-bg:rgba(5,11,20,0.98);--pc-top:rgba(180,210,230,0.06);
  box-shadow:0 0 0 1px rgba(180,210,230,0.18),0 2px 8px rgba(0,0,0,0.5);
}
.pet-card.t2{
  --pc-bg:rgba(14,10,3,0.98);--pc-top:rgba(220,170,50,0.1);
  box-shadow:0 0 0 2px rgba(220,170,50,0.85),0 0 10px 1px rgba(200,155,60,0.45);
}
.pet-card.t3{
  --pc-bg:rgba(10,5,22,0.98);--pc-top:rgba(180,100,255,0.1);
  animation:pet-prism 4s ease-in-out infinite;
}
@keyframes pet-prism{
  0%  {box-shadow:0 0 0 2px rgba(200,110,255,0.88),0 0 12px 2px rgba(160,70,240,0.55);}
  33% {box-shadow:0 0 0 2px rgba(230, 90,210,0.88),0 0 14px 3px rgba(200,50,190,0.55);}
  66% {box-shadow:0 0 0 2px rgba(165,100,255,0.88),0 0 12px 2px rgba(130,70,255,0.55);}
  100%{box-shadow:0 0 0 2px rgba(200,110,255,0.88),0 0 12px 2px rgba(160,70,240,0.55);}
}

/* 스플래시 아트 배경 */
.pet-splash{
  position:absolute;inset:0;z-index:0;border-radius:inherit;
  background-size:cover;background-position:50% 12%;
  filter:brightness(0.28) saturate(1.3);
}
.pet-card.t2 .pet-splash{filter:brightness(0.32) saturate(1.1) sepia(0.25);}
.pet-card.t3 .pet-splash{filter:brightness(0.24) saturate(1.8) hue-rotate(15deg);}
.pet-card.locked .pet-splash{filter:brightness(0.12) saturate(0);}

/* 이미지 영역 */
.pet-img{
  height:44px;flex:none;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;padding:5px 4px 3px;
}
.pet-img img{width:100%;height:100%;object-fit:contain;display:block;}
.pet-img::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:16px;
  background:linear-gradient(transparent,rgba(0,0,0,0.18));pointer-events:none;
}
/* 이미지 배경 그로우 */
.pet-glow-layer{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--pc-top,rgba(80,130,180,0.08)) 0%,transparent 70%);
}

/* 하단 정보 영역 */
.pet-info{
  padding:3px 4px 5px;display:flex;flex-direction:column;gap:2px;
  position:relative;z-index:2;
  background:linear-gradient(transparent,rgba(0,0,0,0.55) 60%,rgba(0,0,0,0.72) 100%);
}
.pet-name{font-size:7.5px;font-weight:700;color:var(--rk-text);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.pet-name.locked{color:var(--text-dim);}

/* 별 표시 */
.pet-stars{font-size:8px;text-align:center;letter-spacing:1.5px;line-height:1;}
.pet-card.t1 .pet-stars{color:rgba(190,215,230,0.85);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.pet-card.t2 .pet-stars{color:rgba(230,180,50,0.95);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.pet-card.t3 .pet-stars{color:rgba(210,145,255,1);text-shadow:0 0 6px rgba(180,100,255,0.6),0 1px 4px rgba(0,0,0,0.9);}

/* 카운트 배지 */
.pet-cnt-badge{position:absolute;top:3px;right:3px;z-index:10;
  font-size:6.5px;font-weight:700;color:#0a0e1a;
  background:linear-gradient(135deg,#a07828,var(--gold));border-radius:3px;padding:1px 3px;line-height:1.4;}
.pet-cnt-badge.t3{background:linear-gradient(135deg,#5010a0,var(--purple-light));color:#fff;}

/* 장착됨 배지 — pet-info 안 플로우 아이템 */
.pet-eq-badge{
  font-size:6.5px;font-weight:700;text-align:center;
  background:rgba(200,155,60,0.22);color:var(--gold);
  padding:2px 0;margin:1px -4px -4px;border-radius:0 0 6px 6px;
}
.merge-btn{width:100%;padding:2px 0;border-radius:3px;border:1px solid rgba(180,138,255,0.3);background:rgba(100,60,200,0.12);color:var(--purple-light);font-size:7px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.merge-btn:hover{background:rgba(100,60,200,0.3);}
.equip-btn{width:100%;padding:2px 0;border-radius:3px;border:1px solid rgba(79,195,247,0.25);background:rgba(79,195,247,0.06);color:var(--blue);font-size:7px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.equip-btn:hover{background:rgba(79,195,247,0.2);}

/* ── 장착 탭 ── */
.section-divider{font-size:9px;color:var(--text-dim);letter-spacing:2px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.equipped-row{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.equipped-img-box{width:52px;height:52px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(180,138,255,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.equipped-img-box img{width:100%;height:100%;object-fit:contain;}
.equipped-empty-icon{font-size:22px;opacity:0.3;}
.equipped-info{flex:1;}
.equipped-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.equipped-tier{font-size:10px;font-weight:700;}
.no-equip-msg{text-align:center;padding:20px;color:var(--text-dim);font-size:12px;}

/* ══════════════════════════
   합성 애니메이션 (v2)
   ══════════════════════════ */
.mgo{display:none;position:fixed;inset:0;z-index:1200;align-items:center;justify-content:center;}
.mgo.show{display:flex;}
.mgo-bg{position:absolute;inset:0;background:rgba(2,5,14,0.96);backdrop-filter:blur(14px);}
.mgo-rays{position:absolute;width:200vmax;height:200vmax;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity 0.5s;animation:mgo-rays-spin 10s linear infinite;}
.mgo-rays.show{opacity:1;}
@keyframes mgo-rays-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.mgo-stage{position:relative;z-index:10;width:320px;height:320px;}
.mgo-card{
  position:absolute;top:50%;left:50%;width:82px;height:108px;margin:-54px -41px;
  border-radius:12px;background:var(--surface);border:2px solid rgba(255,255,255,0.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;overflow:hidden;opacity:0;
  transform:translate(var(--cx,0px),var(--cy,0px)) rotate(var(--cr,0deg));
  will-change:transform,opacity,filter,box-shadow;
}
.mgo-card img{width:58px;height:58px;object-fit:contain;}
.mgo-card-tier{font-size:8px;font-weight:700;font-family:'Gmarket Sans',sans-serif;letter-spacing:1px;}
.mgo-card.charge{animation:mgo-shake 0.07s ease-in-out infinite alternate;}
@keyframes mgo-shake{
  from{transform:translate(var(--cx),var(--cy)) rotate(calc(var(--cr) - 0.5deg)) translateX(-1.5px);}
  to{transform:translate(var(--cx),var(--cy)) rotate(calc(var(--cr) + 0.5deg)) translateX(1.5px);}
}
.mgo-ring{position:absolute;top:50%;left:50%;width:120px;height:120px;margin:-60px -60px;border-radius:50%;border:2.5px solid var(--mgo-color,rgba(200,155,60,0.85));opacity:0;pointer-events:none;}
.mgo-ring.pop{animation:mgo-ring-wave 0.85s cubic-bezier(0.15,0.8,0.4,1) forwards;}
#mgo-ring2.pop{animation-delay:0.13s;}
#mgo-ring3.pop{animation-delay:0.26s;}
@keyframes mgo-ring-wave{0%{transform:scale(0);opacity:1;}100%{transform:scale(6.5);opacity:0;}}
.mgo-particles{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.mgo-spark{position:absolute;border-radius:50%;pointer-events:none;animation:mgo-spark-anim var(--dur,0.85s) ease-out var(--delay,0s) both;}
@keyframes mgo-spark-anim{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}}
.mgo-flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:1201;}
.mgo-flash.pop{animation:mgo-flash-burst 0.55s ease-out forwards;}
@keyframes mgo-flash-burst{0%{opacity:0.92;}20%{opacity:0.65;}100%{opacity:0;}}
.mgo-result{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;pointer-events:none;z-index:20;}
.mgo-result.show{pointer-events:auto;animation:mgo-result-enter 0.6s cubic-bezier(0.22,1.4,0.35,1) forwards;}
@keyframes mgo-result-enter{from{transform:translate(-50%,-50%) scale(0.1);opacity:0;filter:brightness(6);}55%{filter:brightness(1.4);}to{transform:translate(-50%,-50%) scale(1);opacity:1;filter:brightness(1);}}
.mgo-result-wrap{position:relative;width:126px;height:164px;}
.mgo-result-glow{position:absolute;inset:-18px;border-radius:24px;pointer-events:none;background:radial-gradient(ellipse at center,var(--mgo-glow,rgba(200,155,60,0.55)) 0%,transparent 65%);animation:mgo-glow-pulse 2.2s ease-in-out infinite;}
@keyframes mgo-glow-pulse{0%,100%{opacity:0.8;transform:scale(1);}50%{opacity:1;transform:scale(1.1);}}
.mgo-result-card{position:absolute;inset:0;border-radius:14px;background:var(--surface2);border:2px solid var(--mgo-color,rgba(200,155,60,0.8));box-shadow:0 0 28px var(--mgo-glow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;animation:mgo-float 3.2s ease-in-out infinite;}
@keyframes mgo-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.mgo-result-card.prism{animation:mgo-float 3.2s ease-in-out infinite,rainbow-border 2.5s linear infinite;}
.mgo-result-card img{width:84px;height:84px;object-fit:contain;}
.mgo-result-tier{font-family:'Gmarket Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;}
.mgo-champ-name{font-family:'Black Han Sans',sans-serif;font-size:26px;letter-spacing:1px;color:var(--rk-text);text-shadow:0 0 28px var(--mgo-color);}
.mgo-tier-badge{font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 16px;border-radius:20px;border:1px solid var(--mgo-color,rgba(200,155,60,0.7));color:var(--mgo-color);background:rgba(0,0,0,0.3);}
.mgo-btn{padding:12px 38px;border-radius:8px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(200,155,60,0.35);transition:transform 0.15s;}
.mgo-btn:hover{transform:translateY(-1px);}
.mgo-btn.prism{background:linear-gradient(135deg,#5010a0,var(--purple-light));color:#fff;box-shadow:0 4px 20px rgba(180,138,255,0.4);}

/* ── 하단 네비 (사이트 동일) ── */
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;z-index:100;display:flex;align-items:center;background:var(--surface);border-top:1px solid var(--border);padding:6px 8px 8px;gap:4px;}
.nav-tab{flex:1;padding:9px 2px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:clamp(10px,2.8vw,12px);text-align:center;line-height:1.3;}
.nav-tab.active{background:rgba(26,48,88,0.9);color:var(--gold);border:1px solid rgba(200,168,75,0.3);}

/* ══════════════════════════════════
   드라마틱 단일 뽑기 리빌 오버레이
   ══════════════════════════════════ */
.rv-overlay{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;overflow:hidden;}
.rv-overlay.show{display:flex;}
.rv-bg{position:absolute;inset:0;background:rgba(4,8,20,0.92);backdrop-filter:blur(8px);opacity:0;transition:opacity 0.3s ease;}
.rv-overlay.show .rv-bg{opacity:1;}
.rv-burst{position:absolute;width:120px;height:120px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,var(--rc-burst,rgba(154,184,208,0.9)) 0%,var(--rc-dim,rgba(100,155,195,0.4)) 40%,transparent 70%);opacity:0;pointer-events:none;}
.rv-overlay.burst .rv-burst{animation:burst-expand 0.7s cubic-bezier(0.15,0.85,0.4,1) forwards;}
@keyframes burst-expand{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}55%{opacity:0.75;}100%{transform:translate(-50%,-50%) scale(22);opacity:0;}}
.rv-rays{position:absolute;width:200vmax;height:200vmax;top:50%;left:50%;transform:translate(-50%,-50%);background:repeating-conic-gradient(from 0deg at 50% 50%,var(--rc-ray,rgba(154,184,208,0.07)) 0deg 7deg,transparent 7deg 22deg);opacity:0;pointer-events:none;transition:opacity 0.6s ease;}
.rv-overlay.burst .rv-rays{opacity:1;animation:rays-spin 18s linear infinite;}
@keyframes rays-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.rv-overlay.prism .rv-rays{background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(255,120,120,0.09) 0deg 4deg,rgba(255,200,80,0.09) 4deg 8deg,rgba(100,255,160,0.09) 8deg 12deg,rgba(80,180,255,0.09) 12deg 16deg,rgba(200,120,255,0.09) 16deg 20deg,transparent 20deg 36deg);}
.rv-glow{position:absolute;width:360px;height:360px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--rc-dim,rgba(100,155,195,0.25)) 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity 0.5s ease 0.3s;}
.rv-overlay.burst .rv-glow{opacity:1;animation:glow-pulse 2.2s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7;}50%{transform:translate(-50%,-50%) scale(1.12);opacity:1;}}
.rv-flash{position:absolute;inset:0;pointer-events:none;background:var(--rc-burst,rgba(154,184,208,0.5));opacity:0;}
.rv-overlay.flashing .rv-flash{animation:rv-flash-anim 0.35s ease-out forwards;}
@keyframes rv-flash-anim{0%{opacity:0.7;}100%{opacity:0;}}
.rv-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.rv-spark{position:absolute;border-radius:50%;pointer-events:none;animation:spark-fly 0.9s ease-out forwards;}

.rv-front-info{padding:10px 12px 18px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;

.rv-front-stars{font-size:16px;text-align:center;letter-spacing:3px;line-height:1;

.rv-front.gold-face{background:rgba(14,10,3,0.98)!important;border-color:rgba(220,170,50,0.8)!important;box-shadow:0 0 24px rgba(200,155,60,0.35)!important;}

.rv-hint{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;margin-bottom:18px;animation:hint-blink 1.8s ease-in-out infinite;transition:opacity 0.3s;}
@keyframes hint-blink{0%,100%{opacity:0.35;}50%{opacity:0.8;}}
.rv-info{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:24px;opacity:0;transition:opacity 0.4s;}
.rv-info.show{opacity:1;}
.rv-champ-name{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--rk-text);letter-spacing:1px;text-shadow:0 0 20px var(--rc,rgba(154,184,208,0.6));}

.rv-close-btn{width:200px;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#a07828,var(--gold));color:#0a0e1a;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:0.5px;box-shadow:0 4px 20px rgba(200,155,60,0.3);opacity:0;pointer-events:none;transition:opacity 0.35s,transform 0.15s;}

@keyframes info-up{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  position:relative;z-index:2;padding:6px 5px 4px;}

.tc-img-area::after{content:'';position:absolute;bottom:0;left:0;right:0;height:18px;

.tc-stars{font-size:10px;text-align:center;letter-spacing:1.5px;line-height:1;
  color:rgba(190,215,230,0.85);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.tc-inner[data-star="2"] .tc-back{border-color:rgba(200,155,60,0.5);animation:hint-gold-sm 1.4s ease-in-out infinite;}
@keyframes hint-gold-sm{0%,100%{box-shadow:0 0 6px rgba(200,155,60,0.15);}50%{box-shadow:0 0 16px rgba(200,155,60,0.4);}}
.tc-inner[data-star="3"] .tc-back{animation:hint-prism-sm 2s linear infinite;}
@keyframes hint-prism-sm{0%{border-color:rgba(200,110,255,0.6);}50%{border-color:rgba(230,90,210,0.6);}100%{border-color:rgba(200,110,255,0.6);}}
.tc-front.gold-face{background:rgba(14,10,3,0.98)!important;
  box-shadow:0 0 0 2px rgba(220,170,50,0.85),0 0 10px 1px rgba(200,155,60,0.45)!important;}
.tc-front.gold-face .tc-glow-layer{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(220,170,50,0.12) 0%,transparent 70%);}
.tc-front.gold-face .tc-stars{color:rgba(230,180,50,0.95);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.tc-front.prism-face{background:rgba(10,5,22,0.98)!important;animation:pet-prism 4s ease-in-out infinite!important;}
.tc-front.prism-face .tc-glow-layer{background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(180,100,255,0.12) 0%,transparent 70%);}
.tc-front.prism-face .tc-stars{color:rgba(210,145,255,1);text-shadow:0 0 6px rgba(180,100,255,0.6),0 1px 4px rgba(0,0,0,0.9);}

@keyframes popup-shake{0%,100%{transform:translate(0,0);}15%{transform:translate(-5px,-3px);}30%{transform:translate(5px,3px);}45%{transform:translate(-4px,4px);}60%{transform:translate(4px,-4px);}75%{transform:translate(-2px,2px);}90%{transform:translate(2px,-2px);}};

<body>
<div id="main">

  <header>
    <h1>아수라장 내전</h1>

        <button class="sp-cat-tab" onclick="switchTab('equipped',this)">장착</button>

      <!-- 뽑기 탭 -->

          <div class="sli-info">

            <div class="sli-desc">실버 87% · 골드 10% · 프리즘 3%<br>18종 · 중복 시 합성 재료 활용</div>
          </div>

        </div>
        <div class="sli">

<script>
const CHAMPS = [
  {slug:'Akshan',   kr:'아크샨'},   {slug:'Amumu',     kr:'아무무'},
  {slug:'Brand',    kr:'브랜드'},   {slug:'DrMundo',   kr:'문도 박사'},
  {slug:'Fizz',     kr:'피즈'},     {slug:'Gangplank', kr:'갱플랭크'},
  {slug:'Jhin',     kr:'진'},       {slug:'Khazix',    kr:'카직스'},
  {slug:'Lulu',     kr:'룰루'},     {slug:'Malphite',  kr:'말파이트'},
  {slug:'Malzahar', kr:'말자하'},   {slug:'Mel',       kr:'멜'},
  {slug:'Morgana',  kr:'모르가나'}, {slug:'Naafiri',   kr:'나피리'},
  {slug:'Poppy',    kr:'뽀삐'},     {slug:'Rammus',    kr:'람머스'},
  {slug:'Vayne',    kr:'베인'},     {slug:'Yasuo',     kr:'야스오'},
];
const TIER_PATH = ['','silver','gold','prism'];
const TIER_KR   = ['','실버','골드','프리즘'];
const IMG = (s, star=1) => `assets/pets/${s}/${TIER_PATH[star]}/default.png`;
const SPLASH = (slug) => `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${slug}_0.jpg`;
const STAR_LABEL = {1:'SILVER', 2:'GOLD', 3:'PRISM'};
const STAR_FLAVOR = {1:'실버 펫을 획득했어요!', 2:'✨ 희귀한 골드 펫!', 3:'🌈 초희귀 프리즘 펫!!'};
const RARITY = {
  1:{main:'rgba(154,184,208,0.8)',dim:'rgba(80,130,180,0.2)',ray:'rgba(154,184,208,0.07)',burst:'rgba(180,220,255,0.85)',btnClass:''},
  2:{main:'rgba(200,155,60,0.9)', dim:'rgba(200,140,20,0.25)',ray:'rgba(200,155,60,0.09)', burst:'rgba(255,220,80,0.85)', btnClass:''},
  3:{main:'rgba(180,138,255,0.9)',dim:'rgba(150,90,255,0.25)',ray:'rgba(180,138,255,0.09)',burst:'rgba(200,160,255,0.85)',btnClass:'prism-btn'},
};

// ── 사운드 시스템 (Web Audio API) ──
const _sfx = (()=>{
  let _ac=null;
  const ac=()=>{ if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended') _ac.resume(); return _ac; };
  const tone=(f,type='sine',t=0,dur=0.3,vol=0.13,att=0.01)=>{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;
    o.frequency.setValueAtTime(f,a.currentTime+t);
    g.gain.setValueAtTime(0,a.currentTime+t);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+t+att);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    o.start(a.currentTime+t);o.stop(a.currentTime+t+dur+0.05);
  };
  const sweep=(f0,f1,type='sine',t=0,dur=0.3,vol=0.15)=>{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;
    o.frequency.setValueAtTime(f0,a.currentTime+t);
    o.frequency.exponentialRampToValueAtTime(f1,a.currentTime+t+dur);
    g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    o.start(a.currentTime+t);o.stop(a.currentTime+t+dur+0.05);
  };
  const nz=(t=0,dur=0.2,vol=0.12,lp=4000,hp=200)=>{
    const a=ac();
    const buf=a.createBuffer(1,Math.ceil(a.sampleRate*dur),a.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=a.createBufferSource();src.buffer=buf;
    const f1=a.createBiquadFilter();f1.type='lowpass';f1.frequency.value=lp;
    const f2=a.createBiquadFilter();f2.type='highpass';f2.frequency.value=hp;
    const g=a.createGain();
    g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    src.connect(f1);f1.connect(f2);f2.connect(g);g.connect(a.destination);
    src.start(a.currentTime+t);
  };
  return {
    // 단일 뽑기 오버레이 열림
    pullOpen(){ nz(0,0.4,0.1,5000,1500); tone(200,'sine',0,0.45,0.05,0.05); },
    // 카드 뒤집기
    flip(){ tone(1000,'triangle',0,0.08,0.1,0.003); tone(700,'sine',0.04,0.07,0.07,0.003); },
    // 티어별 공개 사운드
    reveal(star){
      if(star===3){
        [523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',i*0.07,0.5,0.14,0.01));
        nz(0.3,0.35,0.08,9000,2000);
        tone(2093,'sine',0.36,0.7,0.1,0.02);
      }else if(star===2){
        [523,659,784].forEach((f,i)=>tone(f,'sine',i*0.05,0.5,0.13,0.01));
        nz(0,0.18,0.06,5000,1000);
      }else{
        tone(523,'sine',0,0.28,0.1,0.01);
        tone(659,'sine',0.1,0.22,0.08,0.01);
      }
    },
    // 희귀 카드 (10연)
    rareCard(star){
      if(star===3){ nz(0,0.1,0.12,6000,2000); tone(880,'sine',0,0.3,0.14,0.01); }
      else if(star===2){ nz(0,0.07,0.08,4000,1500); tone(660,'sine',0,0.22,0.11,0.01); }
    },
    // 합성 - 카드 등장
    mergeAppear(){ tone(440,'sine',0,0.22,0.06,0.02); nz(0,0.12,0.04,3000,500); },
    // 합성 - 차지 (에너지 빌드업)
    mergeCharge(){ sweep(80,220,'sawtooth',0,0.75,0.07); sweep(160,440,'square',0,0.75,0.025); nz(0,0.75,0.03,1800,40); },
    // 합성 - 날아들기 whoosh
    mergeFly(){
      const a=ac();
      const buf=a.createBuffer(1,Math.ceil(a.sampleRate*0.32),a.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=a.createBufferSource();src.buffer=buf;
      const f=a.createBiquadFilter();f.type='bandpass';
      f.frequency.setValueAtTime(3500,a.currentTime);
      f.frequency.exponentialRampToValueAtTime(250,a.currentTime+0.32);
      f.Q.value=1.5;
      const g=a.createGain();
      g.gain.setValueAtTime(0.001,a.currentTime);g.gain.linearRampToValueAtTime(0.32,a.currentTime+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.32);
      src.connect(f);f.connect(g);g.connect(a.destination);src.start();
    },
    // 합성 - 충격
    mergeImpact(toStar){
      sweep(160,30,'sine',0,0.45,0.42); nz(0,0.12,0.35,900,20); nz(0,0.07,0.2,14000,4000);
      if(toStar>=2) tone(toStar===3?220:180,'sine',0.06,0.5,0.07,0.02);
    },
    // 합성 - 결과 등장
    mergeReveal(toStar){ this.reveal(toStar); },
  };
})();

let equippedPet = null;
let gold = 9999;
let inv  = Object.fromEntries(CHAMPS.map(c=>[c.slug,{s1:0,s2:0,s3:0}]));
let ever = Object.fromEntries(CHAMPS.map(c=>[c.slug,{e1:false,e2:false,e3:false}]));
let star = 1;
let previewIdx = 0, previewTimer = null;
let currentTab = 'pull';

function gp(s){ return {s1:0,s2:0,s3:0,...(inv[s]||{})}; }
function ge(s){ return {e1:false,e2:false,e3:false,...(ever[s]||{})}; }

function startPreviewCycle(){
  previewTimer = setInterval(()=>{
    previewIdx = (previewIdx+1) % CHAMPS.length;
    const c = CHAMPS[previewIdx];
    const img = document.getElementById('preview-img');
    if(!img) return;
    img.style.opacity='0';
    setTimeout(()=>{ img.onerror=null; img.src=IMG(c.slug); img.style.opacity='1'; }, 180);
  }, 1800);
}
startPreviewCycle();

function rollStar(){
  const r=Math.random();
  if(r<0.03) return 3;
  if(r<0.13) return 2;
  return 1;
}

function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.sp-cat-tabs .sp-cat-tab').forEach(b=>{
    if(['pull','collection','equipped'].some(t=>b.getAttribute('onclick')?.includes(t)))
      b.classList.remove('active');
  });
  btn.classList.add('active');
  ['pull','collection','equipped'].forEach(t=>{
    const el = document.getElementById('tab-'+t);
    if(el) el.style.display = t===tab ? '' : 'none';
  });
  if(tab==='collection') render();
  if(tab==='equipped') renderEquipped();
}

function doPull(times){
  const cost = times===1 ? 50 : 450;
  if(gold<cost){ setResult(`🪙 골드 부족! (보유 ${gold}G)`); return; }
  gold -= cost;
  document.getElementById('gold-display').textContent = gold;
  updateBtns();
  const results = [];
  for(let i=0;i<times;i++){
    const c = CHAMPS[Math.floor(Math.random()*CHAMPS.length)];
    const s = rollStar();
    const p = gp(c.slug);
    inv[c.slug] = {...p, [`s${s}`]: p[`s${s}`]+1};
    ever[c.slug] = {...ge(c.slug), [`e${s}`]: true};
    results.push({...c, star:s});
  }
  if(times===1){
    const c = results[0];
    clearInterval(previewTimer);
    const img = document.getElementById('preview-img');
    if(img){ img.style.opacity='0'; }
    setTimeout(()=>{ if(img){ img.onerror=null; img.src=IMG(c.slug,c.star); img.style.opacity='1'; } }, 200);
    setTimeout(startPreviewCycle, 3500);
    showReveal(c, c.star);
  } else {
    showTenResultPopup(results);
  }
  updateColHeader();
}

function updateColHeader(){
  let total=0;
  CHAMPS.forEach(c=>{ if(ge(c.slug).e1||ge(c.slug).e2||ge(c.slug).e3) total++; });
  document.getElementById('col-count-header').textContent = `${total} / ${CHAMPS.length}`;
}

// ── 단일 뽑기 리빌 ──
let _rvPending = null;

function showReveal(c, starLevel){
  _rvPending = {c, starLevel};
  const ov = document.getElementById('rv-overlay');
  const rc = RARITY[starLevel];
  ov.style.setProperty('--rc', rc.main);
  ov.style.setProperty('--rc-dim', rc.dim);
  ov.style.setProperty('--rc-ray', rc.ray);
  ov.style.setProperty('--rc-burst', rc.burst);
  ov.className = 'rv-overlay';
  if(starLevel===3) ov.classList.add('prism');
  const flip = document.getElementById('rv-flip');
  flip.style.transition='none'; flip.classList.remove('flipped'); void flip.offsetWidth; flip.style.transition='';
  document.getElementById('rv-back').className  = 'rv-back';
  document.getElementById('rv-front').className = 'rv-front';
  document.getElementById('rv-no-img').style.display='none';
  const img = document.getElementById('rv-img');
  img.style.display=''; img.onerror=null; img.src=IMG(c.slug, starLevel);
  img.onerror=()=>{ img.src=IMG(c.slug,1); img.onerror=()=>{ img.style.display='none'; document.getElementById('rv-no-img').style.display='block'; }; };
  const _sc={1:'★',2:'★★',3:'★★★'};
  document.getElementById('rv-front-stars').textContent = _sc[starLevel];
  document.getElementById('rv-splash').style.backgroundImage = `url('${SPLASH(c.slug)}')`;
  document.getElementById('rv-champ-name').textContent = c.kr;
  const badge = document.getElementById('rv-tier-badge');
  badge.textContent = TIER_KR[starLevel] + ' 펫'; badge.style.borderColor = rc.main; badge.style.color = rc.main;
  document.getElementById('rv-flavor').textContent = STAR_FLAVOR[starLevel];
  document.getElementById('rv-hint').style.opacity='1';
  const info = document.getElementById('rv-info'); info.classList.remove('show'); info.style.animation='';
  const btn = document.getElementById('rv-close-btn'); btn.className = 'rv-close-btn ' + rc.btnClass; btn.style.opacity='0'; btn.style.pointerEvents='none';
  document.getElementById('rv-stage').classList.remove('show','flipped');
  document.getElementById('rv-particles').innerHTML='';
  ov.classList.add('show');
  _sfx.pullOpen();
  setTimeout(()=> ov.classList.add('burst'), 50);
  setTimeout(()=> document.getElementById('rv-stage').classList.add('show'), 450);
}

function flipRevealCard(){
  if(!_rvPending) return;
  const flip = document.getElementById('rv-flip');
  if(flip.classList.contains('flipped')) return;
  const {c, starLevel} = _rvPending; _rvPending = null;
  _sfx.flip();
  setTimeout(()=>_sfx.reveal(starLevel), 320);
  flip.classList.add('flipped'); document.getElementById('rv-stage').classList.add('flipped');
  const front = document.getElementById('rv-front');
  if(starLevel===2) front.classList.add('gold-face');
  else if(starLevel===3) front.classList.add('prism-face');
  document.getElementById('rv-hint').style.opacity='0';
  const ov = document.getElementById('rv-overlay'); ov.classList.remove('flashing'); void ov.offsetWidth; ov.classList.add('flashing'); setTimeout(()=> ov.classList.remove('flashing'), 400);
  spawnParticles(starLevel, RARITY[starLevel].main);
  setTimeout(()=>{ const info = document.getElementById('rv-info'); info.classList.add('show'); info.style.animation='info-up 0.45s cubic-bezier(0.22,1,0.4,1) both'; }, 520);
  setTimeout(()=>{ const btn = document.getElementById('rv-close-btn'); btn.style.opacity='1'; btn.style.pointerEvents='auto'; }, 820);
}

function spawnParticles(starLevel, color){
  const cont = document.getElementById('rv-particles'); cont.innerHTML='';
  const cnt = starLevel===3?28 : starLevel===2?18 : 12;
  const colors = starLevel===3?['#ff9999','#ffdd66','#99ffbb','#99ccff','#dd99ff','#ffffff']:starLevel===2?['#ffe066','#ffc832','#fff0a0','#ffffff']:['#9ab8d0','#c0ddf0','#ffffff','#70a8c8'];
  for(let i=0;i<cnt;i++){
    const el = document.createElement('div'); el.className = 'rv-spark';
    const angle=(i/cnt)*360+Math.random()*20, dist=80+Math.random()*(starLevel*36), size=4+Math.random()*6, col=colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText=`width:${size}px;height:${size}px;background:radial-gradient(circle,#fff 0%,${col} 60%,transparent 100%);left:50%;top:42%;--dx:${Math.cos(angle*Math.PI/180)*dist}px;--dy:${Math.sin(angle*Math.PI/180)*dist}px;animation-delay:${Math.random()*0.15}s;animation-duration:${0.7+Math.random()*0.4}s;`;
    cont.appendChild(el); setTimeout(()=> el.remove(), 1400);
  }
}

function closeReveal(){ document.getElementById('rv-overlay').className = 'rv-overlay'; }

// ── 10연 팝업 ──
let _tenFlipped=0, _tenTotal=0;

function showTenResultPopup(results){
  _tenFlipped=0; _tenTotal=results.length;
  const grid = document.getElementById('ten-grid'); const btn = document.getElementById('ten-btn');
  btn.classList.remove('show'); const openBtn = document.querySelector('.ten-open-all'); if(openBtn) openBtn.style.display='';
  grid.innerHTML='';
  results.forEach((c,i)=>{
    const s=c.star||1, rareCls=s===2?'gold-face':s===3?'prism-face':'';
    const div=document.createElement('div'); div.className='tc'; div.id=`tc-wrap${i}`;
    const STAR_CHARS={1:'★',2:'★★',3:'★★★'};
    div.innerHTML=`<div class="tc-inner" id="tc${i}" data-star="${s}" data-slug="${c.slug}" onclick="onTenCardClick(${i})"><div class="tc-back"><div class="tc-back-pattern"></div><span>✦</span></div><div class="tc-front ${rareCls}"><div class="tc-splash" style="background-image:url('${SPLASH(c.slug)}')"></div><div class="tc-glow-layer"></div><div class="tc-img-area"><img src="${IMG(c.slug,s)}" alt="" onerror="this.onerror=null;this.src='${IMG(c.slug,1)}'"></div><div class="tc-info"><div class="tc-name">${c.kr}</div><div class="tc-stars">${STAR_CHARS[s]}</div></div></div></div>`;
    grid.appendChild(div);
  });
  document.getElementById('ten-popup').classList.add('show');
  results.forEach((_,i)=>{ setTimeout(()=>{ const inner=document.getElementById('tc'+i); if(inner){ inner.style.transition=`opacity 0.3s ease, transform 0.3s ease`; inner.classList.add('entered'); } }, i*60); });
}

function flipTenCard(i){
  const inner=document.getElementById('tc'+i); if(!inner||inner.classList.contains('flipped')) return;
  inner.classList.add('flipped');
  const wrap=inner.closest('.tc'); if(wrap){ wrap.classList.remove('popping'); void wrap.offsetWidth; wrap.classList.add('popping'); }
  const s=parseInt(inner.dataset.star||'1');
  _sfx.flip();
  if(s>=2) setTimeout(()=>{ triggerRareEffect(s); _sfx.rareCard(s); }, 280);
  _tenFlipped++;
  if(_tenFlipped>=_tenTotal){ setTimeout(()=>{ document.getElementById('ten-btn').classList.add('show'); const ob=document.querySelector('.ten-open-all'); if(ob) ob.style.display='none'; }, 400); }
}

function openAllTen(){
  let delay=0;
  for(let i=0;i<_tenTotal;i++){ const inner=document.getElementById('tc'+i); if(inner&&!inner.classList.contains('flipped')){ setTimeout(()=> flipTenCard(i), delay); delay+=160; } }
}
function openAllInstant(){
  for(let i=0;i<_tenTotal;i++){ const inner=document.getElementById('tc'+i); if(inner&&!inner.classList.contains('flipped')) flipTenCard(i); }
}

function triggerRareEffect(s){
  const popup=document.getElementById('ten-popup'); popup.classList.remove('shake'); void popup.offsetWidth; popup.classList.add('shake'); setTimeout(()=> popup.classList.remove('shake'), 500);
  const rf=document.getElementById('rare-flash'); rf.style.background=s===3?'rgba(180,138,255,0.2)':'rgba(200,155,60,0.18)'; rf.classList.remove('pop'); void rf.offsetWidth; rf.classList.add('pop');
}

function closeTenPopup(){ document.getElementById('ten-popup').classList.remove('show'); }

// ── 컬렉션 ──
function switchStar(s, btn){
  star=s;
  document.querySelectorAll('#tab-collection .sp-cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function equipPet(slug, s){
  equippedPet = {slug, star:s};
  render();
  renderEquipped();
  const c=CHAMPS.find(c=>c.slug===slug);
  setResult(`🎽 ${c?.kr} ${TIER_KR[s]} 장착!`);
}

function doMerge(slug, fromStar){
  const p=gp(slug); const sKey=`s${fromStar}`, nKey=`s${fromStar+1}`;
  if(p[sKey]<3){ setResult('재료 부족! (같은 펫 3개 필요)'); return; }
  inv[slug]={...p,[sKey]:p[sKey]-3,[nKey]:p[nKey]+1};
  ever[slug]={...ge(slug),[`e${fromStar+1}`]:true};
  const c=CHAMPS.find(c=>c.slug===slug);
  render(); updateColHeader();
  showMergeAnim(slug, fromStar, fromStar+1, c.kr);
}

function showMergeAnim(slug, fromStar, toStar, krName){
  const MCOL={
    2:{color:'rgba(200,155,60,0.9)',glow:'rgba(200,155,60,0.45)',flash:'rgba(255,230,80,0.85)',ray:'rgba(200,155,60,0.07)'},
    3:{color:'rgba(180,138,255,0.9)',glow:'rgba(180,138,255,0.45)',flash:'rgba(210,170,255,0.85)',ray:'rgba(180,138,255,0.07)'},
  };
  const col=MCOL[toStar]||MCOL[2];
  const ov=document.getElementById('mgo');
  ov.style.setProperty('--mgo-color',col.color);
  ov.style.setProperty('--mgo-glow',col.glow);

  const fromTc={1:'#8ab4cc',2:'var(--gold)',3:'var(--purple-light)'};
  const imgSrc=IMG(slug,fromStar);
  const POS=[{cx:'-118px',cy:'88px',cr:'-18deg'},{cx:'118px',cy:'88px',cr:'18deg'},{cx:'0px',cy:'-124px',cr:'-3deg'}];

  // 카드 초기화
  ['mgo-c1','mgo-c2','mgo-c3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.remove('charge');
    el.style.transition='none';
    el.style.transform='';
    el.style.opacity='0';
    el.style.filter='';
    el.style.boxShadow='';
    el.style.borderColor='rgba(255,255,255,0.1)';
    el.style.setProperty('--cx',POS[i].cx);
    el.style.setProperty('--cy',POS[i].cy);
    el.style.setProperty('--cr',POS[i].cr);
    el.querySelector('img').src=imgSrc;
    const t=document.getElementById(id.replace('mgo-c','mgo-ct'));
    t.textContent=STAR_LABEL[fromStar]; t.style.color=fromTc[fromStar];
  });

  // 나머지 초기화
  const result=document.getElementById('mgo-result');
  result.classList.remove('show'); result.style.pointerEvents='none';
  const rays=document.getElementById('mgo-rays');
  rays.style.background=`repeating-conic-gradient(from 0deg,${col.ray} 0deg 6deg,transparent 6deg 20deg)`;
  rays.classList.remove('show');
  ['mgo-ring1','mgo-ring2','mgo-ring3'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('pop');void el.offsetWidth;});
  const flash=document.getElementById('mgo-flash');
  flash.style.background=col.flash; flash.classList.remove('pop'); void flash.offsetWidth;
  document.getElementById('mgo-particles').innerHTML='';

  // 결과 셋업
  const ri=document.getElementById('mgo-result-img');
  ri.style.display=''; ri.src=IMG(slug,toStar); ri.onerror=()=>{ri.style.display='none';};
  document.getElementById('mgo-result-card').className='mgo-result-card'+(toStar===3?' prism':'');
  const rt=document.getElementById('mgo-result-tier');
  rt.textContent=STAR_LABEL[toStar]; rt.className=`mgo-result-tier s${toStar}`;
  document.getElementById('mgo-champ-name').textContent=krName;
  document.getElementById('mgo-tier-badge').textContent=TIER_KR[toStar]+' 펫';
  document.getElementById('mgo-tier-badge').style.cssText=`color:${col.color};border-color:${col.color};`;
  document.getElementById('mgo-btn').className='mgo-btn'+(toStar===3?' prism':'');

  ov.classList.add('show');

  // Phase 1 (100ms): 카드 등장 (순차)
  setTimeout(()=>{
    rays.classList.add('show');
    ['mgo-c1','mgo-c2','mgo-c3'].forEach((id,i)=>{
      setTimeout(()=>{
        const el=document.getElementById(id);
        _sfx.mergeAppear();
        el.style.transition='opacity 0.38s ease, filter 0.38s ease';
        el.style.opacity='1'; el.style.filter='brightness(2)';
        setTimeout(()=>{
          el.style.transition='filter 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease';
          el.style.borderColor=col.color;
          el.style.boxShadow=`0 0 10px ${col.glow},0 0 28px ${col.glow}`;
          el.style.filter='brightness(1)';
          setTimeout(()=>el.classList.add('charge'), 200);
        }, 400);
      }, i*100);
    });
    setTimeout(()=>_sfx.mergeCharge(), 520);
  }, 80);

  // Phase 2 (920ms): 중앙으로 날아들기
  setTimeout(()=>{
    _sfx.mergeFly();
    ['mgo-c1','mgo-c2','mgo-c3'].forEach((id,i)=>{
      setTimeout(()=>{
        const el=document.getElementById(id);
        el.classList.remove('charge'); void el.offsetWidth;
        el.style.transition='transform 0.34s cubic-bezier(0.6,0,1,0.85), opacity 0.34s ease, filter 0.3s ease, box-shadow 0.2s ease';
        el.style.transform='translate(0,0) rotate(0deg) scale(0.04)';
        el.style.opacity='0';
        el.style.filter='brightness(10)';
        el.style.boxShadow=`0 0 50px ${col.color},0 0 100px ${col.color}`;
      }, i*55);
    });
  }, 920);

  // Phase 3 (1200ms): 충격 — 플래시 + 링 + 파티클
  setTimeout(()=>{
    _sfx.mergeImpact(toStar);
    flash.classList.remove('pop'); void flash.offsetWidth; flash.classList.add('pop');
    ['mgo-ring1','mgo-ring2','mgo-ring3'].forEach((id,i)=>{
      setTimeout(()=>{const el=document.getElementById(id);el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');},i*110);
    });
    _mgoSparks(toStar,col);
  }, 1200);

  // Phase 4 (1430ms): 결과 카드 등장
  setTimeout(()=>{
    rays.classList.remove('show');
    result.style.pointerEvents='auto';
    result.classList.add('show');
    _sfx.mergeReveal(toStar);
  }, 1430);
}

function _mgoSparks(toStar, col){
  const cont=document.getElementById('mgo-particles'); cont.innerHTML='';
  const cnt=toStar===3?32:toStar===2?24:16;
  const clrs=toStar===3?['#ff9999','#ffdd66','#99ffbb','#99ccff','#dd99ff','#fff']:
             toStar===2?['#ffe066','#ffc832','#fff8c0','#fff']:['#9ab8d0','#bfd8ef','#fff'];
  for(let i=0;i<cnt;i++){
    const el=document.createElement('div'); el.className='mgo-spark';
    const angle=(i/cnt)*360+Math.random()*16, dist=55+Math.random()*(toStar*42+35);
    const size=3+Math.random()*6, c=clrs[Math.floor(Math.random()*clrs.length)];
    el.style.cssText=`width:${size}px;height:${size}px;background:radial-gradient(circle,#fff 0%,${c} 60%,transparent 100%);left:50%;top:50%;--dx:${Math.cos(angle*Math.PI/180)*dist}px;--dy:${Math.sin(angle*Math.PI/180)*dist}px;--dur:${0.65+Math.random()*0.5}s;--delay:${Math.random()*0.1}s;`;
    cont.appendChild(el); setTimeout(()=>el.remove(),1600);
  }
}

function closeMergeAnim(){document.getElementById('mgo').classList.remove('show');}

function render(){
  const sKey=`s${star}`, eKey=`e${star}`;
  let owned=0;
  const html=CHAMPS.map(({slug,kr})=>{
    const p=gp(slug), e=ge(slug);
    const cnt=p[sKey]||0; const hasEver=e[eKey]||cnt>0;
    if(hasEver) owned++;
    const canMerge=star<3&&cnt>=3;
    const isEq=equippedPet&&equippedPet.slug===slug&&equippedPet.star===star;
    const imgStyle=hasEver?'':'filter:brightness(0.05)';
    const STAR_CHARS={1:'★',2:'★★',3:'★★★'};
    const buttons=(()=>{
      const eq=hasEver&&cnt>0&&!isEq, mg=canMerge;
      if(eq&&mg) return `<div style="display:flex;gap:2px;width:100%;"><button class="equip-btn" style="flex:1;padding:2px 0;" onclick="equipPet('${slug}',${star})">장착</button><button class="merge-btn" style="flex:1;padding:2px 0;" onclick="doMerge('${slug}',${star})">합성▲</button></div>`;
      if(eq) return `<button class="equip-btn" onclick="equipPet('${slug}',${star})">장착</button>`;
      if(mg) return `<button class="merge-btn" onclick="doMerge('${slug}',${star})">합성 ▲</button>`;
      return '';
    })();
    return `<div class="pet-card t${star} ${hasEver?'owned':'locked'}" ${hasEver?`onclick="if(!event.target.closest('button'))showCardZoom('${slug}',${star},${cnt})"`:''}">
      <div class="pet-splash" style="background-image:url('${SPLASH(slug)}')"></div>
      <div class="pet-glow-layer"></div>
      ${hasEver&&cnt>1?`<div class="pet-cnt-badge ${star===3?'t3':''}">×${cnt}</div>`:''}
      <div class="pet-img"><img src="${IMG(slug,star)}" style="${imgStyle}" loading="lazy" alt="" onerror="this.onerror=null;this.src='${IMG(slug,1)}'"></div>
      <div class="pet-info">
        <div class="pet-name ${hasEver?'':'locked'}">${hasEver?kr:'???'}</div>
        ${hasEver?`<div class="pet-stars">${STAR_CHARS[star]}</div>`:''}
        ${isEq?`<div class="pet-eq-badge">장착됨</div>`:''}
        ${buttons}
      </div>
    </div>`;
  }).join('');
  document.getElementById('pet-grid').innerHTML=html;
  document.getElementById('col-count').textContent=`${owned} / ${CHAMPS.length}`;
  updateColHeader();
  updateBtns();
}

function renderEquipped(){
  const area=document.getElementById('equipped-area');
  if(!equippedPet){ area.innerHTML=`<div class="no-equip-msg">장착된 펫이 없어요<br><span style="font-size:10px;">뽑기 후 도감에서 장착하세요</span></div>`; return; }
  const c=CHAMPS.find(c=>c.slug===equippedPet.slug);
  const tierColors={1:'#8ab4cc',2:'var(--gold)',3:'var(--purple-light)'};
  area.innerHTML=`<div class="equipped-row">
    <div class="equipped-img-box"><img src="${IMG(equippedPet.slug,equippedPet.star)}" alt="" onerror="this.src='${IMG(equippedPet.slug,1)}'"></div>
    <div class="equipped-info">
      <div class="equipped-name">${c?.kr||equippedPet.slug}</div>
      <div class="equipped-tier" style="color:${tierColors[equippedPet.star]}">${TIER_KR[equippedPet.star]} 펫</div>
    </div>
    <button class="sli-price" style="font-size:10px;padding:4px 10px;" onclick="equippedPet=null;renderEquipped();">해제</button>
  </div>`;
}

function setResult(msg){ document.getElementById('gacha-result').textContent=msg; }
function updateBtns(){
  document.getElementById('btn1').disabled  = gold<50;
  document.getElementById('btn10').disabled = gold<450;
}

updateColHeader();

function showCardZoom(slug, star, cnt){
  const STAR_CHARS={1:'★',2:'★★',3:'★★★'};
  const c=CHAMPS.find(c=>c.slug===slug);
  const kr=c?.kr||slug;
  const isEq=equippedPet&&equippedPet.slug===slug&&equippedPet.star===star;
  document.getElementById('cz-card-host').innerHTML=`<div class="pet-card t${star} owned">
    <div class="pet-splash" style="background-image:url('${SPLASH(slug)}')"></div>
    <div class="pet-glow-layer"></div>
    ${cnt>1?`<div class="pet-cnt-badge ${star===3?'t3':''}">×${cnt}</div>`:''}
    <div class="pet-img"><img src="${IMG(slug,star)}" alt="" onerror="this.onerror=null;this.src='${IMG(slug,1)}'"></div>
    <div class="pet-info">
      <div class="pet-name">${kr}</div>
      <div class="pet-stars">${STAR_CHARS[star]}</div>
      ${isEq?'<div class="pet-eq-badge">장착됨</div>':''}
    </div>
  </div>`;
  document.getElementById('card-zoom-overlay').classList.add('show');
}
function closeCardZoom(){ document.getElementById('card-zoom-overlay').classList.remove('show'); }

function onTenCardClick(i){
  const inner=document.getElementById('tc'+i); if(!inner) return;
  if(inner.classList.contains('flipped')){
    showCardZoom(inner.dataset.slug, parseInt(inner.dataset.star), 0);
  } else {
    flipTenCard(i);
  }
}
</script>
