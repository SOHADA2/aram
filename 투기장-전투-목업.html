<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🗡️ 투기장 전투 목업</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<style>
  html,body{height:100%;margin:0;background:#0a0a12;color:#e8eaf2;font-family:'Noto Sans KR',system-ui,sans-serif;overflow:hidden;}
  #app{position:fixed;inset:0;}
  #stagewrap{position:absolute;left:0;top:0;right:330px;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#070710;}
  #boxlabel{font-size:11px;color:#7a82a0;}
  #boxscaler{transform-origin:center;}
  #box{position:relative;width:388px;height:236px;border-radius:14px;overflow:hidden;border:1px solid rgba(240,200,90,.22);
    background:radial-gradient(ellipse 42% 34% at 13% 6%,rgba(245,185,100,.20),transparent 66%),radial-gradient(ellipse 42% 34% at 87% 6%,rgba(228,95,75,.16),transparent 66%),linear-gradient(180deg,#08070f 0%,#0e0a18 44%,#150f1d 68%,#1d1219 100%);}
  #box::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:14px;background:radial-gradient(ellipse 124% 82% at 50% 38%,transparent 54%,rgba(4,3,9,.6) 100%);box-shadow:inset 0 0 54px rgba(0,0,0,.45);z-index:3;}
  #box canvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}
  #box .guide-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.06);z-index:4;} #box .guide-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.06);z-index:4;}
  /* ===== 실제 앱 전투 HUD 그대로 ===== */
  .arena3d-env{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;border-radius:14px;}
  .arena3d-env .a3e-wall{position:absolute;left:0;right:0;top:0;height:55%;background:linear-gradient(180deg,rgba(0,0,0,.52),transparent 86%),repeating-linear-gradient(90deg,transparent 0 32px,rgba(255,205,130,.045) 32px 33px,transparent 33px 66px);}
  .arena3d-env .a3e-floor{position:absolute;left:-30%;right:-30%;bottom:-2%;height:54%;transform:perspective(200px) rotateX(50deg);transform-origin:50% 100%;background:radial-gradient(ellipse 44% 90% at 50% 118%,rgba(245,205,120,.32),rgba(205,92,70,.11) 48%,transparent 74%);}
  .arena3d-env .a3e-floor::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 34px,rgba(245,212,135,.11) 34px 35px),repeating-linear-gradient(0deg,transparent 0 26px,rgba(245,212,135,.07) 26px 27px);-webkit-mask:radial-gradient(ellipse 58% 100% at 50% 100%,#000 26%,transparent 72%);mask:radial-gradient(ellipse 58% 100% at 50% 100%,#000 26%,transparent 72%);}
  .arena3d-env .a3e-horizon{position:absolute;left:8%;right:8%;top:53%;height:2px;background:linear-gradient(90deg,transparent,rgba(245,200,115,.30),transparent);filter:blur(1px);}
  .arena-pkbox{position:absolute;z-index:5;min-width:106px;max-width:44%;padding:4px 9px 5px;background:linear-gradient(165deg,rgba(26,21,12,.93),rgba(12,10,7,.94));border:1px solid rgba(240,200,90,.5);box-shadow:0 3px 11px rgba(0,0,0,.5),inset 0 0 13px rgba(240,200,90,.06);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);pointer-events:none;}
  .arena-pkbox.me{left:7px;top:7px;border-radius:11px 4px 11px 4px;}
  .arena-pkbox.opp{right:7px;bottom:7px;border-radius:4px 11px 4px 11px;}
  .arena-pkbox .pk-top{display:flex;align-items:baseline;justify-content:space-between;gap:7px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(240,200,90,.22);}
  .arena-pkbox .pk-nm{font-weight:900;font-size:11px;color:#ffe7b0;letter-spacing:.2px;text-shadow:0 1px 2px rgba(0,0,0,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .arena-pkbox .pk-lv{flex:none;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:10px;color:#cbb277;}
  .arena-pkbox .pk-hprow{display:flex;align-items:center;gap:5px;}
  .arena-pkbox .pk-hplabel{flex:none;font-weight:900;font-style:italic;font-size:9px;color:#f0c860;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .arena-pkbox .pk-hpb{position:relative;flex:1;height:5px;border-radius:3px;background:#120d07;border:1px solid rgba(240,200,90,.28);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.6);}
  .arena-pkbox .pk-hpghost{position:absolute;left:0;top:0;bottom:0;width:100%;border-radius:4px;background:linear-gradient(180deg,#ffe6ad,#e89a34);opacity:.9;}
  .arena-pkbox .pk-hpf{position:absolute;left:0;top:0;bottom:0;z-index:1;width:100%;border-radius:4px;background:linear-gradient(180deg,#74e489,#2fc35a);}
  .arena-pkbox .pk-hpf::after{content:'';position:absolute;left:0;right:0;top:0;height:48%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.5),transparent);}
  /* ===== /HUD ===== */
  #panel{position:absolute;right:0;top:0;bottom:0;width:330px;background:#11131c;border-left:1px solid #262a3a;overflow-y:auto;padding:10px 12px 30px;box-sizing:border-box;}
  h2{font-size:14px;margin:4px 0 8px;color:#ffd24a;}
  .sec{border:1px solid #262a3a;border-radius:10px;padding:8px 9px;margin-bottom:9px;}
  .sec-h{font-size:12px;font-weight:800;margin-bottom:6px;}
  .me .sec-h{color:#6c9cff;} .op .sec-h{color:#ff7a6c;}
  .sec-h b{font-size:10px;font-weight:700;}
  .row{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:11px;}
  .row label{width:34px;color:#9aa3bd;flex-shrink:0;}
  .row input[type=range]{flex:1;accent-color:#ffd24a;min-width:0;}
  .row .val{width:38px;text-align:right;font-family:'JetBrains Mono',monospace;color:#cfe;font-size:11px;}
  select{background:#1a1d2a;color:#e8eaf2;border:1px solid #333a52;border-radius:7px;padding:5px;font-size:12px;}
  button{background:#222842;color:#dfe6ff;border:1px solid #3a4263;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:700;cursor:pointer;}
  button:hover{background:#2c345a;}
  button.go{background:linear-gradient(90deg,#f0c060,#e0a82e);color:#1a1206;border:0;width:100%;padding:10px;font-size:14px;margin:4px 0;}
  button.sm{padding:5px 8px;font-size:11px;}
  .cyc{display:flex;gap:4px;margin-bottom:6px;} .cyc select{flex:1;}
  .csbox{margin-top:7px;border-top:1px solid #262a3a;padding-top:6px;}
  .cs-row{display:flex;align-items:center;gap:5px;margin:4px 0;}
  .cs-l{width:32px;font-size:10.5px;font-weight:800;flex-shrink:0;}
  .cs-row.attack .cs-l{color:#ff9a4a;} .cs-row.idle .cs-l{color:#7CFC9A;} .cs-row.death .cs-l{color:#ff6b6b;}
  .cs-row select{flex:1;font-size:11px;padding:3px 4px;min-width:0;}
  #copyout{width:100%;height:150px;background:#0c0e16;color:#8fe;border:1px solid #333a52;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:6px;box-sizing:border-box;resize:vertical;margin-top:4px;}
  .hint{font-size:10px;color:#7a82a0;line-height:1.5;margin-top:3px;}
  .clips-list{font-size:9px;color:#6f7798;font-family:'JetBrains Mono',monospace;word-break:break-all;margin-top:4px;max-height:38px;overflow:auto;}
</style>
</head>
<body>
<div id="app">
  <div id="stagewrap">
    <div id="boxlabel">↓ 실제 전투창(388×236)·HUD 그대로 · 위치는 챔피언별 저장(자동저장)</div>
    <div id="boxscaler">
      <div id="box">
        <div class="arena3d-env" aria-hidden="true"><div class="a3e-wall"></div><div class="a3e-floor"></div><div class="a3e-horizon"></div></div>
        <div class="guide-v"></div><div class="guide-h"></div>
        <div class="arena-pkbox me" id="pk-me"><div class="pk-top"><span class="pk-nm" id="pk-me-nm">요네</span><span class="pk-lv">Lv.10</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost"></div><div class="pk-hpf"></div></div></div></div>
        <div class="arena-pkbox opp" id="pk-opp"><div class="pk-top"><span class="pk-nm" id="pk-opp-nm">그웬</span><span class="pk-lv">Lv.8</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost"></div><div class="pk-hpf"></div></div></div></div>
      </div>
    </div>
  </div>
  <div id="panel">
    <h2>🗡️ 투기장 전투 목업 <span style="font-size:10px;color:#666;">BUILD 6</span></h2>

    <div class="sec me">
      <div class="sec-h">🔵 내 캐릭터 <b id="me-now"></b></div>
      <div class="cyc"><button class="sm" data-slot="me" data-d="-1">◀</button><select id="me-champ"></select><button class="sm" data-slot="me" data-d="1">▶</button></div>
      <div class="row"><label>X 폭</label><input type="range" id="meX" min="0" max="4" step="0.05"><span class="val" id="meX-v"></span></div>
      <div class="row"><label>Y 상하</label><input type="range" id="meY" min="-1" max="3" step="0.05"><span class="val" id="meY-v"></span></div>
      <div class="row"><label>Z 깊이</label><input type="range" id="meZ" min="-2" max="2" step="0.05"><span class="val" id="meZ-v"></span></div>
      <div class="row"><label>크기</label><input type="range" id="meS" min="0.3" max="3" step="0.05"><span class="val" id="meS-v"></span></div>
      <div class="row"><label>회전</label><input type="range" id="meR" min="-3.14" max="3.14" step="0.02"><span class="val" id="meR-v"></span></div>
      <div class="csbox">
        <div class="cs-row attack"><span class="cs-l">공격</span><select id="me-c-attack"></select><button class="sm" data-slot="me" data-cat="attack">▶</button></div>
        <div class="cs-row idle"><span class="cs-l">기본</span><select id="me-c-idle"></select><button class="sm" data-slot="me" data-cat="idle">▶</button></div>
        <div class="cs-row death"><span class="cs-l">죽음</span><select id="me-c-death"></select><button class="sm" data-slot="me" data-cat="death">▶</button></div>
        <div class="clips-list" id="me-clips"></div>
      </div>
    </div>

    <div class="sec op">
      <div class="sec-h">🔴 상대 <b id="op-now"></b></div>
      <div class="cyc"><button class="sm" data-slot="op" data-d="-1">◀</button><select id="op-champ"></select><button class="sm" data-slot="op" data-d="1">▶</button></div>
      <div class="row"><label>X 폭</label><input type="range" id="opX" min="0" max="4" step="0.05"><span class="val" id="opX-v"></span></div>
      <div class="row"><label>Y 상하</label><input type="range" id="opY" min="-1" max="3" step="0.05"><span class="val" id="opY-v"></span></div>
      <div class="row"><label>Z 깊이</label><input type="range" id="opZ" min="-2" max="2" step="0.05"><span class="val" id="opZ-v"></span></div>
      <div class="row"><label>크기</label><input type="range" id="opS" min="0.3" max="3" step="0.05"><span class="val" id="opS-v"></span></div>
      <div class="row"><label>회전</label><input type="range" id="opR" min="-3.14" max="3.14" step="0.02"><span class="val" id="opR-v"></span></div>
      <div class="csbox">
        <div class="cs-row attack"><span class="cs-l">공격</span><select id="op-c-attack"></select><button class="sm" data-slot="op" data-cat="attack">▶</button></div>
        <div class="cs-row idle"><span class="cs-l">기본</span><select id="op-c-idle"></select><button class="sm" data-slot="op" data-cat="idle">▶</button></div>
        <div class="cs-row death"><span class="cs-l">죽음</span><select id="op-c-death"></select><button class="sm" data-slot="op" data-cat="death">▶</button></div>
        <div class="clips-list" id="op-clips"></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-h">📷 카메라 · 박스 (공용)</div>
      <div class="row"><label>거리</label><input type="range" id="cD" min="2" max="12" step="0.1"><span class="val" id="cD-v"></span></div>
      <div class="row"><label>높이</label><input type="range" id="cH" min="-1" max="2" step="0.02"><span class="val" id="cH-v"></span></div>
      <div class="row"><label>주시Y</label><input type="range" id="cL" min="-1" max="1" step="0.02"><span class="val" id="cL-v"></span></div>
      <div class="row"><label>FOV</label><input type="range" id="cF" min="20" max="55" step="1"><span class="val" id="cF-v"></span></div>
      <div class="row"><label>확대</label><input type="range" id="zoom" min="1" max="2.6" step="0.05"><span class="val" id="zoom-v"></span></div>
    </div>

    <button class="go" id="fight">⚔️ 전투 재생 (공격→죽음)</button>
    <button class="sm" id="reset" style="width:100%;margin-bottom:6px;">↺ 이 챔피언 위치 리셋</button>
    <div class="sec">
      <div class="sec-h">📋 값 복사 (앱에 붙여넣기)</div>
      <textarea id="copyout" readonly></textarea>
      <button class="sm" id="copy" style="width:100%;margin-top:4px;">복사</button>
      <div class="hint">위치는 <b>챔피언별 따로</b> 저장·자동저장(새로고침 OK). 7종 다 ◀▶로 맞춘 뒤 이 값 통째로 주면 앱에 박음.</div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const CHAMPS = ['teemo','gwen','vex','ekko','yone','neeko','lux'];
const KR = { teemo:'티모', gwen:'그웬', vex:'벡스', ekko:'에코', yone:'요네', neeko:'니코', lux:'럭스' };
const BW=388, BH=236;
const BASE = { me:{X:2,Y:1.8,Z:0.52,S:1.8,R:Math.PI}, op:{X:2.65,Y:0,Z:0.95,S:1.1,R:-0.14} };   // 챔피언별 위치 초기값(슬롯별)
let CAM = { cD:7.0, cH:0.06, cL:-0.05, cF:34, zoom:1.9 };   // 카메라·확대(공용)
const POS = {};      // POS[champ][slot] = {X,Y,Z,S,R}  ← 챔피언별 위치
const CLIPSEL = {};  // CLIPSEL[champ] = {attack,idle,death}
const CATS=['attack','idle','death'];
const CAT_CAND={ attack:['Attack1','Attack2','Spell1','Spell2','Crit','Taunt','Joke'], idle:['Idle1','Idle_Base','Idle2','Idle'], death:['Death'] };
const POSAXES={ meX:['me','X'],meY:['me','Y'],meZ:['me','Z'],meS:['me','S'],meR:['me','R'], opX:['op','X'],opY:['op','Y'],opZ:['op','Z'],opS:['op','S'],opR:['op','R'] };

// 저장/복원(localStorage)
function save(){ try{ localStorage.setItem('arenaMock6', JSON.stringify({POS,CLIPSEL,CAM})); }catch(e){} }
function loadStore(){ try{ const d=JSON.parse(localStorage.getItem('arenaMock6')); if(d){ Object.assign(POS,d.POS||{}); Object.assign(CLIPSEL,d.CLIPSEL||{}); if(d.CAM) Object.assign(CAM,d.CAM); } }catch(e){} }
loadStore();
if(!CLIPSEL.gwen) CLIPSEL.gwen={attack:'Attack1',idle:'Idle1',death:'Death'};   // 이전 작업 시드
if(!CLIPSEL.yone) CLIPSEL.yone={attack:'Attack4',idle:'Idle1_Base',death:'Death'};
function posOf(champ, slot){ if(!POS[champ]) POS[champ]={}; if(!POS[champ][slot]) POS[champ][slot]={...BASE[slot]}; return POS[champ][slot]; }

const box = document.getElementById('box');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setClearAlpha(0); renderer.outputColorSpace = THREE.SRGBColorSpace;
box.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer); scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.add(new THREE.HemisphereLight(0xe0eeff, 0x303048, 1.5));
const dir = new THREE.DirectionalLight(0xfff0d0, 1.3); dir.position.set(2,5,6); scene.add(dir);
const camera = new THREE.PerspectiveCamera(CAM.cF, BW/BH, 0.1, 5000);
const loader = new GLTFLoader(); try{ loader.setMeshoptDecoder(MeshoptDecoder); }catch(e){}
const clock = new THREE.Clock();

function applyZoom(){ document.getElementById('boxscaler').style.transform='scale('+CAM.zoom+')';
  renderer.setPixelRatio(Math.min((devicePixelRatio||1)*CAM.zoom, 3.5)); renderer.setSize(BW,BH,false); }

const units = { me:null, op:null };
function autoPick(clips, cands){ for(const n of cands) if(clips[n]) return n; return Object.keys(clips)[0]||''; }

function loadChamp(slot, champ){
  loader.load(champ+'_full.glb', g=>{
    if(units[slot]){ scene.remove(units[slot].group); }
    const model=g.scene; model.traverse(o=>{ if(o.isMesh){ o.frustumCulled=false; if(o.material)(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m.transparent){ m.transparent=false; m.alphaTest=0.5; m.depthWrite=true; } m.side=THREE.DoubleSide; m.needsUpdate=true; }); } });
    const bx=new THREE.Box3().setFromObject(model); const c=bx.getCenter(new THREE.Vector3()); const size=bx.getSize(new THREE.Vector3()); model.position.sub(c);
    const r=bx.getBoundingSphere(new THREE.Sphere()).radius||1;
    console.log('📐 '+champ+' size:['+size.x.toFixed(1)+', '+size.y.toFixed(1)+', '+size.z.toFixed(1)+'] r:'+r.toFixed(2)+' center:['+c.x.toFixed(1)+', '+c.y.toFixed(1)+', '+c.z.toFixed(1)+']');
    const group=new THREE.Group(); group.add(model); scene.add(group);
    const mixer=new THREE.AnimationMixer(model); const clips={}; (g.animations||[]).forEach(cl=>clips[cl.name]=cl);
    units[slot]={ group, model, mixer, clips, r, champ, side:(slot==='me'?-1:1), action:null };
    if(!CLIPSEL[champ]) CLIPSEL[champ]={ attack:autoPick(clips,CAT_CAND.attack), idle:autoPick(clips,CAT_CAND.idle), death:autoPick(clips,CAT_CAND.death) };
    posOf(champ, slot);   // 위치 보장
    setupClips(slot); loadSliders(slot);
    document.getElementById(slot+'-clips').textContent='전체: '+Object.keys(clips).join(' · ');
    document.getElementById('pk-'+(slot==='me'?'me':'opp')+'-nm').textContent=KR[champ];
    document.getElementById(slot+'-now').textContent='('+KR[champ]+' 위치)';
    console.log('⚔️ '+champ+'_full.glb 클립('+Object.keys(clips).length+'):', Object.keys(clips).join(', '));
    applyTransforms(); playIdle(slot); updCopy();
  }, undefined, e=>{ console.warn(champ+'_full.glb 로드 실패', e); document.getElementById(slot+'-clips').textContent='❌ 로드 실패'; });
}
function setupClips(slot){ const u=units[slot], keys=Object.keys(u.clips);
  for(const cat of CATS){ const sel=document.getElementById(slot+'-c-'+cat); sel.innerHTML='';
    keys.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
    if(!keys.includes(CLIPSEL[u.champ][cat])) CLIPSEL[u.champ][cat]=autoPick(u.clips,CAT_CAND[cat]);
    sel.value=CLIPSEL[u.champ][cat]; } }
function loadSliders(slot){ const u=units[slot]; if(!u) return; const p=posOf(u.champ,slot);
  for(const id in POSAXES){ if(POSAXES[id][0]!==slot) continue; const ax=POSAXES[id][1], el=document.getElementById(id);
    el.value=p[ax]; document.getElementById(id+'-v').textContent=(+p[ax]).toFixed(2); } }

function applyTransforms(){
  for(const slot of ['me','op']){ const u=units[slot]; if(!u) continue; const me=slot==='me', r=u.r, p=posOf(u.champ,slot);
    u.group.position.set(u.side*r*p.X, (me?-r*p.Y:r*p.Y), me?r*p.Z:-r*p.Z);
    u.group.scale.setScalar(p.S); u.group.rotation.set(0,p.R,0);
  }
  const maxR=Math.max(units.me?units.me.r:1, units.op?units.op.r:1, 1);
  camera.fov=CAM.cF; camera.position.set(0, maxR*CAM.cH, maxR*CAM.cD); camera.lookAt(0, 0, -maxR*CAM.cL); camera.updateProjectionMatrix();
}
function clip(slot, name, loop){ const u=units[slot]; if(!u||!u.clips[name]) return; if(u.action) u.action.fadeOut(0.18);
  const a=u.mixer.clipAction(u.clips[name]); a.reset(); a.setLoop(loop?THREE.LoopRepeat:THREE.LoopOnce); if(!loop) a.clampWhenFinished=true; a.fadeIn(0.18).play(); u.action=a; }
function playIdle(slot){ const u=units[slot]; if(!u) return; const n=(CLIPSEL[u.champ]&&CLIPSEL[u.champ].idle)||autoPick(u.clips,CAT_CAND.idle); if(n) clip(slot,n,true); }
function playCat(slot, cat){ const u=units[slot]; if(!u) return; const name=CLIPSEL[u.champ][cat]; if(!name) return;
  if(u._finL){ u.mixer.removeEventListener('finished', u._finL); u._finL=null; }
  clip(slot, name, cat==='idle');
  if(cat==='attack'){ u._finL=(e)=>{ if(!units[slot]) return; u.mixer.removeEventListener('finished', u._finL); u._finL=null; playIdle(slot); }; u.mixer.addEventListener('finished', u._finL); }
}

for(const slot of ['me','op']){ for(const cat of CATS){ const sel=document.getElementById(slot+'-c-'+cat);
  sel.addEventListener('change', ()=>{ const u=units[slot]; if(!u) return; CLIPSEL[u.champ][cat]=sel.value; playCat(slot,cat); save(); updCopy(); }); } }
document.querySelectorAll('.cs-row button').forEach(b=>b.onclick=()=>playCat(b.dataset.slot, b.dataset.cat));

document.getElementById('fight').onclick=()=>{ const um=units.me, uo=units.op; if(!um||!uo) return;
  playCat('me','attack'); setTimeout(()=>{ if(units.op) clip('op', CLIPSEL[units.op.champ].death, false); }, 650); };

function bindSlider(id){ const el=document.getElementById(id), v=document.getElementById(id+'-v');
  const init = POSAXES[id] ? null : CAM[id];
  if(init!=null){ el.value=init; v.textContent=(+init).toFixed(2); }
  el.addEventListener('input', ()=>{ const val=parseFloat(el.value); v.textContent=val.toFixed(2);
    if(POSAXES[id]){ const [slot,ax]=POSAXES[id]; const u=units[slot]; if(u){ posOf(u.champ,slot)[ax]=val; applyTransforms(); } }
    else { CAM[id]=val; if(id==='zoom') applyZoom(); else applyTransforms(); }
    save(); updCopy(); }); }
Object.keys(POSAXES).concat(['cD','cH','cL','cF','zoom']).forEach(bindSlider);

const meSel=document.getElementById('me-champ'), opSel=document.getElementById('op-champ');
CHAMPS.forEach(c=>{ const a=document.createElement('option'); a.value=c; a.textContent=KR[c]; meSel.appendChild(a); const b=a.cloneNode(true); opSel.appendChild(b); });
meSel.value='yone'; opSel.value='gwen';
meSel.onchange=e=>loadChamp('me', e.target.value); opSel.onchange=e=>loadChamp('op', e.target.value);
document.querySelectorAll('.cyc button').forEach(b=>b.onclick=()=>{ const slot=b.dataset.slot, d=+b.dataset.d, sel=document.getElementById(slot+'-champ');
  let i=CHAMPS.indexOf(sel.value); i=(i+d+CHAMPS.length)%CHAMPS.length; sel.value=CHAMPS[i]; loadChamp(slot, CHAMPS[i]); });

document.getElementById('reset').onclick=()=>{ for(const slot of ['me','op']){ const u=units[slot]; if(!u) continue; POS[u.champ][slot]={...BASE[slot]}; loadSliders(slot); } applyTransforms(); save(); updCopy(); };

function updCopy(){ let s='// 챔피언별 전투 위치 (CHAMP_BATTLE_POS)\n';
  for(const c of CHAMPS){ if(!POS[c]) continue; for(const slot of ['me','op']){ const p=POS[c][slot]; if(!p) continue;
    s+=`  ${c} [${slot}]: X:${p.X} Y:${p.Y} Z:${p.Z} S:${p.S} R:${(+p.R).toFixed(2)}\n`; } }
  s+=`\n// 카메라(공용): dist ${CAM.cD} · height ${CAM.cH} · lookY ${CAM.cL} · fov ${CAM.cF} · zoom ${CAM.zoom}\n`;
  s+='\n// 챔피언별 클립 (CHAMP_CLIPS)\n';
  for(const c of CHAMPS){ if(CLIPSEL[c]) s+=`  ${c}: 공격=${CLIPSEL[c].attack} · 기본=${CLIPSEL[c].idle} · 죽음=${CLIPSEL[c].death}\n`; }
  document.getElementById('copyout').value=s; }
document.getElementById('copy').onclick=()=>{ const t=document.getElementById('copyout'); t.select(); document.execCommand('copy'); document.getElementById('copy').textContent='복사됨!'; setTimeout(()=>document.getElementById('copy').textContent='복사',1200); };

applyZoom(); updCopy();
loadChamp('me','yone'); loadChamp('op','gwen');

(function render(){ requestAnimationFrame(render); const dt=Math.min(0.05, clock.getDelta());
  if(units.me&&units.me.mixer) units.me.mixer.update(dt); if(units.op&&units.op.mixer) units.op.mixer.update(dt);
  renderer.render(scene, camera); })();
</script>
</body>
</html>
