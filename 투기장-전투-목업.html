<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🗡️ 투기장 전투 목업</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<style>
  html,body{height:100%;margin:0;background:#0a0a12;color:#e8eaf2;font-family:'Noto Sans KR',system-ui,sans-serif;overflow:hidden;}
  #app{position:fixed;inset:0;}
  #stagewrap{position:absolute;left:0;top:0;right:320px;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#070710;}
  #boxlabel{font-size:11px;color:#7a82a0;}
  /* 실제 앱 전투박스(.arena3d-stage)와 동일 비율(388×236=1.644)·스타일 */
  #box{position:relative;width:min(74vw,760px);aspect-ratio:388/236;border-radius:14px;overflow:hidden;border:1px solid rgba(240,200,90,.22);
    background:radial-gradient(ellipse 42% 34% at 13% 6%,rgba(245,185,100,.20),transparent 66%),radial-gradient(ellipse 42% 34% at 87% 6%,rgba(228,95,75,.16),transparent 66%),linear-gradient(180deg,#08070f 0%,#0e0a18 44%,#150f1d 68%,#1d1219 100%);}
  #box::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:14px;background:radial-gradient(ellipse 124% 82% at 50% 38%,transparent 54%,rgba(4,3,9,.6) 100%);box-shadow:inset 0 0 54px rgba(0,0,0,.45);}
  #box canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  /* 가이드 중앙선 */
  #box .guide-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07);} #box .guide-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.07);}
  /* HP바(머리 위) + 네임플레이트(발 아래) — 모델 따라다님 */
  .hp{position:absolute;width:74px;height:8px;border-radius:5px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25);transform:translate(-50%,-100%);z-index:5;overflow:hidden;}
  .hp>i{position:absolute;left:0;top:0;bottom:0;width:78%;border-radius:4px;}
  .hp.me>i{background:linear-gradient(90deg,#39d98a,#7CFC9A);} .hp.op>i{background:linear-gradient(90deg,#e84057,#ff7a6c);}
  .np{position:absolute;transform:translate(-50%,0);z-index:5;display:flex;align-items:center;gap:4px;background:rgba(10,10,18,.8);border:1px solid rgba(240,200,90,.4);border-radius:11px;padding:2px 8px;white-space:nowrap;}
  .np b{font-size:11px;color:#ffe6a0;} .np small{font-size:9px;color:#9aa0b4;}
  .np .lv{font-size:9px;font-weight:800;color:#1a1206;background:linear-gradient(135deg,#ffd98a,#e0a23a);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;}
  #panel{position:absolute;right:0;top:0;bottom:0;width:320px;background:#11131c;border-left:1px solid #262a3a;overflow-y:auto;padding:10px 12px 30px;box-sizing:border-box;}
  h2{font-size:14px;margin:4px 0 8px;color:#ffd24a;}
  .sec{border:1px solid #262a3a;border-radius:10px;padding:8px 9px;margin-bottom:9px;}
  .sec-h{font-size:12px;font-weight:800;margin-bottom:6px;}
  .me .sec-h{color:#6c9cff;} .op .sec-h{color:#ff7a6c;}
  .row{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:11px;}
  .row label{width:34px;color:#9aa3bd;flex-shrink:0;}
  .row input[type=range]{flex:1;accent-color:#ffd24a;min-width:0;}
  .row .val{width:38px;text-align:right;font-family:'JetBrains Mono',monospace;color:#cfe;font-size:11px;}
  select{width:100%;background:#1a1d2a;color:#e8eaf2;border:1px solid #333a52;border-radius:7px;padding:5px;font-size:12px;margin-bottom:5px;}
  .clip-row{display:flex;gap:5px;}
  .clip-row select{flex:1;margin:0;}
  button{background:#222842;color:#dfe6ff;border:1px solid #3a4263;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:700;cursor:pointer;}
  button:hover{background:#2c345a;}
  button.go{background:linear-gradient(90deg,#f0c060,#e0a82e);color:#1a1206;border:0;width:100%;padding:10px;font-size:14px;margin:4px 0;}
  button.sm{padding:5px 8px;font-size:11px;}
  #copyout{width:100%;height:52px;background:#0c0e16;color:#8fe;border:1px solid #333a52;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:6px;box-sizing:border-box;resize:none;margin-top:4px;}
  .hint{font-size:10px;color:#7a82a0;line-height:1.5;margin-top:3px;}
  .clips-list{font-size:9.5px;color:#7a82a0;font-family:'JetBrains Mono',monospace;word-break:break-all;margin-top:3px;max-height:42px;overflow:auto;}
  .cyc{display:flex;gap:4px;margin-bottom:4px;} .cyc button{flex:1;}
</style>
</head>
<body>
<div id="app">
  <div id="stagewrap">
    <div id="boxlabel">↓ 실제 전투창 비율(388×236) · 이 박스 안이 진짜 화면이에요</div>
    <div id="box">
      <div class="guide-v"></div><div class="guide-h"></div>
      <div class="hp me" id="hp-me"><i></i></div><div class="np" id="np-me"><span class="lv">5</span><b id="np-me-nm">나</b><small id="np-me-p">+10</small></div>
      <div class="hp op" id="hp-op"><i></i></div><div class="np" id="np-op"><span class="lv">5</span><b id="np-op-nm">상대</b><small id="np-op-p">+8</small></div>
    </div>
  </div>
  <div id="panel">
    <h2>🗡️ 투기장 전투 목업 <span id="build" style="font-size:10px;color:#666;">BUILD 2</span></h2>

    <div class="sec me">
      <div class="sec-h">🔵 내 캐릭터 (좌하·뒷모습)</div>
      <div class="cyc"><button class="sm" data-slot="me" data-d="-1">◀</button><select id="me-champ" style="margin:0;"></select><button class="sm" data-slot="me" data-d="1">▶</button></div>
      <div class="row"><label>X 폭</label><input type="range" id="meX" min="0" max="4" step="0.05"><span class="val" id="meX-v"></span></div>
      <div class="row"><label>Y 상하</label><input type="range" id="meY" min="-1" max="3" step="0.05"><span class="val" id="meY-v"></span></div>
      <div class="row"><label>Z 깊이</label><input type="range" id="meZ" min="-2" max="2" step="0.05"><span class="val" id="meZ-v"></span></div>
      <div class="row"><label>크기</label><input type="range" id="meS" min="0.3" max="3" step="0.05"><span class="val" id="meS-v"></span></div>
      <div class="row"><label>회전</label><input type="range" id="meR" min="-3.14" max="3.14" step="0.02"><span class="val" id="meR-v"></span></div>
      <div class="clip-row"><select id="me-clip"></select><button class="sm" id="me-play">▶</button></div>
      <div class="clips-list" id="me-clips"></div>
    </div>

    <div class="sec op">
      <div class="sec-h">🔴 상대 (우상·정면)</div>
      <div class="cyc"><button class="sm" data-slot="op" data-d="-1">◀</button><select id="op-champ" style="margin:0;"></select><button class="sm" data-slot="op" data-d="1">▶</button></div>
      <div class="row"><label>X 폭</label><input type="range" id="opX" min="0" max="4" step="0.05"><span class="val" id="opX-v"></span></div>
      <div class="row"><label>Y 상하</label><input type="range" id="opY" min="-1" max="3" step="0.05"><span class="val" id="opY-v"></span></div>
      <div class="row"><label>Z 깊이</label><input type="range" id="opZ" min="-2" max="2" step="0.05"><span class="val" id="opZ-v"></span></div>
      <div class="row"><label>크기</label><input type="range" id="opS" min="0.3" max="3" step="0.05"><span class="val" id="opS-v"></span></div>
      <div class="row"><label>회전</label><input type="range" id="opR" min="-3.14" max="3.14" step="0.02"><span class="val" id="opR-v"></span></div>
      <div class="clip-row"><select id="op-clip"></select><button class="sm" id="op-play">▶</button></div>
      <div class="clips-list" id="op-clips"></div>
    </div>

    <div class="sec">
      <div class="sec-h">📷 카메라</div>
      <div class="row"><label>거리</label><input type="range" id="cD" min="2" max="12" step="0.1"><span class="val" id="cD-v"></span></div>
      <div class="row"><label>높이</label><input type="range" id="cH" min="-1" max="2" step="0.02"><span class="val" id="cH-v"></span></div>
      <div class="row"><label>주시Y</label><input type="range" id="cL" min="-1" max="1" step="0.02"><span class="val" id="cL-v"></span></div>
      <div class="row"><label>FOV</label><input type="range" id="cF" min="20" max="55" step="1"><span class="val" id="cF-v"></span></div>
      <div class="row"><label>HP높이</label><input type="range" id="hpO" min="0.6" max="1.6" step="0.02"><span class="val" id="hpO-v"></span></div>
    </div>

    <button class="go" id="fight">⚔️ 전투 재생 (공격→죽음)</button>
    <button class="sm" id="reset" style="width:100%;margin-bottom:6px;">↺ 기본값 리셋</button>
    <div class="sec">
      <div class="sec-h">📋 _ABF 값 (앱에 붙여넣기)</div>
      <textarea id="copyout" readonly></textarea>
      <button class="sm" id="copy" style="width:100%;margin-top:4px;">복사</button>
      <div class="hint">박스 안이 실제 화면. 7종 ◀▶로 다 넘겨보며 안 잘리는지 확인. 맞춘 _ABF 값 + 공격/죽음 클립명 주면 앱에 박음.</div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const CHAMPS = ['teemo','gwen','vex','ekko','yone','neeko','lux'];
const KR = { teemo:'티모', gwen:'그웬', vex:'벡스', ekko:'에코', yone:'요네', neeko:'니코', lux:'럭스' };
const DEFAULTS = { meX:2, meY:1.8, meZ:0.52, meS:1.8, meR:Math.PI, opX:2.7, opY:0.5, opZ:0.95, opS:1.0, opR:-0.14, cD:7.0, cH:0.06, cL:-0.05, cF:34, hpO:1.0 };
let P = { ...DEFAULTS };

const box = document.getElementById('box');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio||1, 2)); renderer.setClearAlpha(0); renderer.outputColorSpace = THREE.SRGBColorSpace;
box.insertBefore(renderer.domElement, box.firstChild);
const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer); scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.add(new THREE.HemisphereLight(0xe0eeff, 0x303048, 1.5));
const dir = new THREE.DirectionalLight(0xfff0d0, 1.3); dir.position.set(2,5,6); scene.add(dir);
const camera = new THREE.PerspectiveCamera(P.cF, 1.644, 0.1, 5000);
const loader = new GLTFLoader(); try{ loader.setMeshoptDecoder(MeshoptDecoder); }catch(e){}
const clock = new THREE.Clock();
let W=1, H=1;
function fit(){ W=box.clientWidth; H=box.clientHeight; renderer.setSize(W,H,false); camera.aspect=W/H; camera.updateProjectionMatrix(); }
window.addEventListener('resize', fit); fit();

const units = { me:null, op:null };

function loadChamp(slot, champ){
  const side = slot==='me' ? -1 : 1;
  loader.load(champ+'_full.glb', g=>{
    if(units[slot]){ scene.remove(units[slot].group); }
    const model=g.scene; model.traverse(o=>{ if(o.isMesh){ o.frustumCulled=false; if(o.material)(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m.transparent){ m.transparent=false; m.alphaTest=0.5; m.depthWrite=true; } m.side=THREE.DoubleSide; m.needsUpdate=true; }); } });
    const bx=new THREE.Box3().setFromObject(model); const c=bx.getCenter(new THREE.Vector3()); model.position.sub(c);
    const r=bx.getBoundingSphere(new THREE.Sphere()).radius||1;
    const group=new THREE.Group(); group.add(model); scene.add(group);
    const mixer=new THREE.AnimationMixer(model); const clips={}; (g.animations||[]).forEach(cl=>clips[cl.name]=cl);
    units[slot]={ group, model, mixer, clips, r, champ, side, action:null };
    fillClips(slot);
    document.getElementById(slot+'-clips').textContent = Object.keys(clips).join(' · ') || '(클립 없음)';
    document.getElementById('np-'+slot+'-nm').textContent = KR[champ];
    console.log('⚔️ '+champ+'_full.glb 클립('+Object.keys(clips).length+'):', Object.keys(clips).join(', '));
    applyTransforms(); playIdle(slot);
  }, undefined, e=>{ console.warn(champ+'_full.glb 로드 실패', e); document.getElementById(slot+'-clips').textContent='❌ 로드 실패 ('+champ+'_full.glb)'; });
}

function applyTransforms(){
  for(const slot of ['me','op']){ const u=units[slot]; if(!u) continue; const me=slot==='me', r=u.r;
    const X=P[me?'meX':'opX'], Y=P[me?'meY':'opY'], Z=P[me?'meZ':'opZ'], S=P[me?'meS':'opS'], R=P[me?'meR':'opR'];
    u.group.position.set(u.side*r*X, (me?-r*Y:r*Y), me?r*Z:-r*Z);
    u.group.scale.setScalar(S); u.group.rotation.set(0, R, 0);
  }
  applyCamera();
}
function applyCamera(){ const maxR=Math.max(units.me?units.me.r:1, units.op?units.op.r:1, 1);
  camera.fov=P.cF; camera.position.set(0, maxR*P.cH, maxR*P.cD); camera.lookAt(0, 0, -maxR*P.cL); camera.updateProjectionMatrix(); }

const _v=new THREE.Vector3();
function proj(x,y,z){ _v.set(x,y,z).project(camera); return { x:(_v.x*0.5+0.5)*W, y:(0.5-_v.y*0.5)*H }; }
function placeHud(){
  for(const slot of ['me','op']){ const u=units[slot]; const hp=document.getElementById('hp-'+slot), np=document.getElementById('np-'+slot); if(!u){ hp.style.display=np.style.display='none'; continue; } hp.style.display=np.style.display='';
    const gp=u.group.position, vis=u.r*u.group.scale.x*P.hpO;
    const head=proj(gp.x, gp.y+vis, gp.z), foot=proj(gp.x, gp.y-vis*0.96, gp.z);
    hp.style.left=head.x+'px'; hp.style.top=(head.y-4)+'px';
    np.style.left=foot.x+'px'; np.style.top=(foot.y+2)+'px';
  }
}

function clip(slot, name, loop){ const u=units[slot]; if(!u||!u.clips[name]) return; if(u.action) u.action.fadeOut(0.2);
  const a=u.mixer.clipAction(u.clips[name]); a.reset(); a.setLoop(loop?THREE.LoopRepeat:THREE.LoopOnce); if(!loop) a.clampWhenFinished=true; a.fadeIn(0.2).play(); u.action=a; }
function pick(slot, names){ const u=units[slot]; if(!u) return null; for(const n of names) if(u.clips[n]) return n; return Object.keys(u.clips)[0]||null; }
function playIdle(slot){ const n=pick(slot,['Idle1','Idle_Base','Idle2','Idle']); if(n) clip(slot,n,true); }
function fillClips(slot){ const u=units[slot]; const sel=document.getElementById(slot+'-clip'); sel.innerHTML='';
  Object.keys(u.clips).forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); }); }

document.getElementById('fight').onclick=()=>{
  const atk=pick('me',['Attack1','Attack2','Spell1','Spell2','Crit','Taunt','Joke']); if(atk) clip('me',atk,false);
  setTimeout(()=>{ const dth=pick('op',['Death']); if(dth) clip('op',dth,false); else playIdle('op'); }, 650);
  setTimeout(()=>{ playIdle('me'); }, 2200);
};
document.getElementById('me-play').onclick=()=>clip('me', document.getElementById('me-clip').value, false);
document.getElementById('op-play').onclick=()=>clip('op', document.getElementById('op-clip').value, false);

function bindSlider(id){ const el=document.getElementById(id), v=document.getElementById(id+'-v');
  const upd=()=>{ P[id]=parseFloat(el.value); v.textContent=(+el.value).toFixed(2); applyTransforms(); updCopy(); };
  el.addEventListener('input', upd); el.value=P[id]; v.textContent=(+P[id]).toFixed(2); }
['meX','meY','meZ','meS','meR','opX','opY','opZ','opS','opR','cD','cH','cL','cF','hpO'].forEach(bindSlider);

const meSel=document.getElementById('me-champ'), opSel=document.getElementById('op-champ');
CHAMPS.forEach(c=>{ const a=document.createElement('option'); a.value=c; a.textContent=KR[c]; meSel.appendChild(a); const b=a.cloneNode(true); opSel.appendChild(b); });
meSel.value='yone'; opSel.value='gwen';
meSel.onchange=e=>loadChamp('me', e.target.value); opSel.onchange=e=>loadChamp('op', e.target.value);
document.querySelectorAll('.cyc button').forEach(b=>b.onclick=()=>{ const slot=b.dataset.slot, d=+b.dataset.d, sel=document.getElementById(slot+'-champ');
  let i=CHAMPS.indexOf(sel.value); i=(i+d+CHAMPS.length)%CHAMPS.length; sel.value=CHAMPS[i]; loadChamp(slot, CHAMPS[i]); });

document.getElementById('reset').onclick=()=>{ P={...DEFAULTS}; ['meX','meY','meZ','meS','meR','opX','opY','opZ','opS','opR','cD','cH','cL','cF','hpO'].forEach(id=>{ document.getElementById(id).value=P[id]; document.getElementById(id+'-v').textContent=(+P[id]).toFixed(2); }); applyTransforms(); updCopy(); };

function updCopy(){ document.getElementById('copyout').value =
  `_ABF = { meX:${P.meX}, meY:${P.meY}, meZ:${P.meZ}, meS:${P.meS}, opX:${P.opX}, opY:${P.opY}, opZ:${P.opZ}, opS:${P.opS} }\n`+
  `camera: dist ${P.cD} · height ${P.cH} · lookY ${P.cL} · fov ${P.cF}`; }
document.getElementById('copy').onclick=()=>{ const t=document.getElementById('copyout'); t.select(); document.execCommand('copy'); document.getElementById('copy').textContent='복사됨!'; setTimeout(()=>document.getElementById('copy').textContent='복사',1200); };

updCopy();
loadChamp('me','yone'); loadChamp('op','gwen');

(function render(){ requestAnimationFrame(render); const dt=Math.min(0.05, clock.getDelta());
  if(units.me&&units.me.mixer) units.me.mixer.update(dt); if(units.op&&units.op.mixer) units.op.mixer.update(dt);
  renderer.render(scene, camera); placeHud(); })();
</script>
</body>
</html>
