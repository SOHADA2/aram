<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대기 화면 목업 — ARAM 아수라장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #07040f;
      --surface:  #100c1e;
      --surface2: #18122e;
      --border:   #2e1f52;
      --border-hi:#4a2e8a;
      --purple:   #7c3aed;
      --gold:     #c8a84b;
      --gold-lt:  #e8c87a;
      --green:    #00c77a;
      --red:      #e84057;
      --text:     #e6ebf2;
      --text-dim: #8892a4;
      --text-mu:  #4a5568;
      --plat:     #3fbfcc;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 48px;
      position: relative;
      overflow-x: hidden;
    }

    #stars-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── 페이지 레이블 ── */
    .page-label {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .page-label span {
      font-size: 11px; font-weight: 700; color: var(--purple);
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
    }
    .page-label a { font-size: 11px; color: var(--text-dim); text-decoration: none; }

    /* ── 카드 래퍼 ── */
    .card-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* ── 공통 카드 ── */
    .wm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }
    .wm-card.in { opacity: 1; transform: translateY(0); }

    /* ── 1. 히어로 ── */
    .wm-hero {
      background: linear-gradient(135deg,#130d24 0%,#1a0e35 60%,#0f0a1e 100%);
      border-color: var(--border-hi);
      padding: 14px 16px;
      position: relative; overflow: hidden;
    }
    .wm-hero::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 18% 50%,rgba(124,58,237,0.13) 0%,transparent 58%),
                  radial-gradient(ellipse at 82% 20%,rgba(63,191,204,0.07) 0%,transparent 48%);
    }
    .wm-hero-row { display: flex; align-items: center; gap: 12px; position: relative; }

    /* 회전 링 */
    .wm-ring {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .wm-ring::before {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      background: conic-gradient(var(--plat),#7c3aed,var(--plat),#3fbfcc,var(--plat));
      animation: spin 4s linear infinite;
    }
    .wm-ring::after {
      content: ''; position: absolute; inset: 2px; border-radius: 50%;
      background: #130d24;
    }
    .wm-ring-emoji { position: relative; z-index: 1; font-size: 26px; line-height: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wm-hero-info { flex: 1; min-width: 0; }
    .wm-name {
      font-family: 'Black Han Sans', sans-serif; font-size: 19px;
      letter-spacing: 0.5px; color: var(--text); line-height: 1.15;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .wm-hero-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }

    .wm-tier-pill {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'Black Han Sans', sans-serif; font-size: 11px; letter-spacing: 0.4px;
      color: var(--plat); background: rgba(63,191,204,0.1); border: 1px solid rgba(63,191,204,0.3);
      border-radius: 5px; padding: 3px 8px;
    }
    .wm-streak-pill {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
      color: #93c5fd; background: rgba(147,197,253,0.08); border: 1px solid rgba(147,197,253,0.22);
      border-radius: 5px; padding: 3px 8px;
      animation: streakGlow 2.8s ease-in-out infinite;
    }
    @keyframes streakGlow {
      0%,100% { box-shadow: none; }
      50%      { box-shadow: 0 0 8px rgba(147,197,253,0.2); }
    }
    .wm-gold-pill {
      margin-left: auto; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--gold-lt); background: rgba(200,168,75,0.1); border: 1px solid rgba(200,168,75,0.25);
      border-radius: 7px; padding: 4px 9px;
    }

    /* ── 구분선 ── */
    .wm-divider {
      height: 1px; background: var(--border); margin: 11px 0;
    }

    /* ── 2. LP + 스탯 + 폼 (합친 카드) ── */
    .wm-lp-card {
      background: linear-gradient(135deg,#11102a 0%,#150e2a 100%);
      border-color: rgba(63,191,204,0.2);
    }
    .wm-lp-row {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 10px;
    }
    .wm-lp-left { display: flex; align-items: baseline; gap: 5px; }
    .wm-lp-num {
      font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 700;
      color: var(--plat); line-height: 1;
      text-shadow: 0 0 18px rgba(63,191,204,0.4);
    }
    .wm-lp-cap {
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
      color: var(--text-dim);
    }
    .wm-lp-tier {
      font-family: 'Black Han Sans', sans-serif; font-size: 14px;
      letter-spacing: 0.5px; color: var(--plat);
    }

    /* LP 바 */
    .wm-bar { height: 7px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; position: relative; }
    .wm-bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      background: linear-gradient(90deg,#3fbfcc,#7c3aed);
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(63,191,204,0.45);
      transition: width 1.2s cubic-bezier(0.25,1,0.5,1);
    }
    .wm-bar-fill::after {
      content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 18px;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.35));
      animation: shimmer 2.2s ease-in-out infinite 1.5s;
    }
    @keyframes shimmer { 0%,100%{opacity:0} 50%{opacity:1} }

    /* 스탯 스트립 */
    .wm-stat-strip {
      display: flex; align-items: center; gap: 0;
      margin-top: 10px;
    }
    .wm-stat-item {
      display: flex; align-items: baseline; gap: 3px;
      flex: 1; justify-content: center;
    }
    .wm-stat-item + .wm-stat-item {
      border-left: 1px solid var(--border);
    }
    .wm-sv {
      font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700;
      line-height: 1; color: var(--text);
    }
    .wm-sv.win  { color: var(--green); }
    .wm-sv.loss { color: var(--red);   }
    .wm-sv.wr   { color: #60a5fa;      }
    .wm-sk {
      font-size: 10px; color: var(--text-mu);
      font-family: 'JetBrains Mono', monospace;
    }

    /* 폼 도트 (소형) */
    .wm-form-row {
      display: flex; align-items: center; gap: 5px;
      margin-top: 10px;
    }
    .wm-form-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
      color: var(--text-mu); font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; margin-right: 2px;
    }
    .wm-fdot {
      width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
      transform: scale(0);
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
    }
    .wm-fdot.in { transform: scale(1); }
    .wm-fdot.w { background: rgba(0,199,122,0.12); border: 1px solid rgba(0,199,122,0.38); color: var(--green); box-shadow: 0 0 8px rgba(0,199,122,0.13); }
    .wm-fdot.l { background: rgba(232,64,87,0.1);  border: 1px solid rgba(232,64,87,0.33);  color: var(--red); }
    .wm-form-arrow { font-size: 9px; color: var(--text-mu); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

    /* 예측 배지 */
    .wm-pred {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px;
      font-size: 11px; font-weight: 700;
      color: #a78bfa; background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25); border-radius: 6px;
      padding: 4px 10px;
    }

    /* ── 3. 인사이트 2-col ── */
    .wm-insight-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .wm-ins-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 13px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }
    .wm-ins-card.in { opacity: 1; transform: translateY(0); }
    .wm-ins-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      color: var(--text-mu); font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }

    /* 패스 */
    .wm-pass-num-row { display: flex; align-items: baseline; gap: 3px; margin-bottom: 6px; }
    .wm-pass-n {
      font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700;
      color: var(--gold-lt); line-height: 1;
    }
    .wm-pass-m { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mu); }
    .wm-pass-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
    .wm-pass-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg,var(--gold),var(--gold-lt));
      width: 0%; transition: width 1s cubic-bezier(0.25,1,0.5,1) 0.5s;
    }
    .wm-pass-sub { font-size: 9px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

    /* 챔피언 */
    .wm-champ-list { display: flex; flex-direction: column; gap: 6px; }
    .wm-champ-item { display: flex; align-items: center; gap: 7px; }
    .wm-champ-img {
      width: 30px; height: 30px; border-radius: 5px;
      object-fit: cover; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .wm-champ-body { flex: 1; min-width: 0; }
    .wm-champ-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace; }
    .wm-champ-tag.most { color: #ff9b6b; }
    .wm-champ-tag.best { color: var(--gold); }
    .wm-champ-name { font-family: 'Black Han Sans', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wm-champ-st { font-size: 9px; color: var(--text-mu); font-family: 'JetBrains Mono', monospace; }

    /* ── 4. 퀘스트 + 팁 (합친 카드) ── */
    .wm-bottom-card {
      border-color: rgba(124,58,237,0.28);
      background: linear-gradient(135deg,rgba(124,58,237,0.05) 0%,transparent 70%);
    }
    .wm-quest-row { display: flex; align-items: center; gap: 10px; }
    .wm-quest-icon { font-size: 20px; flex-shrink: 0; }
    .wm-quest-body { flex: 1; min-width: 0; }
    .wm-quest-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
      color: var(--purple); font-family: 'JetBrains Mono', monospace; margin-bottom: 2px;
    }
    .wm-quest-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 1px; }
    .wm-quest-desc { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .wm-quest-reward {
      flex-shrink: 0; display: flex; align-items: center; gap: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--gold);
    }
    .wm-tip-row { display: flex; align-items: flex-start; gap: 7px; }
    .wm-tip-ico { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .wm-tip-txt { font-size: 11px; line-height: 1.55; color: var(--text-dim); }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="page-label">
  <span>🎨 대기 화면 목업 v0.2</span>
  <a href="#">← 닫기</a>
</div>

<div class="card-wrap">

  <!-- 카드 1: 히어로 -->
  <div class="wm-card wm-hero">
    <div class="wm-hero-row">
      <div class="wm-ring">
        <span class="wm-ring-emoji">🐻</span>
      </div>
      <div class="wm-hero-info">
        <div class="wm-name">애긔반달곰</div>
        <div class="wm-hero-meta">
          <span class="wm-tier-pill">🥈 플래티넘</span>
          <span class="wm-streak-pill">❄️ 4연패</span>
          <span class="wm-gold-pill">🪙 2,810G</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 카드 2: LP + 스탯 + 폼 -->
  <div class="wm-card wm-lp-card">
    <!-- LP 수치 -->
    <div class="wm-lp-row">
      <div class="wm-lp-left">
        <span class="wm-lp-num" id="lp-num">0</span>
        <span class="wm-lp-cap">/ 100 LP</span>
      </div>
      <span class="wm-lp-tier">플래티넘</span>
    </div>
    <!-- 바 -->
    <div class="wm-bar">
      <div class="wm-bar-fill" id="lp-bar"></div>
    </div>
    <!-- 스탯 스트립 -->
    <div class="wm-stat-strip">
      <div class="wm-stat-item"><span class="wm-sv win" id="sv-win">0</span><span class="wm-sk">승</span></div>
      <div class="wm-stat-item"><span class="wm-sv loss" id="sv-loss">0</span><span class="wm-sk">패</span></div>
      <div class="wm-stat-item"><span class="wm-sv wr" id="sv-wr">0%</span><span class="wm-sk">승률</span></div>
      <div class="wm-stat-item"><span class="wm-sv" id="sv-games">0</span><span class="wm-sk">경기</span></div>
    </div>
    <!-- 폼 도트 -->
    <div class="wm-form-row">
      <span class="wm-form-lbl">최근 5경기</span>
      <div id="form-dots" style="display:flex;gap:5px;"></div>
      <span class="wm-form-arrow">→ 최신</span>
    </div>
    <!-- 예측 -->
    <div class="wm-pred">▲ 다음 승리 시 <strong style="color:#c4b5fd;margin-left:3px;">승급전 진입!</strong></div>
  </div>

  <!-- 카드 3: 인사이트 2-col -->
  <div class="wm-insight-row">
    <!-- 시즌 패스 -->
    <div class="wm-ins-card">
      <div class="wm-ins-lbl">🎫 시즌 패스</div>
      <div class="wm-pass-num-row">
        <span class="wm-pass-n">19</span>
        <span class="wm-pass-m">/ 25</span>
      </div>
      <div class="wm-pass-bar">
        <div class="wm-pass-fill" id="pass-fill"></div>
      </div>
      <div class="wm-pass-sub">다음: LV 20 · +400G</div>
    </div>
    <!-- 챔피언 -->
    <div class="wm-ins-card">
      <div class="wm-ins-lbl">🎮 챔피언</div>
      <div class="wm-champ-list">
        <div class="wm-champ-item">
          <img class="wm-champ-img" src="https://ddragon.leagueoflegends.com/cdn/15.1.1/img/champion/Vayne.png" alt="베인">
          <div class="wm-champ-body">
            <div class="wm-champ-tag most">🔥 MOST</div>
            <div class="wm-champ-name">베인</div>
            <div class="wm-champ-st">8판 · 4승 4패</div>
          </div>
        </div>
        <div class="wm-champ-item">
          <img class="wm-champ-img" src="https://ddragon.leagueoflegends.com/cdn/15.1.1/img/champion/Gwen.png" alt="그웬">
          <div class="wm-champ-body">
            <div class="wm-champ-tag best">⭐ BEST</div>
            <div class="wm-champ-name">그웬</div>
            <div class="wm-champ-st">2판 · 100%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 카드 4: 퀘스트 + 팁 -->
  <div class="wm-card wm-bottom-card">
    <div class="wm-quest-row">
      <span class="wm-quest-icon">⚔️</span>
      <div class="wm-quest-body">
        <div class="wm-quest-label">🎯 다음 퀘스트 · LV 19 → 20</div>
        <div class="wm-quest-name">시즌의 정점</div>
        <div class="wm-quest-desc">한 판 킬+어시 합 25 이상</div>
      </div>
      <div class="wm-quest-reward">🪙 400G</div>
    </div>
    <div class="wm-divider"></div>
    <div class="wm-tip-row">
      <span class="wm-tip-ico">💡</span>
      <span class="wm-tip-txt">회복 아이템이 없다면 포탑 뒤 자동 회복을 적극 활용하세요.</span>
    </div>
  </div>

</div>

<script>
// ── 별 배경 ──────────────────────────────────────────────────────
(function() {
  const cv = document.getElementById('stars-canvas');
  const cx = cv.getContext('2d');
  let W, H;
  const ST = [];
  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  addEventListener('resize', resize); resize();
  class Star {
    init(fresh) {
      this.x  = Math.random() * W;
      this.y  = fresh ? Math.random() * H : -4;
      this.r  = Math.random() * 1.3 + 0.3;
      this.vy = Math.random() * 0.16 + 0.04;
      this.a  = Math.random() * 0.55 + 0.2;
      this.tp = Math.random() * Math.PI * 2;
      this.ts = Math.random() * 0.018 + 0.005;
    }
    tick() { this.y += this.vy; this.tp += this.ts; if (this.y > H+4) this.init(false); }
    draw() {
      cx.beginPath(); cx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      cx.fillStyle = `rgba(200,180,255,${this.a*(0.6+0.4*Math.sin(this.tp))})`; cx.fill();
    }
  }
  for (let i=0;i<110;i++) { const s=new Star(); s.init(true); ST.push(s); }
  (function loop() { cx.clearRect(0,0,W,H); ST.forEach(s=>{s.tick();s.draw();}); requestAnimationFrame(loop); })();
})();

// ── 카드 stagger 등장 ────────────────────────────────────────────
document.querySelectorAll('.wm-card, .wm-ins-card').forEach((el, i) => {
  setTimeout(() => el.classList.add('in'), 70 + i * 75);
});

// ── LP 카운트업 + 바 ─────────────────────────────────────────────
(function() {
  const numEl = document.getElementById('lp-num');
  const bar   = document.getElementById('lp-bar');
  const target = 34;
  setTimeout(() => {
    bar.style.width = target + '%';
    const t0 = performance.now();
    (function tick(now) {
      const p = Math.min((now-t0)/1100, 1);
      const e = 1-Math.pow(1-p,3);
      numEl.textContent = Math.round(e*target);
      if (p<1) requestAnimationFrame(tick); else numEl.textContent = target;
    })(performance.now());
  }, 380);
})();

// ── 스탯 카운트업 ────────────────────────────────────────────────
[
  {id:'sv-win',  v:31, s:'',  d:480},
  {id:'sv-loss', v:29, s:'',  d:560},
  {id:'sv-wr',   v:52, s:'%', d:640},
  {id:'sv-games',v:60, s:'',  d:510},
].forEach(({id,v,s,d}) => {
  const el = document.getElementById(id);
  setTimeout(() => {
    const t0 = performance.now();
    (function tick(now) {
      const p = Math.min((now-t0)/850, 1);
      const e = 1-Math.pow(1-p,2.5);
      el.textContent = Math.round(e*v)+s;
      if (p<1) requestAnimationFrame(tick); else el.textContent = v+s;
    })(performance.now());
  }, d);
});

// ── 폼 도트 팝인 ─────────────────────────────────────────────────
(function() {
  const wrap = document.getElementById('form-dots');
  ['L','L','L','L','W'].forEach((r, i) => {
    const el = document.createElement('span');
    el.className = 'wm-fdot ' + (r==='W'?'w':'l');
    el.textContent = r;
    wrap.appendChild(el);
    setTimeout(() => el.classList.add('in'), 680 + i*90);
  });
})();

// ── 패스 바 ──────────────────────────────────────────────────────
setTimeout(() => { document.getElementById('pass-fill').style.width = '76%'; }, 550);
</script>
