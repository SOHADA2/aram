name: claw-comp
on:
  push:
    branches: [claude/resume-work-sync-45829l]
    paths: ['.github/workflows/claw-comp.yml']
jobs:
  comp:
    runs-on: ubuntu-latest
    steps:
      - name: compensate claw players (coin+3, chance+3)
        run: |
          node -e '
          const BASE="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app";
          const TODAY=new Date(Date.now()+9*3600000).toISOString().slice(0,10);
          const TARGETS=[
            "-OowcfKklK7-9vwGL2sF","-OowYbwWinndXmDBpuCQ","-Oowbh8uq15kMK_X46tA",
            "-OowbhBRgCyXrCg43o7l","-OowYoAld_XMv3LTNMJ0","-OowYfQE7rB6Olhef4XD",
            "-Oowd8zUYyK5aaAMB197","-OowXInAIfDm6j7PKe0M","-OowYjkfY9PuPALBjcRv",
            "-OowbPGUpDN25oPnsQbS","-Or3L7FZu5s-Y2JFfhGh"
          ];
          (async()=>{
            const g=await (await fetch(BASE+"/gold.json")).json()||{};
            console.log("KST TODAY:",TODAY);
            const out=[];
            for(const k of TARGETS){
              const v=g[k]; if(!v){ out.push({key:k,name:"(MISSING)"}); continue; }
              const curCoins=v.clawCoins_s2||0;
              const col=v.clawCollected_s2; const cn=Array.isArray(col)?col.filter(Boolean).length:(col&&typeof col==="object"?Object.keys(col).length:0);
              const stage2 = cn>=7;
              const effPlays = (v.clawPlayDate_s2===TODAY) ? (v.clawPlays_s2||0) : 0;
              const u={ clawCoins_s2: curCoins+3 };
              if(!stage2){ u.clawPlays_s2 = effPlays-3; u.clawPlayDate_s2 = TODAY; }
              const r=await fetch(BASE+"/gold/"+k+".json",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(u)});
              out.push({key:k, name:v.name||"?", stage:stage2?"2단계":"1단계", coins:curCoins+"->"+(curCoins+3), playsToday:stage2?"무제한":(effPlays+"->"+(effPlays-3)), http:r.status});
            }
            console.table(out);
            console.log("DONE", out.filter(x=>x.http===200).length+"/"+TARGETS.length, "patched");
          })().catch(e=>{console.error(e);process.exit(1)});
          '
