name: claw-audit
on:
  push:
    branches: [claude/resume-work-sync-45829l]
    paths: ['.github/workflows/claw-audit.yml']
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: read claw fields from RTDB
        run: |
          node -e '
          const BASE="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app";
          (async()=>{
            const r=await fetch(BASE+"/gold.json");
            const g=await r.json()||{};
            const rows=[];
            for(const [k,v] of Object.entries(g)){
              if(!v||typeof v!=="object") continue;
              const coins=v.clawCoins_s2, plays=v.clawPlays_s2, date=v.clawPlayDate_s2, col=v.clawCollected_s2, lb=v.clawLaunchBonus_s2;
              if(coins==null&&plays==null&&col==null&&lb==null) continue;
              const cn=Array.isArray(col)?col.filter(Boolean).length:(col&&typeof col==="object"?Object.keys(col).length:0);
              rows.push({key:k, name:v.name||"?", coins:coins==null?0:coins, plays:plays==null?"-":plays, playDate:date||"-", collected:cn, bonus:lb?"Y":"-"});
            }
            rows.sort((a,b)=>(b.coins||0)-(a.coins||0));
            console.log("=== CLAW USERS:",rows.length,"===");
            console.table(rows);
            console.log("RAW_JSON_START");
            console.log(JSON.stringify(rows));
            console.log("RAW_JSON_END");
          })().catch(e=>{console.error(e);process.exit(1)});
          '
