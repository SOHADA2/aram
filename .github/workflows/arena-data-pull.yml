name: arena-data-pull
on:
  push:
    branches: [claude/resume-work-sync-45829l]
    paths: ['.github/workflows/arena-data-pull.yml']
jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Pull arena data from RTDB
        run: |
          curl -s "https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app/gold.json" -o gold.json
          echo "bytes: $(wc -c < gold.json)"
          python3 - <<'PY'
          import json
          d=json.load(open('gold.json')) or {}
          def s(g,f): return g.get(f+'_s2')
          rows=[]
          for k,g in d.items():
              if not isinstance(g,dict): continue
              pw=s(g,'arenaPower') or {}; st=s(g,'dollStock') or {}
              blog=s(g,'arenaBattleLog') or []; flog=s(g,'arenaForgeLog') or []
              coins=s(g,'arenaCoins') or 0; gold_spent=s(g,'goldSpent') or 0
              if isinstance(pw,list): pw={str(i):v for i,v in enumerate(pw) if v}
              if isinstance(st,list): st={str(i):v for i,v in enumerate(st) if v}
              maxpw=max([0]+[v for v in pw.values() if isinstance(v,(int,float))])
              totstock=sum(v for v in (st.values() if isinstance(st,dict) else []) if isinstance(v,(int,float)))
              act = maxpw>0 or (isinstance(blog,list) and len(blog)) or (isinstance(flog,list) and len(flog)) or coins>0 or (isinstance(st,dict) and len(st))
              if not act: continue
              rows.append((g.get('name'),k,maxpw,coins,totstock,len(blog) if isinstance(blog,list) else 0,len(flog) if isinstance(flog,list) else 0,pw,st))
          print("=== ARENA-ACTIVE USERS:", len(rows), "===")
          for nm,k,mp,co,ts,nb,nf,pw,st in rows:
              print(f"\n[{nm}] key={k}")
              print(f"  최고전투력=+{mp} 코인={co} 총수량={ts} 배틀로그={nb} 강화로그={nf}")
              print(f"  전투력맵={pw}")
              print(f"  수량맵={st}")
          PY
