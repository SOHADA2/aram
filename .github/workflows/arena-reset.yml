name: arena-reset
on:
  push:
    branches: [claude/resume-work-sync-45829l]
    paths: ['.github/workflows/arena-reset.yml']
jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset arena data for 3 users + re-audit
        run: |
          BASE="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          NULLS='{"dollStock_s2":null,"arenaPower_s2":null,"arenaFighter_s2":null,"arenaCoins_s2":null,"arenaWelcomeBonus_s2":null,"arenaDefendSeen_s2":null,"arenaBattleCount_s2":null,"arenaBattleDate_s2":null,"arenaBattleLog_s2":null,"arenaForgeLog_s2":null}'
          for KEY in -OowXInAIfDm6j7PKe0M -OowYfQE7rB6Olhef4XD -Oowbh8uq15kMK_X46tA; do
            echo "PATCH $KEY ->"
            curl -s -X PATCH "$BASE/gold/$KEY.json" -d "$NULLS" -o /dev/null -w "  http=%{http_code}\n"
          done
          echo "=== RE-AUDIT (잔존 투기장 활동 확인) ==="
          curl -s "$BASE/gold.json" -o gold.json
          python3 - <<'PY'
          import json
          d=json.load(open('gold.json')) or {}
          def s(g,f): return g.get(f+'_s2')
          found=False
          for k,g in d.items():
              if not isinstance(g,dict): continue
              pw=s(g,'arenaPower') or {}; st=s(g,'dollStock') or {}
              blog=s(g,'arenaBattleLog') or []; flog=s(g,'arenaForgeLog') or []
              coins=s(g,'arenaCoins') or 0
              if isinstance(pw,list): pw={str(i):v for i,v in enumerate(pw) if v}
              if isinstance(st,list): st={str(i):v for i,v in enumerate(st) if v}
              maxpw=max([0]+[v for v in pw.values() if isinstance(v,(int,float))])
              act = maxpw>0 or (isinstance(blog,list) and len(blog)) or (isinstance(flog,list) and len(flog)) or coins>0 or (isinstance(st,dict) and len(st))
              if not act: continue
              found=True
              print(f"[{g.get('name')}] key={k} 최고전투력=+{maxpw} 코인={coins} 수량={st} 배틀={len(blog) if isinstance(blog,list) else 0} 강화={len(flog) if isinstance(flog,list) else 0}")
          if not found: print("✅ 투기장 활동 데이터 0건 — 전부 클린")
          PY
