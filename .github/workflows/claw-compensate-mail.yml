name: claw-compensate-mail

# 🕹️ 인형뽑기 5번째 버그 피해자 6명에게 보상 안내 우편(공지·보상없음) 1회 발송.
# 보상(코인+기회)은 이미 계정에 직접 반영됨. 우편은 안내만. 실행 후 파일 제거.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/claw-compensate-mail.yml'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Build & send mail
        run: |
          python3 - <<'PY' > mail.json
          import json, time
          mail = {
              "title": "🕹️ 인형뽑기 보상 안내",
              "desc": "5번째 집기가 안 되던 버그를 수정했어요! 날리신 판에 대해 🪙 코인 1개와 오늘 플레이 기회 1회(총 6회)를 넣어드렸습니다. 오늘 안에 인형뽑기에서 사용해 주세요. 불편 드려 죄송합니다 🙏",
              "rewards": {},
              "target": ["나랑듀오해듀오", "빛나는언즈", "ap렉사이서폿", "럼블홀릭", "IfCES", "애긔반달곰"],
              "season": 2,
              "sentAt": int(time.time() * 1000),
              "sentBy": "admin"
          }
          print(json.dumps(mail, ensure_ascii=False))
          PY
          echo "── payload ──"; cat mail.json; echo
          DB="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          RESP=$(curl -s -w '\n%{http_code}' -X POST "$DB/mailbox.json" --data-binary @mail.json)
          echo "HTTP $(echo "$RESP" | tail -n1)"
          echo "mail id: $(echo "$RESP" | head -n1)"
          test "$(echo "$RESP" | tail -n1)" = "200"
