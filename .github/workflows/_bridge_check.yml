name: bridge_check
on:
  push:
    branches: [claude/update-needed-tm0tj9]
    paths: ['.github/workflows/_bridge_check.yml']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: dump bridge node
        run: |
          python3 - << 'PY'
          import json, urllib.request
          DB="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          def get(p):
              try:
                  with urllib.request.urlopen(DB+p+".json") as r: return json.load(r)
              except Exception as e: return {"__err":str(e)}
          bridge = get("/bridge")
          print("==== /bridge keys ====")
          print(list(bridge.keys()) if isinstance(bridge,dict) else bridge)
          print("\n==== /bridge/inGame ====")
          print(json.dumps(get("/bridge/inGame"), ensure_ascii=False, indent=1))
          print("\n==== /bridge/operators ====")
          ops=get("/bridge/operators")
          if isinstance(ops,dict):
              for k,v in ops.items():
                  print(k, "→", json.dumps(v, ensure_ascii=False))
          else:
              print(ops)
          PY
