name: Pages Rebuild
# 클래식(브랜치) GitHub Pages 재빌드를 강제 요청 — 자동 배포 트리거가 멈췄을 때.
# 배포 방식(Deploy from branch)은 그대로 두고 "빌드 요청"만 함(Settings 재저장과 동일).
on:
  push:
    branches: [main]
    paths: ['.github/workflows/pages-rebuild.yml', 'index.html', 'claw.html']
  workflow_dispatch:
permissions:
  pages: write
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Request GitHub Pages build
        run: |
          echo "Requesting Pages build for ${{ github.repository }} ..."
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds")
          echo "HTTP $code"; cat /tmp/resp.json || true
          if [ "$code" != "201" ]; then echo "::error::Pages build request failed ($code)"; exit 1; fi
          echo "✅ Pages build requested."
