name: arena-refund
on:
  push:
    branches: [claude/resume-work-sync-45829l]
    paths: ['.github/workflows/arena-refund.yml']
jobs:
  refund:
    runs-on: ubuntu-latest
    steps:
      - name: Refund spent gold (estimated) to goldBonusLegacy_s2
        run: |
          BASE="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          python3 - <<'PY'
          import urllib.request, json
          BASE="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          # key: (name, refund_gold, reached_power)
          targets={
            "-OowYfQE7rB6Olhef4XD":("울퉁쓰",310,2),
            "-Oowbh8uq15kMK_X46tA":("빛나는언즈",700,3),
            "-OowXInAIfDm6j7PKe0M":("애긔반달곰(테스트)",310,2),
          }
          def get(url):
            with urllib.request.urlopen(url) as r: return json.load(r)
          def patch(url,obj):
            req=urllib.request.Request(url,data=json.dumps(obj).encode(),method='PATCH',headers={'Content-Type':'application/json'})
            with urllib.request.urlopen(req) as r: return r.status
          print("=== 환급(goldBonusLegacy_s2 += 추정 강화 골드) ===")
          for k,(nm,amt,pw) in targets.items():
            cur=get(f"{BASE}/gold/{k}/goldBonusLegacy_s2.json") or 0
            try: cur=float(cur)
            except: cur=0
            new=cur+amt
            st=patch(f"{BASE}/gold/{k}.json", {"goldBonusLegacy_s2":new})
            print(f"  [{nm}] +{pw} 강화 → +{amt}G  (legacy {cur:.0f} → {new:.0f})  http={st}")
          print("\n=== 환급 후 확인 ===")
          for k,(nm,amt,pw) in targets.items():
            g=get(f"{BASE}/gold/{k}.json") or {}
            print(f"  [{nm}] goldBonusLegacy_s2={g.get('goldBonusLegacy_s2')}  arenaPower_s2={g.get('arenaPower_s2')}  arenaCoins_s2={g.get('arenaCoins_s2')}  dollStock_s2={g.get('dollStock_s2')}")
          PY
