name: claw-fix-plays

# 🔧 보상 정정 — plays=0 리셋은 일일 5회 한도 때문에 의미 없었음.
# 대신 '원래 기회 + 1' = clawPlays_s2를 음수로 둬 오늘 한도를 1 늘림(이번 1회).
# 코인은 건드리지 않음(이미 +1 refund 완료). 실행 후 파일 제거.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/claw-fix-plays.yml'
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Adjust play allowance (+1 today, coins untouched)
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from datetime import datetime, timezone, timedelta
          DB = "https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          # 원래 기회 + 1: 06-22 피해자 5명은 오늘 0판 시작 → -1(6회 가능). 애긔는 06-23 2판 했었음 → 1(4판 남음)
          TARGETS = {
              '나랑듀오해듀오': -1,
              '빛나는언즈': -1,
              'ap렉사이서폿': -1,
              '럼블홀릭': -1,
              'IfCES': -1,
              '애긔반달곰': 1,
          }
          today = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d')  # KST
          def norm(s): return ' '.join((s or '').split())
          tmap = {norm(k): v for k, v in TARGETS.items()}

          data = json.load(urllib.request.urlopen(DB + "/gold.json"))
          done = []
          for key, u in (data or {}).items():
              if not isinstance(u, dict): continue
              nm = norm(u.get('name',''))
              if nm not in tmap: continue
              target = tmap[nm]
              old_plays = u.get('clawPlays_s2')
              coins = u.get('clawCoins_s2')
              body = json.dumps({'clawPlays_s2': target, 'clawPlayDate_s2': today}).encode()
              req = urllib.request.Request(DB + "/gold/" + key + ".json", data=body,
                                           method='PATCH', headers={'Content-Type':'application/json'})
              code = urllib.request.urlopen(req).getcode()
              done.append(nm)
              print(f"✔ {u.get('name'):<16} plays {old_plays}→{target} (coins={coins} 유지) date→{today} (HTTP {code})")

          print(f"\n처리 완료: {len(done)}/{len(TARGETS)}명")
          missing = [k for k in TARGETS if norm(k) not in {norm(x) for x in done}]
          if missing: print("⚠️ 못 찾음:", missing)
          assert not missing, "일부 대상 미발견"
          PY
