name: diag-aegi
on:
  push:
    branches: [claude/resume-work-in-progress-bdxxwh]
    paths: ['.github/workflows/diag-aegi.yml']
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: fetch and analyze gold
        run: |
          DB="https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app"
          KEY="-OowXInAIfDm6j7PKe0M"
          curl -s "$DB/gold/$KEY.json" -o gold.json
          echo "bytes: $(wc -c < gold.json)"
          node -e '
            const d=JSON.parse(require("fs").readFileSync("gold.json","utf8"));
            if(!d){console.log("NULL");process.exit(0);}
            console.log("name:",d.name);
            const g=k=>d[k];
            const money=Object.keys(d).filter(k=>/gold|Gold|Spent|coin|Coin|rollback|Rollback|resell|sellG|Bonus/i.test(k)&&!Array.isArray(d[k])&&typeof d[k]!=="object");
            console.log("== 금전 스칼라 필드 ==");
            money.sort().forEach(k=>console.log("  "+k+" = "+d[k]));
            const tail=(arr,n)=>Array.isArray(arr)?arr.slice(-n):[];
            console.log("== lotteryHistory tail(12) ==");
            tail(d.lotteryHistory,12).forEach(h=>console.log("  ",JSON.stringify(h)));
            console.log("lotteryHistory total:",Array.isArray(d.lotteryHistory)?d.lotteryHistory.length:0);
            const mh=d.magollaHistory_s2||d.magollaHistory_s1||d.magollaHistory;
            console.log("== magollaHistory tail(12) ==");
            tail(mh,12).forEach(h=>console.log("  ",JSON.stringify(h)));
            const ah=d.attendanceHistory_s2||d.attendanceHistory;
            console.log("attendanceHistory len:",Array.isArray(ah)?ah.length:0);
            console.log("== purchaseLog tail(12) ==");
            const pl=d.purchaseLog_s2||d.purchaseLog;
            tail(pl,12).forEach(h=>console.log("  ",JSON.stringify(h)));
            console.log("== forge/arena 로그 tail ==");
            const af=d.arenaForgeLog_s2; tail(af,8).forEach(h=>console.log("  F",JSON.stringify(h)));
            const cl=d.clawLog_s2; tail(cl,6).forEach(h=>console.log("  C",JSON.stringify(h)));
            console.log("== emblem 관련 ==");
            ["emblem_s2","emblemTickets_s2","emblemSellG_s2","emblemEssence_s2"].forEach(k=>{if(d[k]!==undefined)console.log("  "+k+" = "+JSON.stringify(d[k]).slice(0,200));});
          '
