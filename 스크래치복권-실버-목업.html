<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실버복권 목업 · 칼바람의 행운</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* 실버 팔레트 */
    --sv-hi:#fbfdff;      /* 하이라이트 */
    --sv-lite:#e6edf2;
    --sv-base:#c4ced6;
    --sv-mid:#9aa7b2;
    --sv-deep:#6f7d88;
    --sv-shadow:#4a555e;
    --ice-bg1:#10202e;
    --ice-bg2:#1c3445;
    --ice-glow:rgba(150,200,235,0.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #2a4a63 0%, transparent 60%),
      radial-gradient(ellipse 120% 100% at 50% 120%, #0a141d 0%, transparent 70%),
      linear-gradient(160deg, var(--ice-bg2), var(--ice-bg1));
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:26px 14px;gap:18px;color:#cfe0ee;
  }
  /* 흩날리는 빙결 입자 느낌(가벼운 점들) */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(circle, rgba(200,230,255,0.5) 1px, transparent 1.4px),
      radial-gradient(circle, rgba(200,230,255,0.3) 1px, transparent 1.4px);
    background-size:120px 120px, 70px 90px;
    background-position:0 0, 40px 30px;
    opacity:0.35;
  }

  /* ───────── 복권 카드 ───────── */
  .ticket{
    position:relative;z-index:1;
    width:min(640px, 96vw);
    aspect-ratio:1.46 / 1;
    border-radius:20px;
    padding:clamp(12px,3.4vw,22px);
    display:flex;flex-direction:column;
    /* 메탈 플레이트 */
    background:
      linear-gradient(135deg, var(--sv-hi) 0%, var(--sv-base) 22%, var(--sv-lite) 46%, var(--sv-mid) 70%, var(--sv-lite) 100%);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.55) inset,
      0 0 0 7px var(--sv-mid),
      0 0 0 9px var(--sv-deep),
      0 2px 0 10px rgba(255,255,255,0.25),
      0 26px 60px -12px rgba(0,0,0,0.8),
      0 0 60px -8px var(--ice-glow);
  }
  /* 브러시드 메탈 결 + 비네트 */
  .ticket::before{
    content:'';position:absolute;inset:9px;border-radius:13px;pointer-events:none;
    background:
      repeating-linear-gradient(115deg, rgba(255,255,255,0.10) 0 2px, transparent 2px 5px),
      radial-gradient(ellipse 90% 80% at 50% 30%, transparent 55%, rgba(74,85,94,0.28) 100%);
    mix-blend-mode:overlay;opacity:0.7;
  }
  /* 안쪽 음각 테두리 라인 */
  .ticket::after{
    content:'';position:absolute;inset:13px;border-radius:11px;pointer-events:none;
    border:1.5px solid rgba(255,255,255,0.5);
    box-shadow:0 0 0 1.5px rgba(74,85,94,0.4);
  }
  /* 코너 장식 */
  .corner{position:absolute;width:26px;height:26px;z-index:3;opacity:0.9;
    border:2.5px solid var(--sv-deep);border-radius:3px;
    box-shadow:0 1px 0 rgba(255,255,255,0.6);}
  .corner.tl{top:14px;left:14px;border-right:none;border-bottom:none;}
  .corner.tr{top:14px;right:14px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:14px;left:14px;border-right:none;border-top:none;}
  .corner.br{bottom:14px;right:14px;border-left:none;border-top:none;}

  /* ───────── 헤더 ───────── */
  .head{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,16px);margin-top:2px;}
  .head-ic{font-size:clamp(15px,3.4vw,22px);filter:grayscale(1) brightness(1.45) drop-shadow(0 1px 0 rgba(255,255,255,0.7)) drop-shadow(0 -1px 0 rgba(74,85,94,0.5));opacity:0.92;}
  .title{
    font-family:'Black Han Sans','Noto Sans KR',sans-serif;
    font-size:clamp(16px,4.6vw,29px);
    letter-spacing:0.5px;white-space:nowrap;
    background:linear-gradient(180deg, #ffffff 0%, #dfe7ed 38%, #8c98a3 62%, #cfd9e0 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 1px rgba(255,255,255,0.55), 0 -1px 1px rgba(74,85,94,0.45);
    filter:drop-shadow(0 2px 2px rgba(40,50,60,0.45));
  }

  /* ───────── 스크래치 셀 4칸 ───────── */
  .cells{position:relative;z-index:2;flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(8px,2.2vw,16px);align-items:center;padding:clamp(8px,2.4vw,16px) clamp(2px,1.4vw,10px);}
  .cell{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .cell-no{
    position:absolute;top:-4px;left:50%;transform:translateX(-130%);
    font-family:'Black Han Sans',sans-serif;font-size:clamp(13px,3vw,18px);
    color:var(--sv-deep);text-shadow:0 1px 0 rgba(255,255,255,0.7);z-index:3;line-height:1;
  }
  .cell-label{font-size:clamp(7px,1.7vw,9.5px);font-weight:800;letter-spacing:2px;color:var(--sv-deep);text-shadow:0 1px 0 rgba(255,255,255,0.6);}
  .disc{
    position:relative;width:100%;aspect-ratio:1;border-radius:50%;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    /* 긁기 전 은박 코팅 */
    background:
      radial-gradient(circle at 36% 30%, var(--sv-hi) 0%, var(--sv-lite) 26%, var(--sv-base) 54%, var(--sv-mid) 80%, var(--sv-deep) 100%);
    box-shadow:
      0 0 0 3px rgba(255,255,255,0.5) inset,
      0 0 0 4px var(--sv-mid),
      0 0 0 6px var(--sv-deep),
      0 6px 14px -4px rgba(0,0,0,0.55),
      0 0 0 7px rgba(255,255,255,0.18);
  }
  /* 은박 브러시 텍스처 + 빛 반사 */
  .disc::before{
    content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:
      repeating-conic-gradient(from 0deg, rgba(255,255,255,0.16) 0deg 6deg, transparent 6deg 12deg),
      linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.5) 48%, transparent 56%);
    mix-blend-mode:overlay;opacity:0.8;
  }
  /* 밑에 비치는 문양(긁기 전 어렴풋) */
  .sym{position:relative;z-index:1;font-size:clamp(20px,5.6vw,40px);filter:grayscale(1) brightness(1.2) contrast(0.95) drop-shadow(0 1px 1px rgba(255,255,255,0.6)) drop-shadow(0 -1px 1px rgba(74,85,94,0.5));opacity:0.34;}
  .disc .scratch-hint{position:absolute;bottom:8%;left:0;right:0;text-align:center;font-size:9px;letter-spacing:1px;color:rgba(74,85,94,0.55);font-weight:700;z-index:2;}

  /* ───────── 푸터 ───────── */
  .foot{position:relative;z-index:2;display:flex;flex-direction:column;gap:4px;padding:0 clamp(2px,1.2vw,8px) 2px;}
  .rules{display:flex;flex-direction:column;gap:1px;}
  .rule{font-size:clamp(7px,1.55vw,9.5px);line-height:1.5;color:var(--sv-shadow);font-weight:600;}
  .rule b{color:#33414c;font-weight:800;}
  .brand{display:flex;align-items:center;justify-content:space-between;margin-top:3px;}
  .brand-left{font-size:clamp(7px,1.5vw,9px);letter-spacing:2px;font-weight:800;color:var(--sv-deep);opacity:0.8;}
  .brand-right{font-family:'Black Han Sans',sans-serif;font-size:clamp(8px,1.9vw,12px);letter-spacing:1px;color:var(--sv-shadow);display:flex;align-items:center;gap:5px;}
  .riot-dot{width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,#7f8d98,#4a555e);box-shadow:0 1px 0 rgba(255,255,255,0.5);}

  .note{z-index:1;font-size:12px;color:#8fb0c8;letter-spacing:0.5px;text-align:center;}
  .note b{color:#d6e6f2;}
  .tag{display:inline-block;margin-top:6px;font-size:10px;padding:2px 9px;border-radius:20px;background:rgba(150,200,235,0.12);border:1px solid rgba(150,200,235,0.3);color:#bcd6e8;}
</style>
</head>
<body>
  <div class="ticket">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <div class="head">
      <span class="head-ic">⚔️</span>
      <h1 class="title">긁어보세요! 칼바람의 행운!</h1>
      <span class="head-ic">🏆</span>
    </div>

    <div class="cells">
      <div class="cell"><span class="cell-no">1</span><span class="cell-label">SCRATCH</span>
        <div class="disc"><span class="sym">❄️</span><span class="scratch-hint">↑ 긁기</span></div></div>
      <div class="cell"><span class="cell-no">2</span><span class="cell-label">SCRATCH</span>
        <div class="disc"><span class="sym">⚔️</span><span class="scratch-hint">↑ 긁기</span></div></div>
      <div class="cell"><span class="cell-no">3</span><span class="cell-label">SCRATCH</span>
        <div class="disc"><span class="sym">🗡️</span><span class="scratch-hint">↑ 긁기</span></div></div>
      <div class="cell"><span class="cell-no">4</span><span class="cell-label">SCRATCH</span>
        <div class="disc"><span class="sym">👑</span><span class="scratch-hint">↑ 긁기</span></div></div>
    </div>

    <div class="foot">
      <div class="rules">
        <p class="rule"><b>당첨</b> 같은 문양 <b>2개</b>가 나오면 당첨! 가장 가치 큰 문양의 상금을 받아요.</p>
        <p class="rule"><b>실버복권</b> 4칸 · 해골 없음 — 마음껏 긁어도 패널티가 없어요.</p>
        <p class="rule"><b>안내</b> 긁다가 멈춰도 보류돼요. 결과를 확정하거나 버리기 전까지 유지됩니다.</p>
      </div>
      <div class="brand">
        <span class="brand-left">ARAM · HOWLING ABYSS</span>
        <span class="brand-right"><span class="riot-dot"></span>RIOT GAMES</span>
      </div>
    </div>
  </div>

  <div class="note">
    <b>🥈 실버복권</b> (1번) 목업 — 칼바람의 행운<br>
    <span class="tag">메탈릭 실버 · 빙결 톤</span>
  </div>
</body>
</html>
