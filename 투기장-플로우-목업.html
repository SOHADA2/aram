<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🗡️ 투기장 플로우 목업</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* ============ 사이트 _injectArenaCss() 와 100% 동일 (그대로 복사) ============ */
  .arena-ov{position:fixed;inset:0;z-index:3600;display:flex;align-items:center;justify-content:center;background:rgba(6,5,12,.9);backdrop-filter:blur(6px);padding:16px;}
  .arena-sheet{background:linear-gradient(180deg,#16131f,#0e0c16);border:1px solid rgba(240,200,90,.35);border-radius:18px;max-width:420px;width:100%;max-height:90vh;overflow:auto;padding:18px 16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .arena-h{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:20px;color:#ffd24a;margin-bottom:2px;}
  .arena-sub{font-size:11.5px;color:#9aa0b4;margin-bottom:12px;}
  .arena-fighter{position:relative;width:124px;height:124px;margin:0 auto 4px;border-radius:18px;overflow:hidden;border:2.5px solid var(--ag,rgba(240,200,90,.5));background:radial-gradient(circle at 50% 35%,#243049,#0c1020);box-shadow:0 0 22px -3px var(--ag,transparent);transition:border-color .4s,box-shadow .4s;}
  .arena-fighter img{width:100%;height:100%;object-fit:cover;object-position:center top;}
  .arena-fighter.myth{border-color:transparent;animation:arenaPrismAura 3s linear infinite;}
  @keyframes arenaPrismAura{0%{box-shadow:0 0 24px -2px #ff5ec7;border-color:#ff5ec7;}25%{box-shadow:0 0 24px -2px #ffd24a;border-color:#ffd24a;}50%{box-shadow:0 0 24px -2px #5fffd0;border-color:#5fffd0;}75%{box-shadow:0 0 24px -2px #5fb0ff;border-color:#5fb0ff;}100%{box-shadow:0 0 24px -2px #ff5ec7;border-color:#ff5ec7;}}
  .arena-grade{display:inline-block;font-size:11px;font-weight:800;color:var(--gc,#ffd24a);background:color-mix(in srgb,var(--gc,#ffd24a) 16%,transparent);border:1px solid color-mix(in srgb,var(--gc,#ffd24a) 50%,transparent);border-radius:8px;padding:1px 8px;vertical-align:middle;}
  .arena-grade.prism{color:#fff;background:linear-gradient(90deg,#ff5ec7,#ffd24a,#5fffd0,#5fb0ff,#ff5ec7);background-size:300% 100%;border-color:transparent;animation:arenaPrismTxt 3s linear infinite;text-shadow:0 1px 3px rgba(0,0,0,.45);}
  @keyframes arenaPrismTxt{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
  .arena-grade-row{display:flex;align-items:center;justify-content:center;gap:7px;margin:5px 0 0;}
  .arena-next{font-size:10.5px;color:#8b91a4;margin:3px 0 0;}.arena-next b{color:#cbd3e6;}
  .arena-power{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:900;color:#ffe39a;text-shadow:0 0 14px rgba(240,200,90,.5);margin:4px 0 0;}
  .arena-power small{font-size:12px;color:#9aa0b4;font-family:'Noto Sans KR',sans-serif;font-weight:600;}
  .arena-stock{font-size:12px;color:#cbd3e6;margin:2px 0 8px;}
  .arena-stock b{color:#7CFC9A;}
  .arena-stock .warn{color:#ffb24a;}
  .arena-result{font-size:16px;font-weight:800;margin:4px 0;min-height:22px;}
  .arena-odds{display:flex;gap:6px;justify-content:center;margin-bottom:9px;}
  .arena-odds div{flex:1;max-width:92px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:5px 4px;}
  .arena-odds .oo-l{font-size:10px;color:#9aa0b4;}
  .arena-odds .oo-v{font-size:15px;font-weight:800;}
  .arena-odds .oo-s .oo-v{color:#7CFC9A;} .arena-odds .oo-h .oo-v{color:#9aa0b4;} .arena-odds .oo-d .oo-v{color:#ff8b8b;}
  .arena-cost{font-size:12.5px;color:#cbd3e6;margin-bottom:10px;} .arena-cost b{color:#ffd24a;} .arena-cost .no{color:#ff6b6b;}
  .arena-forge-btn{width:100%;background:linear-gradient(90deg,#f0c060,#e0a82e);border:0;color:#1a1206;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(240,200,90,.3);}
  .arena-forge-btn:disabled{filter:grayscale(.6);opacity:.55;cursor:not-allowed;}
  .arena-sell-btn{width:100%;margin-top:7px;background:rgba(240,200,90,.1);border:1px solid rgba(240,200,90,.4);color:#ffe39a;border-radius:11px;padding:9px;font-size:12.5px;font-weight:800;cursor:pointer;}
  .arena-sell-btn:active{transform:translateY(1px);} .arena-sell-btn:disabled{filter:grayscale(.6);opacity:.5;cursor:not-allowed;}
  .arena-pick{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:12px 0 2px;}
  .arena-pick .ap{position:relative;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:3px;cursor:pointer;width:48px;}
  .arena-pick .ap.on{border-color:#ffd24a;box-shadow:0 0 8px rgba(240,200,90,.4);}
  .arena-pick .ap img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;display:block;}
  .arena-pick .ap .ap-p{font-size:9px;color:#ffd24a;font-weight:800;margin-top:1px;}
  .arena-pick .ap .ap-q{position:absolute;top:-3px;right:-3px;background:#1a1206;color:#7CFC9A;font-size:9px;font-weight:800;border-radius:6px;padding:0 3px;border:1px solid rgba(124,252,154,.5);}
  .arena-pick-lbl{font-size:10.5px;color:#9aa0b4;margin-top:8px;}
  .arena-close{margin-top:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#aeb2c0;border-radius:10px;padding:8px 18px;cursor:pointer;font-size:12.5px;}
  @keyframes arenaShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}
  @keyframes arenaPop{0%{transform:scale(.7);}55%{transform:scale(1.18);}100%{transform:scale(1);}}
  .arena-fighter.fx-success{animation:arenaPop .5s;} .arena-fighter.fx-destroy{animation:arenaShake .42s;}
  .arena-bt-list{display:flex;flex-direction:column;gap:7px;margin:8px 0 4px;}
  .arena-opp{display:flex;align-items:center;gap:10px;background:linear-gradient(100deg,rgba(255,255,255,.055),rgba(255,255,255,.018));border:1px solid rgba(240,200,90,.16);border-radius:12px;padding:8px 10px 8px 12px;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s,transform .1s;}
  .arena-opp::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gc,#e0a82e);opacity:.85;}
  .arena-opp:hover{border-color:rgba(240,200,90,.42);box-shadow:0 5px 16px -7px rgba(0,0,0,.6);transform:translateY(-1px);}
  .arena-opp>img{width:46px;height:46px;border-radius:10px;object-fit:cover;object-position:center top;flex:0 0 auto;border:2px solid var(--gc,rgba(255,255,255,.2));box-shadow:0 0 10px -2px var(--gc,transparent);}
  .arena-opp-info{flex:1;min-width:0;text-align:left;}
  .arena-opp-nm{font-size:13px;font-weight:800;color:#e6ebf2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .arena-opp-pw{font-size:11px;color:#9aa0b4;margin-top:1px;} .arena-opp-pw b{color:#ffd24a;}
  .arena-opp-wr{display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto;min-width:52px;}
  .arena-opp-wr .wr-v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:#cdd3e6;line-height:1;}
  .arena-opp-wr .wr-v.good{color:#7CFC9A;} .arena-opp-wr .wr-v.bad{color:#ff8b8b;}
  .arena-opp-wr .wr-bar{width:46px;height:3px;border-radius:2px;background:rgba(255,255,255,.13);overflow:hidden;}
  .arena-opp-wr .wr-bar>div{height:100%;border-radius:2px;background:linear-gradient(90deg,#e0a82e,#ffd24a);}
  .arena-opp-go{background:linear-gradient(90deg,#f0c060,#e0a82e);border:0;color:#1a1206;border-radius:9px;padding:5px 14px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 2px 8px -2px rgba(240,200,90,.5);}
  .arena-opp-go:hover{filter:brightness(1.08);}
  .arena-opp-go:disabled{filter:grayscale(.6);opacity:.5;cursor:not-allowed;}
  .arena-bt-reroll{width:100%;margin-top:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#cbd3e6;border-radius:10px;padding:8px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .arena-bt-tip{font-size:10.5px;color:#8b91a4;line-height:1.5;margin:9px 2px 2px;} .arena-bt-tip b{color:#ffd24a;}
  .arena-bt-empty{font-size:13px;color:#cbd3e6;padding:22px 8px;line-height:1.7;} .arena-bt-empty span{font-size:11px;color:#9aa0b4;}
  .arena-cboard{display:flex;flex-direction:column;gap:4px;margin:5px auto 3px;width:fit-content;max-width:100%;}
  .arena-pick-actions{display:flex;gap:7px;margin-top:9px;}
  .arena-pick-actions .acb-half{flex:1;margin-top:0;width:auto;}
  .arena-clash-go{background:linear-gradient(90deg,#f0c060,#e0a82e);border:0;color:#1a1206;border-radius:11px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;animation:arenaClashPulse 1s ease-in-out infinite;}
  .arena-clash-go:active{transform:translateY(1px);}
  @keyframes arenaClashPulse{0%,100%{box-shadow:0 0 0 0 rgba(240,200,90,.5);}50%{box-shadow:0 0 0 6px rgba(240,200,90,0);}}
  .arena-bt-vs{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0;}
  .arena-bt-side{display:flex;flex-direction:column;align-items:center;gap:4px;width:96px;}
  .arena-bt-side img{width:84px;height:84px;border-radius:14px;object-fit:cover;object-position:center top;border:2px solid rgba(255,255,255,.18);}
  .arena-bt-nm{font-size:11px;color:#cbd3e6;} .arena-bt-nm b{color:#ffd24a;}
  .arena-bt-mid{font-family:'Black Han Sans',sans-serif;font-size:20px;font-weight:900;padding:4px 8px;border-radius:9px;}
  .arena-bt-mid.win{color:#7CFC9A;} .arena-bt-mid.lose{color:#ff8b8b;}
  .arena-bt-res{font-size:18px;font-weight:900;margin:6px 0;} .arena-bt-res.win{color:#7CFC9A;} .arena-bt-res.lose{color:#ff8b8b;} .arena-bt-res span{font-size:12px;color:#9aa0b4;font-weight:600;}
  .arena-bt-reward{font-size:13px;color:#ffe39a;background:rgba(240,200,90,.1);border:1px solid rgba(240,200,90,.28);border-radius:10px;padding:9px;margin:6px 0;}
  .arena-bt-left{font-size:12px;color:#9aa0b4;margin-bottom:8px;}
  .arena-skills{display:flex;gap:7px;margin:10px 0 4px;}
  .arena-skill{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(240,200,90,.08);border:1.5px solid rgba(240,200,90,.4);border-radius:11px;padding:11px 4px;cursor:pointer;color:#ffe7b0;transition:transform .08s,background .12s;position:relative;}
  .arena-skill:hover{background:rgba(240,200,90,.16);} .arena-skill:active{transform:translateY(1px);}
  .arena-skill b{font-size:19px;font-family:'JetBrains Mono',monospace;color:#ffd24a;line-height:1;}
  .arena-skill span{font-size:10.5px;font-weight:800;line-height:1.2;text-align:center;word-break:keep-all;}
  .arena-skill i,.arena-skill .ask-hint{font-size:9px;font-style:normal;color:#9aa0b4;line-height:1.2;text-align:center;word-break:keep-all;}
  .arena-skill .ask-ord{position:absolute;top:-8px;left:-8px;min-width:20px;height:20px;padding:0 4px;border-radius:10px;background:#ffd24a;color:#1a1206;font-size:10px;font-weight:900;display:none;align-items:center;justify-content:center;border:2px solid #16131f;box-shadow:0 1px 4px rgba(0,0,0,.5);z-index:2;}
  .arena-skill.picked{background:linear-gradient(180deg,rgba(240,200,90,.28),rgba(200,168,75,.12));border-color:#ffd24a;}
  .arena-skill.picked .ask-ord{display:flex;}
  .arena-skill.picked b{color:#ffe7b0;}
  .arena-skill-vs{font-size:12px;color:#cbd3e6;margin:5px 0 2px;}.arena-skill-vs b{font-family:'JetBrains Mono',monospace;color:#ffd24a;}.arena-skill-vs .svs-x{color:#9aa0b4;margin:0 4px;font-weight:700;}
  .arena3d-stage{position:relative;width:100%;height:236px;margin:6px 0 4px;border-radius:14px;overflow:hidden;background:radial-gradient(ellipse 42% 34% at 13% 6%,rgba(245,185,100,.20),transparent 66%),radial-gradient(ellipse 42% 34% at 87% 6%,rgba(228,95,75,.16),transparent 66%),linear-gradient(180deg,#08070f 0%,#0e0a18 44%,#150f1d 68%,#1d1219 100%);border:1px solid rgba(240,200,90,.22);}
  .arena3d-env{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;border-radius:14px;}
  .arena3d-env .a3e-wall{position:absolute;left:0;right:0;top:0;height:55%;background:linear-gradient(180deg,rgba(0,0,0,.52),transparent 86%),repeating-linear-gradient(90deg,transparent 0 32px,rgba(255,205,130,.045) 32px 33px,transparent 33px 66px);}
  .arena3d-env .a3e-floor{position:absolute;left:-30%;right:-30%;bottom:-2%;height:54%;transform:perspective(200px) rotateX(50deg);transform-origin:50% 100%;background:radial-gradient(ellipse 44% 90% at 50% 118%,rgba(245,205,120,.32),rgba(205,92,70,.11) 48%,transparent 74%);}
  .arena3d-env .a3e-floor::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 34px,rgba(245,212,135,.11) 34px 35px),repeating-linear-gradient(0deg,transparent 0 26px,rgba(245,212,135,.07) 26px 27px);-webkit-mask:radial-gradient(ellipse 58% 100% at 50% 100%,#000 26%,transparent 72%);mask:radial-gradient(ellipse 58% 100% at 50% 100%,#000 26%,transparent 72%);}
  .arena3d-env .a3e-horizon{position:absolute;left:8%;right:8%;top:53%;height:2px;background:linear-gradient(90deg,transparent,rgba(245,200,115,.30),transparent);filter:blur(1px);}
  .arena3d-stage::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:14px;background:radial-gradient(ellipse 124% 82% at 50% 38%,transparent 54%,rgba(4,3,9,.6) 100%);box-shadow:inset 0 0 54px rgba(0,0,0,.45);}
  .arena3d-stage.win-glow{border-color:rgba(124,252,154,.7);box-shadow:inset 0 0 46px -6px rgba(124,252,154,.4),0 0 24px -4px rgba(124,252,154,.42);}
  .arena3d-loading{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:11px;color:#cbb27a;letter-spacing:.5px;animation:arena3dLoadPulse 1.1s ease-in-out infinite;}
  @keyframes arena3dLoadPulse{0%,100%{opacity:.45;}50%{opacity:1;}}
  .arena3d-stage .arena-bt-vs{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:14px;margin:0;z-index:2;}
  .arena-bt-reveal{opacity:0;transform:translateY(6px);transition:opacity .45s,transform .45s;}
  .arena-bt-reveal.show{opacity:1;transform:none;}
  .arena-pkbox{position:absolute;z-index:5;min-width:106px;max-width:44%;padding:4px 9px 5px;background:linear-gradient(165deg,rgba(26,21,12,.93),rgba(12,10,7,.94));border:1px solid rgba(240,200,90,.5);box-shadow:0 3px 11px rgba(0,0,0,.5),inset 0 0 13px rgba(240,200,90,.06);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);pointer-events:none;}
  .arena-pkbox.me{left:7px;top:7px;border-radius:11px 4px 11px 4px;}
  .arena-pkbox.opp{right:7px;bottom:7px;border-radius:4px 11px 4px 11px;}
  .arena-pkbox .pk-top{display:flex;align-items:baseline;justify-content:space-between;gap:7px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(240,200,90,.22);}
  .arena-pkbox .pk-nm{font-weight:900;font-size:11px;color:#ffe7b0;letter-spacing:.2px;text-shadow:0 1px 2px rgba(0,0,0,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .arena-pkbox .pk-lv{flex:none;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:10px;color:#cbb277;}
  .arena-pkbox .pk-hprow{display:flex;align-items:center;gap:5px;}
  .arena-pkbox .pk-hplabel{flex:none;font-weight:900;font-style:italic;font-size:9px;color:#f0c860;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .arena-pkbox .pk-hpb{position:relative;flex:1;height:5px;border-radius:3px;background:#120d07;border:1px solid rgba(240,200,90,.28);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.6);}
  .arena-pkbox .pk-hpghost{position:absolute;left:0;top:0;bottom:0;width:100%;border-radius:4px;background:linear-gradient(180deg,#ffe6ad,#e89a34);opacity:.9;}
  .arena-pkbox .pk-hpf{position:absolute;left:0;top:0;bottom:0;z-index:1;width:100%;border-radius:4px;background:linear-gradient(180deg,#74e489,#2fc35a);}
  .arena-pkbox .pk-hpf::after{content:'';position:absolute;left:0;right:0;top:0;height:48%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.5),transparent);}
  .arena-nav{display:block;width:100%;margin-top:9px;padding:11px;border:1px solid rgba(240,200,90,.4);border-radius:12px;font-size:13.5px;font-weight:800;cursor:pointer;background:rgba(240,200,90,.1);color:#ffe39a;}
  .arena-nav:active{transform:translateY(1px);}
  .arena-nav.battle,.arena-nav.forge{background:rgba(240,200,90,.1);color:#ffe39a;}
  /* ============ 목업 전용(사이트엔 없음) — 화면 전환 탭 ============ */
  html,body{margin:0;height:100%;background:#07060d;font-family:'Noto Sans KR',sans-serif;}
  .mock-nav{position:fixed;top:0;left:0;right:0;z-index:4000;display:flex;gap:6px;justify-content:center;padding:9px 8px;background:rgba(10,8,16,.95);border-bottom:1px solid rgba(240,200,90,.25);flex-wrap:wrap;}
  .mock-nav button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);color:#cbd3e6;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .mock-nav button.on{background:linear-gradient(90deg,#f0c060,#e0a82e);color:#1a1206;border-color:transparent;}
  .mock-note{position:fixed;bottom:8px;left:0;right:0;z-index:4000;text-align:center;font-size:10.5px;color:#6b7186;pointer-events:none;}
  .arena-ov{display:none;}
  .arena-ov.on{display:flex;}
  .arena3d-loading{display:none;}  /* 목업은 정적 VS만(실제 사이트는 여기에 3D 캐릭터) */
  /* ===== 가독성 + ? 모달 + 하단 탭 (사이트 적용 대상) ===== */
  .arena-sub{font-size:12.5px;color:#aab0c6;line-height:1.55;}
  .arena-hd{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:12px;min-height:30px;}
  .arena-hd .arena-h{margin-bottom:0;}
  .arena-x2{position:absolute;left:0;top:0;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#aeb2c0;font-size:14px;font-weight:800;cursor:pointer;line-height:1;}
  .arena-q{position:absolute;right:0;top:0;width:30px;height:30px;border-radius:50%;background:rgba(240,200,90,.12);border:1px solid rgba(240,200,90,.45);color:#ffd24a;font-size:15px;font-weight:900;cursor:pointer;line-height:1;}
  .arena-tabs{display:flex;gap:5px;margin-top:14px;background:rgba(0,0,0,.28);border:1px solid rgba(240,200,90,.2);border-radius:13px;padding:4px;}
  .arena-tab{flex:1;background:none;border:0;color:#9aa0b4;border-radius:10px;padding:10px 4px;font-size:13px;font-weight:800;cursor:pointer;transition:.12s;font-family:inherit;}
  .arena-tab.on{background:rgba(240,200,90,.18);color:#ffd24a;box-shadow:inset 0 0 0 1px rgba(240,200,90,.3);}
  .arena-help-ov{position:fixed;inset:0;z-index:3700;display:none;align-items:center;justify-content:center;background:rgba(6,5,12,.82);padding:22px;}
  .arena-help-ov.on{display:flex;}
  .arena-help-card{background:linear-gradient(180deg,#1b1827,#110f1a);border:1px solid rgba(240,200,90,.45);border-radius:16px;max-width:340px;width:100%;padding:18px 18px 14px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .arena-help-card h4{margin:0 0 10px;font-size:17px;color:#ffd24a;font-family:'Black Han Sans','Noto Sans KR',sans-serif;text-align:center;}
  .arena-help-card .hp-row{font-size:13px;line-height:1.7;color:#cdd3e6;margin:8px 0;text-align:left;}
  .arena-help-card .hp-row b{color:#ffe39a;} .arena-help-card .hp-k{color:#ffd24a;font-weight:800;}
  .arena-help-close{width:100%;margin-top:13px;background:rgba(240,200,90,.14);border:1px solid rgba(240,200,90,.4);color:#ffe39a;border-radius:11px;padding:11px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit;}
  .arena-opp-nm{font-size:14px;} .arena-opp-pw{font-size:11.5px;} .arena-opp-wr .wr-v{font-size:17px;}
  .arena-opp-nm{white-space:normal;line-height:1.35;}
  .arena-opp-buddy{font-size:12px;color:#ffd9a0;font-weight:700;}
  /* 강화 확률 = 슬림 막대(박스 3개 대신) + 정보 한 줄 */
  .arena-odds2{margin:8px 2px 12px;}
  .ao2-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;background:#0c0a14;border:1px solid rgba(255,255,255,.08);}
  .ao2-s{background:linear-gradient(180deg,#7CFC9A,#3fae62);} .ao2-h{background:#3a3f4d;} .ao2-d{background:linear-gradient(180deg,#ff8b8b,#d6463c);}
  .ao2-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11.5px;font-weight:800;}
  .ao2-ls{color:#7CFC9A;} .ao2-lh{color:#9aa0b4;} .ao2-ld{color:#ff8b8b;}
  .arena-fnote{font-size:11.5px;color:#9aa0b4;margin:9px 0 4px;} .arena-fnote b{color:#ffd24a;}
  .arena-forge-btn .fb-cost{font-weight:600;opacity:.82;font-size:13px;}
  .ao2-labels{font-size:11px;}
  /* 인형 선택줄 = 한 줄에 꽉(빈칸 없이·균등) */
  .arena-pick{flex-wrap:nowrap;gap:4px;margin:10px 0 2px;}
  .arena-pick .ap{flex:1;width:auto;min-width:0;padding:2px;}
  .arena-pick .ap .ap-p{font-size:8.5px;}
  .arena-pick .ap .ap-q{font-size:8.5px;top:-4px;right:-4px;}
  .arena-odds .oo-v{font-size:16px;} .arena-odds .oo-l{font-size:10.5px;} .arena-stock{font-size:12.5px;}
</style>
</head>
<body>
<div class="mock-nav">
  <button data-s="forge" class="on">① 강화</button>
  <button data-s="list">② 상대 고르기</button>
  <button data-s="pick">③ 전투(스킬)</button>
  <button data-s="result">④ 전투 결과</button>
</div>
<div id="screen-forge" class="arena-ov on"></div>
<div id="screen-list" class="arena-ov"></div>
<div id="screen-pick" class="arena-ov"></div>
<div id="screen-result" class="arena-ov"></div>
<div class="mock-note">↑ 사이트 실제 CSS·HTML 구조 그대로 · 전투 스테이지는 정적 VS(실제 사이트는 여기에 3D 캐릭터가 들어감)</div>
<div id="arena-help" class="arena-help-ov" onclick="this.classList.remove('on')"><div class="arena-help-card" onclick="event.stopPropagation()"><h4 id="ah-title">도움말</h4><div id="ah-body"></div><button class="arena-help-close" onclick="document.getElementById('arena-help').classList.remove('on')">알겠어요</button></div></div>
<script>
const DD=k=>`https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${k}_0.jpg`;
const GRADES=[{min:0,name:'무명',c:'#8a93a6'},{min:1,name:'견습',c:'#b9a877'},{min:4,name:'정예',c:'#cdb061'},{min:7,name:'숙련',c:'#e0c052'},{min:10,name:'정복자',c:'#f0c84a'},{min:13,name:'영웅',c:'#ffd24a'},{min:16,name:'전설',c:'#ffe07a'},{min:19,name:'신화',c:'#ff5ec7',prism:true}];
const grade=p=>{let g=GRADES[0];for(const x of GRADES)if(p>=x.min)g=x;return g;};
const nextG=p=>GRADES.find(x=>x.min>p)||null;
const gBadge=p=>{const g=grade(p);return `<span class="arena-grade${g.prism?' prism':''}" style="--gc:${g.c}">${g.name}</span>`;};
const ARENA_MAX_POWER=20, ARENA_BATTLE_DAILY=10;

// ===== 샘플 데이터(나=티모 +5 정예) =====
const ME={kr:'티모', dd:'Teemo', power:5, nick:'삐삐', skills:{Q:'실명 다트', W:'신나는 사냥', E:'맹독 다트'}};
const STOCK={'티모':2,'그웬':1,'벡스':3,'에코':1,'요네':1,'니코':1,'럭스':2};
const PICKS=[['Teemo','티모',5],['Gwen','그웬',2],['Vex','벡스',0],['Ekko','에코',1],['Yone','요네',0],['Neeko','니코',1],['Lux','럭스',3]];
const OPPS=[{name:'울퉁쓰',dd:'Vex',kr:'벡스',power:3,nick:'뽀삐'},{name:'빛나는언즈',dd:'Ekko',kr:'에코',power:8,nick:'에코링'},{name:'맹독 벌꿀오소리',dd:'Lux',kr:'럭스',power:1,nick:''}];
// 단짝 별칭 표시 헬퍼: 별칭(챔피언)  (별칭 없으면 챔피언만)
const pkName=(o)=>o.nick?`${o.nick}(${o.kr})`:o.kr;

// 헤더(✕ · 제목 · ?) + 하단 탭 — 공용
const hd=(title,helpKey)=>`<div class="arena-hd"><button class="arena-x2" title="닫기">✕</button><div class="arena-h">${title}</div><button class="arena-q" onclick="help('${helpKey}')">?</button></div>`;
const tabs=on=>`<div class="arena-tabs"><button class="arena-tab ${on==='forge'?'on':''}" onclick="go('forge')">⚒️ 강화</button><button class="arena-tab ${on==='list'?'on':''}" onclick="go('list')">⚔️ 배틀</button><button class="arena-tab" onclick="skinTab()">🎨 스킨</button></div>`;
// ? 도움말 내용 — 화면에 흩어져 있던 설명을 전부 여기로
const HELP={
  forge:{t:'⚒️ 인형 강화', b:`<div class="hp-row"><span class="hp-k">강화</span>로 전투인형의 전투력을 <b>+0~+20</b>까지 올려요.</div>
    <div class="hp-row">시도하면 → <b style="color:#7CFC9A">성공</b> 전투력 +1 · <b>보류</b> 그대로 · <b style="color:#ff8b8b">파괴</b> 인형 −1 & 전투력 리셋.</div>
    <div class="hp-row">강화엔 <span class="hp-k">🗡️ 투기장 코인</span>이 들어요 (배틀로 벌어요).</div>
    <div class="hp-row">아래 줄에서 강화할 인형을 골라요 — <b>배지 = 보유 수량</b>, <b>+N = 전투력</b>.</div>
    <div class="hp-row"><b>팔기</b>로 인형을 코인으로 바꿀 수 있어요 (전투력은 리셋).</div>
    <div class="hp-row">전투력이 오르면 <span class="hp-k">등급</span>도 올라요: 무명 → 견습 → 정예 → 숙련 → 정복자 → 영웅 → 전설 → 신화.</div>`},
  battle:{t:'⚔️ 배틀', b:`<div class="hp-row">기본 승률 = <b>50% + (전투력 차) × 2.5%</b>.</div>
    <div class="hp-row">도전하면 <span class="hp-k">Q·W·E</span> 스킬을 <b>낼 순서대로</b> 세 번 탭해요. 상대는 랜덤 방어.</div>
    <div class="hp-row">이긴 경합마다 <b style="color:#7CFC9A">+5%</b>(다 이기면 +15%) · 진 경합 <b style="color:#ff8b8b">−5%</b> — 전투력과 별개인 <b>피지컬 럭키</b>!</div>
    <div class="hp-row">스킬 상성: <span class="hp-k">Q ▶ W ▶ E ▶ Q</span> (가위바위보).</div>
    <div class="hp-row">하루 <b>${ARENA_BATTLE_DAILY}회</b> 도전 · 승리 시 인형뽑기 코인 + 투기장 코인.</div>`},
};
function help(k){ const h=HELP[k]||HELP.forge; document.getElementById('ah-title').textContent=h.t; document.getElementById('ah-body').innerHTML=h.b; document.getElementById('arena-help').classList.add('on'); }
function skinTab(){ alert('🎨 스킨 상점은 별도 화면이에요 (이 목업은 강화→배틀 흐름 위주)'); }

// ===== ① 강화 =====
function renderForge(){
  const power=5, stock=2, cost=50, coins=320, odds={success:62,hold:33,destroy:5}, sell=92, g=grade(power), ng=nextG(power);
  const picks=PICKS.map(([dd,kr,pw])=>`<div class="ap ${kr==='티모'?'on':''}"><img src="${DD(dd)}"><div class="ap-p">+${pw}</div><span class="ap-q">${STOCK[kr]}</span></div>`).join('');
  document.getElementById('screen-forge').innerHTML=`<div class="arena-sheet">
    ${hd('⚒️ 인형 강화','forge')}
    <div class="arena-fighter" style="--ag:${g.c}"><img src="${DD(ME.dd)}"></div>
    <div class="arena-grade-row">${gBadge(power)}<span style="font-size:15px;font-weight:700;color:#e6ebf2;">${ME.kr}</span></div>
    <div class="arena-power">+${power}<small> / ${ARENA_MAX_POWER}</small></div>
    <div class="arena-result"></div>
    <div class="arena-odds2">
      <div class="ao2-bar"><div class="ao2-s" style="width:${odds.success}%"></div><div class="ao2-h" style="width:${odds.hold}%"></div><div class="ao2-d" style="width:${odds.destroy}%"></div></div>
      <div class="ao2-labels"><span class="ao2-ls">성공 ${odds.success}%</span><span class="ao2-lh">보류 ${odds.hold}%</span><span class="ao2-ld">파괴 ${odds.destroy}%</span></div>
    </div>
    <div class="arena-fnote">🗡️ 인형 <b>${stock}</b>개 · 코인 <b>🗡️${coins}</b></div>
    <button class="arena-forge-btn">⚒️ 강화 시도 <span class="fb-cost">· 🗡️${cost}</span></button>
    <button class="arena-sell-btn">💰 팔기 <span style="opacity:.85">(🗡️${sell})</span></button>
    <div class="arena-pick">${picks}</div>
    ${tabs('forge')}
  </div>`;
}

// ===== ② 상대 고르기 =====
function renderList(){
  const mp=ME.power;
  const list=OPPS.map((o,i)=>{const wr=Math.max(10,Math.min(90,Math.round(50+(mp-o.power)*2.5)));const g=grade(o.power);return `<div class="arena-opp" style="--gc:${g.c}">
    <img src="${DD(o.dd)}">
    <div class="arena-opp-info"><div class="arena-opp-nm">${o.name} <span class="arena-opp-buddy">${o.nick?`🧸 ${o.nick}(${o.kr})`:o.kr}</span></div><div class="arena-opp-pw">${gBadge(o.power)} <b>+${o.power}</b></div></div>
    <div class="arena-opp-wr"><div class="wr-v ${wr>=55?'good':wr<=45?'bad':''}">${wr}%</div><div class="wr-bar"><div style="width:${wr}%"></div></div><button class="arena-opp-go" onclick="go('pick')">도전</button></div></div>`;}).join('');
  document.getElementById('screen-list').innerHTML=`<div class="arena-sheet">
    ${hd('⚔️ 배틀','battle')}
    <div class="arena-sub">내 인형 ${gBadge(mp)} <b style="color:#ffe39a">${ME.kr} +${mp}</b> · 오늘 <b style="color:#7CFC9A">7</b>/${ARENA_BATTLE_DAILY}회</div>
    <div class="arena-bt-list">${list}</div>
    <button class="arena-bt-reroll">🔄 다른 상대 보기</button>
    ${tabs('list')}
  </div>`;
}

// ===== ③ 전투 준비(스킬 선택) =====
function renderPick(){
  const mp=ME.power, opp=OPPS[0], sk=ME.skills, SLOTS=['Q','W','E'], BEATS={Q:'W',W:'E',E:'Q'};
  const skills=SLOTS.map(s=>`<button class="arena-skill"><span class="ask-ord"></span><b>${s}</b><span>${sk[s]}</span><i class="ask-hint">▶ ${BEATS[s]} 이김</i></button>`).join('');
  document.getElementById('screen-pick').innerHTML=`<div class="arena-sheet">
    ${hd('⚔️ 전투 준비','battle')}
    <div class="arena3d-stage">
      <div class="arena3d-env" aria-hidden="true"><div class="a3e-wall"></div><div class="a3e-floor"></div><div class="a3e-horizon"></div></div>
      <div class="arena-pkbox me"><div class="pk-top"><span class="pk-nm">${pkName(ME)}</span><span class="pk-lv">Lv.${mp}</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost"></div><div class="pk-hpf"></div></div></div></div>
      <div class="arena-pkbox opp"><div class="pk-top"><span class="pk-nm">${pkName(opp)}</span><span class="pk-lv">Lv.${opp.power}</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost"></div><div class="pk-hpf"></div></div></div></div>
      <div class="arena-bt-vs">
        <div class="arena-bt-side"><img src="${DD(ME.dd)}"><div class="arena-bt-nm">나 <b>+${mp}</b></div></div>
        <div class="arena-bt-mid" style="color:#cbd3e6;font-size:15px;">⚔️</div>
        <div class="arena-bt-side"><img src="${DD(opp.dd)}"><div class="arena-bt-nm">${opp.name} <b>+${opp.power}</b></div></div>
      </div>
    </div>
    <div class="arena-sub" style="margin:8px 0 2px;">Q·W·E를 <b>낼 순서</b>대로 탭하세요</div>
    <div class="arena-skills">${skills}</div>
  </div>`;
}

// ===== ④ 전투 결과 =====
function renderResult(){
  const r={won:true,wr:62,myPow:5,oppPow:3,oppName:'울퉁쓰',oppDd:'Vex',oppNick:'뽀삐',oppKr:'벡스',mySkill:'Q',oppSkill:'W',clawGain:1,coinGain:42,left:7};
  document.getElementById('screen-result').innerHTML=`<div class="arena-sheet">
    ${hd('⚔️ 전투 결과','battle')}
    <div class="arena-skill-vs">내 <b>${r.mySkill}</b> ${ME.skills.Q} <span class="svs-x">vs</span> 상대 <b>${r.oppSkill}</b> 침묵의 장막 <span class="arena-adv good" style="font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:7px;color:#7CFC9A;background:rgba(124,252,154,.14);border:1px solid rgba(124,252,154,.4);">유리</span></div>
    <div class="arena3d-stage win-glow">
      <div class="arena3d-env" aria-hidden="true"><div class="a3e-wall"></div><div class="a3e-floor"></div><div class="a3e-horizon"></div></div>
      <div class="arena-pkbox me"><div class="pk-top"><span class="pk-nm">${pkName(ME)}</span><span class="pk-lv">Lv.${r.myPow}</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost"></div><div class="pk-hpf"></div></div></div></div>
      <div class="arena-pkbox opp"><div class="pk-top"><span class="pk-nm">${pkName({nick:r.oppNick,kr:r.oppKr})}</span><span class="pk-lv">Lv.${r.oppPow}</span></div><div class="pk-hprow"><span class="pk-hplabel">HP</span><div class="pk-hpb"><div class="pk-hpghost" style="width:0"></div><div class="pk-hpf low" style="width:0"></div></div></div></div>
      <div class="arena-bt-vs">
        <div class="arena-bt-side"><img src="${DD(ME.dd)}"><div class="arena-bt-nm">나 <b>+${r.myPow}</b></div></div>
        <div class="arena-bt-mid" style="color:#cbd3e6;font-size:15px;">⚔️</div>
        <div class="arena-bt-side"><img src="${DD(r.oppDd)}"><div class="arena-bt-nm">${r.oppName} <b>+${r.oppPow}</b></div></div>
      </div>
    </div>
    <div class="arena-bt-reveal show">
      <div class="arena-bt-res win">🎉 승리! <span>(승률 ${r.wr}%)</span></div>
      <div class="arena-bt-reward">🪙 인형뽑기 코인 +${r.clawGain} · 🗡️ 투기장 코인 +${r.coinGain}</div>
      <button class="arena-forge-btn" onclick="go('list')">⚔️ 계속 배틀 <span style="font-size:11px;font-weight:600;opacity:.7;">· 오늘 ${r.left}/${ARENA_BATTLE_DAILY}</span></button>
    </div>
  </div>`;
}

function go(s){ document.querySelectorAll('.mock-nav button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  ['forge','list','pick','result'].forEach(x=>document.getElementById('screen-'+x).classList.toggle('on',x===s)); }
document.querySelectorAll('.mock-nav button').forEach(b=>b.onclick=()=>go(b.dataset.s));
renderForge(); renderList(); renderPick(); renderResult();
</script>
</body>
</html>
