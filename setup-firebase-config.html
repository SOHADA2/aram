<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Firebase Config Setup</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 80px auto; text-align: center; }
    button { padding: 12px 28px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #result { margin-top: 24px; font-size: 18px; }
  </style>
</head>
<body>
  <h2>Firebase 설정 초기화</h2>
  <p><code>/config/riotWorkerUrl</code> 값을 Firebase에 저장합니다.</p>
  <button onclick="setup()">설정 저장</button>
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzRirJzvaqu6jelqUUjV_Tik1MgsALEE4",
      authDomain: "aramchaos-ca022.firebaseapp.com",
      databaseURL: "https://aramchaos-ca022-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aramchaos-ca022",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.setup = async function() {
      const result = document.getElementById('result');
      result.textContent = '저장 중...';
      try {
        await set(ref(db, 'config/riotWorkerUrl'), 'https://riot-proxy.shm2644.workers.dev');
        result.style.color = 'green';
        result.textContent = '✅ 저장 완료! 이 창을 닫아도 됩니다.';
      } catch(e) {
        result.style.color = 'red';
        result.textContent = '❌ 오류: ' + e.message;
      }
    };
  </script>
</body>
</html>
