<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🐱 유미 위치 맞추기</title>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
}}
</script>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',system-ui,sans-serif; background:#0d0b08; color:#e8dcc0; }
  .wrap{ max-width:420px; margin:0 auto; padding:14px; }
  h1{ font-size:17px; margin:6px 0 4px; }
  .hint{ font-size:12.5px; color:#9c8f6f; line-height:1.55; margin-bottom:10px; }
  .hint b{ color:#fbe6bf; }
  .stage{ position:relative; width:200px; height:215px; margin:14px auto 6px; }
  .can-lid{ position:absolute; top:-4px; left:50%; transform:translateX(-50%) rotate(-8deg); width:172px; height:24px; background:linear-gradient(180deg,#8a8d92,#5c5f64); border-radius:8px 8px 4px 4px; border:2px solid #3e4044; z-index:4; box-shadow:0 3px 6px rgba(0,0,0,.5); }
  .stage.dig .can-lid{ transform:translateX(-50%) rotate(-16deg) translateY(-4px); }
  .can-body{ position:absolute; top:16px; left:50%; transform:translateX(-50%); width:160px; height:196px; background:linear-gradient(90deg,#46484d,#7c7f84 40%,#3e4044); border-radius:10px 10px 16px 16px/8px 8px 28px 28px; border:2px solid #2b2c2f; overflow:hidden; box-shadow:inset 0 0 18px rgba(0,0,0,.5); }
  .can-dig{ position:absolute; top:28px; left:8px; right:8px; bottom:8px; background:radial-gradient(ellipse at 50% 28%,#2a2620,#14110c 82%); border-radius:6px 6px 14px 14px; z-index:3; }
  #mount{ position:absolute; left:50%; z-index:5; pointer-events:none; transform:translateX(-50%); }
  #mount canvas{ display:block; width:100%; height:100%; background:transparent; }
  .seg{ display:flex; gap:6px; margin:8px 0; }
  .seg button{ flex:1; padding:9px; border-radius:9px; border:1px solid rgba(232,180,80,.4); background:rgba(232,180,80,.12); color:#f0c84a; font-size:13.5px; font-weight:700; cursor:pointer; }
  .seg button.on{ background:linear-gradient(135deg,#d4a843,#f0c84a); color:#1a1206; border-color:transparent; }
  .grp-title{ font-size:12px; color:#9c8f6f; text-align:center; margin:12px 0 4px; font-weight:700; }
  .pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-width:300px; margin:0 auto; }
  .pad2{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-width:300px; margin:0 auto; }
  .pad button, .pad2 button{ padding:15px 0; border-radius:11px; border:1px solid rgba(255,255,255,.16); background:#241f15; color:#f0e6cf; font-size:14.5px; font-weight:800; cursor:pointer; }
  .pad button:active, .pad2 button:active{ background:#46371f; transform:scale(.96); }
  .pad .blank{ visibility:hidden; }
  .reset{ background:#3a2a16!important; color:#fbbf24!important; }
  .out{ margin-top:14px; padding:14px 16px; border-radius:12px; background:#15120c; border:1.5px solid rgba(232,180,80,.4); font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.9; color:#fbe6bf; white-space:pre-wrap; text-align:center; }
  .err{ color:#ff8c8c; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🐱 유미 위치 맞추기</h1>
  <div class="hint">버튼으로 유미를 <b>옮기고 / 키워서</b> 쓰레기통에 딱 맞게 놓아보세요.<br>다 맞추면 맨 아래 <b>4개 숫자</b>를 저에게 보내주시면 앱에 그대로 넣을게요.</div>

  <div class="stage" id="stage">
    <div class="can-lid"></div>
    <div class="can-body"><div class="can-dig"></div></div>
    <div id="mount"></div>
  </div>

  <div class="seg">
    <button id="btn-idle" class="on">🐱 대기</button>
    <button id="btn-dig">🦘 폴짝</button>
    <button id="btn-rest">💤 휴식</button>
  </div>

  <div class="grp-title">↕↔ 위치 옮기기</div>
  <div class="pad">
    <span class="blank"></span><button data-act="up">🔼 위로</button><span class="blank"></span>
    <button data-act="left">◀ 왼쪽</button><button data-act="reset" class="reset">⟲ 처음<br>으로</button><button data-act="right">오른쪽 ▶</button>
    <span class="blank"></span><button data-act="down">🔽 아래로</button><span class="blank"></span>
  </div>

  <div class="grp-title">🔍 크기</div>
  <div class="pad2">
    <button data-act="bigger">➕ 크게</button><button data-act="smaller">➖ 작게</button>
  </div>

  <div class="grp-title">🔄 방향 돌리기</div>
  <div class="pad2">
    <button data-act="rotL">↺ 왼쪽으로</button><button data-act="rotR">오른쪽으로 ↻</button>
  </div>

  <div class="grp-title">🕳 폴짝 다이브 (🦘 폴짝 모습일 때 통 속으로)</div>
  <div class="pad2">
    <button data-act="deeper">더 깊이 ⬇</button><button data-act="shallow">덜 깊이 ⬆</button>
    <button data-act="faster">빠르게 ⏩</button><button data-act="slower">느리게 🐢</button>
  </div>

  <div class="out" id="out">불러오는 중…</div>
  <div class="err" id="err"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

const MOUNT_W=272, MOUNT_H=349, MOUNT_TOP=-96;   // 캔버스 영역(모션 잘림 방지로 넉넉히, 투명)
const mount = document.getElementById('mount');
mount.style.width=MOUNT_W+'px'; mount.style.height=MOUNT_H+'px'; mount.style.top=MOUNT_TOP+'px';
const canvas = document.createElement('canvas'); mount.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:false, powerPreference:'low-power' });
renderer.setPixelRatio(Math.min(devicePixelRatio||1,1.5)); renderer.setSize(MOUNT_W, MOUNT_H, false);
renderer.outputColorSpace = THREE.SRGBColorSpace; renderer.setClearAlpha(0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, MOUNT_W/MOUNT_H, 0.1, 5000);
scene.add(new THREE.AmbientLight(0xffffff,1.1));
const keyL=new THREE.DirectionalLight(0xffffff,1.0); keyL.position.set(3,5,4); scene.add(keyL);
const clock=new THREE.Clock();

const BASE = { x:0.18, y:-1.92, scale:0.68, rot:0 };   // 앱에 이미 적용된 위치/크기/방향
const T = { ...BASE };   // 시작값 = 적용된 값 (이미 맞춰둔 위치에서 시작)
let DIG_DIP=0, DIG_PERIOD=1.3, _digT=0;   // 미니유미는 Dance_Loop 자체가 뒤지기 → 인공 다이브 OFF
const DIG_SCALE=0.85;   // 뒤지기(폴짝) 때 조금 작게
let R = 1;
const STATES=[{key:'idle',file:'yuumi-idle.glb',loop:true},{key:'dig',file:'yuumi-dig.glb',loop:true},{key:'rest',file:'yuumi-rest.glb',loop:false}];
const M={}; let active='idle';
const loader=new GLTFLoader(); loader.setMeshoptDecoder(MeshoptDecoder);

function hideAll(){ for(const k in M){ M[k].group.visible=false; if(M[k].action) M[k].action.stop(); } }
function show(key){ active=key; const m=M[key]; if(!m) return; hideAll(); m.group.visible=true; if(m.action){ m.action.reset(); m.action.play(); } }

STATES.forEach(st=>{
  loader.load('assets/pets/Yuumi/3d/'+st.file+'?v=5', g=>{
    const model=g.scene;
    model.traverse(o=>{ if(o.isMesh){ o.frustumCulled=false; if(o.material) (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ m.side=THREE.DoubleSide; m.needsUpdate=true; }); } });
    const box=new THREE.Box3().setFromObject(model);
    const ctr=box.getCenter(new THREE.Vector3()); model.position.sub(ctr);   // 모델을 그룹 원점에 센터링
    const group=new THREE.Group(); group.add(model); group.visible=false; scene.add(group);
    const r=box.getBoundingSphere(new THREE.Sphere()).radius; R=Math.max(R,r);
    const mixer=new THREE.AnimationMixer(model), clip=(g.animations||[])[0];
    let action=null; if(clip){ action=mixer.clipAction(clip); if(st.loop) action.setLoop(THREE.LoopRepeat); else { action.setLoop(THREE.LoopOnce); action.clampWhenFinished=true; } }
    M[st.key]={group,mixer,action};
    fitCamera(); applyT();
    if(st.key===active) show(active);
  }, undefined, e=>{ document.getElementById('err').textContent='로드 실패: '+e; });
});

function fitCamera(){
  const fov=camera.fov*Math.PI/180, asp=MOUNT_W/MOUNT_H;
  const vD=R/Math.sin(fov/2), hf=2*Math.atan(Math.tan(fov/2)*asp), hD=R/Math.sin(hf/2);
  const d=Math.max(vD,hD)*2.465;   // 1.45×1.7 (캔버스 확대분 보정 → yuumi 크기 동일)
  camera.position.set(0,0,d); camera.lookAt(0,0,0);
}
function applyT(){
  for(const k in M){ const grp=M[k].group; grp.position.set(T.x*R, T.y*R, 0); grp.scale.setScalar(T.scale * (k==='dig'?DIG_SCALE:1)); grp.rotation.y=T.rot*Math.PI/180; }
  document.getElementById('out').textContent =
    '── 이 4개 값을 보내주세요 ──\n'+
    '좌우 X : '+T.x.toFixed(2)+'\n'+
    '상하 Y : '+T.y.toFixed(2)+'\n'+
    '크기   : '+T.scale.toFixed(2)+'\n'+
    '방향   : '+T.rot+'°\n'+
    '폴짝 깊이 : '+DIG_DIP.toFixed(2)+' · 주기 : '+DIG_PERIOD.toFixed(2)+'초';
}

let _last=0;
function loop(){ requestAnimationFrame(loop);
  const now=performance.now(); if(now-_last<33) return; _last=now;   // ~30fps 캡(발열 완화)
  const dt=Math.min(clock.getDelta(),0.1);
  for(const k in M){ if(M[k].mixer&&M[k].group.visible) M[k].mixer.update(dt); }
  const dg=M['dig'];   // 폴짝 모드: 통 속으로 쏙 들어갔다 나오는 다이브
  if(dg&&dg.group.visible){ _digT+=dt; const ph=(1-Math.cos(_digT*(2*Math.PI/DIG_PERIOD)))/2; dg.group.position.y=(T.y - DIG_DIP*ph)*R; }
  renderer.render(scene,camera);
}
loop();

const STEP=0.06;
const acts={
  up:()=>T.y+=STEP, down:()=>T.y-=STEP, left:()=>T.x-=STEP, right:()=>T.x+=STEP,
  bigger:()=>T.scale=Math.min(4,T.scale*1.08), smaller:()=>T.scale=Math.max(0.2,T.scale/1.08),
  rotL:()=>T.rot=((T.rot-15+360)%360), rotR:()=>T.rot=((T.rot+15)%360),
  deeper:()=>DIG_DIP=Math.min(3,DIG_DIP+0.15), shallow:()=>DIG_DIP=Math.max(0,DIG_DIP-0.15),
  faster:()=>DIG_PERIOD=Math.max(0.4,DIG_PERIOD-0.15), slower:()=>DIG_PERIOD=Math.min(3,DIG_PERIOD+0.15),
  reset:()=>{ Object.assign(T, BASE); },   // 처음으로 = 적용된 값으로 복귀
};
document.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{ acts[b.dataset.act](); applyT(); }));
function setMode(key, btnId, dig){ show(key); ['btn-idle','btn-dig','btn-rest'].forEach(id=>document.getElementById(id).classList.toggle('on', id===btnId)); document.getElementById('stage').classList.toggle('dig', dig); }
document.getElementById('btn-idle').onclick=()=>setMode('idle','btn-idle',false);
document.getElementById('btn-dig').onclick=()=>setMode('dig','btn-dig',true);
document.getElementById('btn-rest').onclick=()=>setMode('rest','btn-rest',false);
</script>
</body>
</html>
