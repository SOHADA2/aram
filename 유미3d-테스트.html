<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🐱 유미 3D 테스트</title>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
}}
</script>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',system-ui,sans-serif; background:#0d0b08; color:#e8dcc0; }
  .wrap{ max-width:460px; margin:0 auto; padding:14px; }
  h1{ font-size:16px; margin:6px 0 2px; }
  .hint{ font-size:11.5px; color:#9c8f6f; line-height:1.5; margin-bottom:12px; }
  /* 쓰레기통 무대 — 앱과 비슷한 배치로 프레이밍 확인 */
  .stage{ position:relative; width:200px; height:215px; margin:18px auto 6px; }
  .can-lid{ position:absolute; top:-4px; left:50%; transform:translateX(-50%) rotate(-8deg); width:172px; height:24px; background:linear-gradient(180deg,#8a8d92,#5c5f64); border-radius:8px 8px 4px 4px; border:2px solid #3e4044; z-index:4; box-shadow:0 3px 6px rgba(0,0,0,.5); }
  .stage.dig .can-lid{ transform:translateX(-50%) rotate(-16deg) translateY(-4px); }
  .can-body{ position:absolute; top:16px; left:50%; transform:translateX(-50%); width:160px; height:196px; background:linear-gradient(90deg,#46484d,#7c7f84 40%,#3e4044); border-radius:10px 10px 16px 16px/8px 8px 28px 28px; border:2px solid #2b2c2f; overflow:hidden; box-shadow:inset 0 0 18px rgba(0,0,0,.5); }
  .can-dig{ position:absolute; top:28px; left:8px; right:8px; bottom:8px; background:radial-gradient(ellipse at 50% 28%,#2a2620,#14110c 82%); border-radius:6px 6px 14px 14px; z-index:3; }
  /* 3D 마운트 (앱과 동일 컨셉) */
  #mount{ position:absolute; left:50%; top:-6px; z-index:5; pointer-events:none; transform:translateX(-50%); }
  #mount canvas{ display:block; background:transparent; }
  /* 컨트롤 */
  .seg{ display:flex; gap:6px; margin:10px 0; }
  .seg button{ flex:1; padding:9px; border-radius:9px; border:1px solid rgba(232,180,80,.4); background:rgba(232,180,80,.12); color:#f0c84a; font-size:13px; font-weight:700; cursor:pointer; }
  .seg button.on{ background:linear-gradient(135deg,#d4a843,#f0c84a); color:#1a1206; border-color:transparent; }
  .row{ display:flex; align-items:center; gap:9px; margin:7px 0; font-size:12px; }
  .row label{ width:108px; color:#cbbd97; flex-shrink:0; }
  .row input[type=range]{ flex:1; }
  .row .val{ width:52px; text-align:right; font-family:'JetBrains Mono',monospace; color:#fbbf24; }
  .out{ margin-top:12px; padding:11px 12px; border-radius:10px; background:#171410; border:1px solid rgba(232,180,80,.22); font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.7; color:#d9cba0; white-space:pre-wrap; }
  .out b{ color:#fbe6bf; }
  .copy{ margin-top:8px; width:100%; padding:10px; border-radius:9px; border:1px solid rgba(255,255,255,.18); background:transparent; color:#cbbd97; font-size:12px; cursor:pointer; }
  .err{ color:#ff8c8c; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🐱 유미 3D 테스트</h1>
  <div class="hint">대기 / 폴짝 모션을 전환하고 슬라이더로 크기·위치를 맞춰 보세요.<br>아래 <b>현재 값</b>이 보기 좋아지면 그 숫자를 저에게 알려주시면 앱에 그대로 넣을게요.</div>

  <div class="stage" id="stage">
    <div class="can-lid"></div>
    <div class="can-body"><div class="can-dig"></div></div>
    <div id="mount"></div>
  </div>

  <div class="seg">
    <button id="btn-idle" class="on">🐱 대기 (Idle01)</button>
    <button id="btn-dig">🦘 폴짝 (Spell1)</button>
  </div>

  <div class="row"><label>거리 여백 ×</label><input id="s-dist" type="range" min="0.8" max="3" step="0.05" value="1.35"><span class="val" id="v-dist">1.35</span></div>
  <div class="row"><label>모델 Y 오프셋</label><input id="s-my" type="range" min="-1.5" max="1.5" step="0.02" value="0"><span class="val" id="v-my">0.00</span></div>
  <div class="row"><label>카메라 Y</label><input id="s-cy" type="range" min="-1.5" max="1.5" step="0.02" value="0"><span class="val" id="v-cy">0.00</span></div>
  <div class="row"><label>모델 회전 Y°</label><input id="s-rot" type="range" min="0" max="360" step="2" value="0"><span class="val" id="v-rot">0</span></div>
  <div class="row"><label>FOV</label><input id="s-fov" type="range" min="18" max="55" step="1" value="30"><span class="val" id="v-fov">30</span></div>
  <div class="row"><label>마운트 폭(px)</label><input id="s-w" type="range" min="70" max="200" step="2" value="128"><span class="val" id="v-w">128</span></div>
  <div class="row"><label>마운트 높이(px)</label><input id="s-h" type="range" min="80" max="220" step="2" value="140"><span class="val" id="v-h">140</span></div>
  <div class="row"><label>마운트 top(px)</label><input id="s-top" type="range" min="-60" max="60" step="1" value="-6"><span class="val" id="v-top">-6</span></div>

  <div class="out" id="out"></div>
  <button class="copy" id="copy">📋 현재 값 복사</button>
  <div class="err" id="err"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

const mount = document.getElementById('mount');
const canvas = document.createElement('canvas');
mount.appendChild(canvas);

const P = { dist:1.35, my:0, cy:0, rot:0, fov:30, w:128, h:140, top:-6 };
let W = P.w, H = P.h;

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio||1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearAlpha(0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(P.fov, W/H, 0.1, 5000);
scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const keyL = new THREE.DirectionalLight(0xffffff, 1.0); keyL.position.set(3,5,4); scene.add(keyL);

const clock = new THREE.Clock();
const STATES = [{key:'idle',file:'yuumi-idle.glb'},{key:'dig',file:'yuumi-dig.glb'}];
const M = {}; let active = 'idle'; let baseRadius = 1;
const loader = new GLTFLoader(); loader.setMeshoptDecoder(MeshoptDecoder);

function hideAll(){ for (const k in M){ M[k].model.visible=false; if(M[k].action) M[k].action.stop(); } }
function show(key){ active=key; const m=M[key]; if(!m) return; hideAll(); m.model.visible=true; if(m.action){ m.action.reset(); m.action.play(); } }

STATES.forEach(st=>{
  loader.load('assets/pets/Yuumi/3d/'+st.file, g=>{
    const model=g.scene; model.visible=false; scene.add(model);
    const box=new THREE.Box3().setFromObject(model);
    const ctr=box.getCenter(new THREE.Vector3()); model.position.sub(ctr);
    const sph=box.getBoundingSphere(new THREE.Sphere()); baseRadius=Math.max(baseRadius, sph.radius);
    const mixer=new THREE.AnimationMixer(model), clip=(g.animations||[])[0];
    let action=null; if(clip){ action=mixer.clipAction(clip); action.setLoop(THREE.LoopRepeat); }
    M[st.key]={model,mixer,action,baseY:0};
    if(st.key===active) show(active);
    applyFraming();
  }, undefined, e=>{ document.getElementById('err').textContent='로드 실패 '+st.file+' : '+e; });
});

function applyFraming(){
  W=P.w; H=P.h;
  renderer.setSize(W,H,false);
  mount.style.width=W+'px'; mount.style.height=H+'px'; mount.style.top=P.top+'px';
  camera.fov=P.fov; camera.aspect=W/H; camera.updateProjectionMatrix();
  const fov=P.fov*Math.PI/180, asp=W/H;
  const vDist=baseRadius/Math.sin(fov/2);
  const hfov=2*Math.atan(Math.tan(fov/2)*asp);
  const hDist=baseRadius/Math.sin(hfov/2);
  const dist=Math.max(vDist,hDist)*P.dist;
  camera.position.set(0, P.cy, dist); camera.lookAt(0,0,0);
  for(const k in M){ M[k].model.position.y = P.my; M[k].model.rotation.y = P.rot*Math.PI/180; }
  updateOut();
}

function updateOut(){
  document.getElementById('out').innerHTML =
    `<b>// index.html 적용값</b>\n`+
    `#yuumi3d-mount: top:${P.top}px; width:${P.w}px; height:${P.h}px;\n`+
    `렌더러 비율 W/H = ${(P.w/P.h).toFixed(3)}\n`+
    `camera.fov = ${P.fov}\n`+
    `dist 여백 ×${P.dist.toFixed(2)}  |  camera.y = ${P.cy.toFixed(2)}\n`+
    `model.position.y = ${P.my.toFixed(2)}  |  model.rotation.y = ${P.rot}°`;
}

function loop(){ requestAnimationFrame(loop); const dt=clock.getDelta();
  for(const k in M){ if(M[k].mixer&&M[k].model.visible) M[k].mixer.update(dt); }
  renderer.render(scene,camera);
}
loop();

// UI
function bind(id, key, fmt){ const s=document.getElementById('s-'+id), v=document.getElementById('v-'+id);
  s.addEventListener('input', ()=>{ P[key]=parseFloat(s.value); v.textContent=fmt?fmt(P[key]):P[key]; applyFraming(); }); }
bind('dist','dist', x=>x.toFixed(2)); bind('my','my', x=>x.toFixed(2)); bind('cy','cy', x=>x.toFixed(2));
bind('rot','rot', x=>x|0); bind('fov','fov', x=>x|0); bind('w','w', x=>x|0); bind('h','h', x=>x|0); bind('top','top', x=>x|0);
document.getElementById('btn-idle').addEventListener('click', ()=>{ show('idle'); document.getElementById('btn-idle').classList.add('on'); document.getElementById('btn-dig').classList.remove('on'); document.getElementById('stage').classList.remove('dig'); });
document.getElementById('btn-dig').addEventListener('click', ()=>{ show('dig'); document.getElementById('btn-dig').classList.add('on'); document.getElementById('btn-idle').classList.remove('on'); document.getElementById('stage').classList.add('dig'); });
document.getElementById('copy').addEventListener('click', ()=>{ const t=document.getElementById('out').innerText; navigator.clipboard?.writeText(t); document.getElementById('copy').textContent='✅ 복사됨'; setTimeout(()=>document.getElementById('copy').textContent='📋 현재 값 복사',1200); });

applyFraming();
</script>
</body>
</html>
